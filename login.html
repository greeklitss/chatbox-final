<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            flex-direction: column;
        }
        #login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        #login-container a {
            text-decoration: none;
            background-color: #4285F4;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #login-container a:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>Σύνδεση</h2>
        <a href="/auth/google">Σύνδεση με Google</a>
    </div>
</body>
</html>
