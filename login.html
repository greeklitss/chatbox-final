<!DOCTYPE html>
<html>
<head>
    <title>Login - Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1F2937; 
            color: #E5E7EB;
        }
        .login-box {
            background-color: #374151; 
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #64FFDA; 
        }
        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #4B5563;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #4B5563;
            color: #E5E7EB;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #64FFDA;
            color: #1F2937;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .login-box button:hover {
            background-color: #10B981;
        }
        #error-message {
            color: #EF4444;
            margin-top: 10px;
        }
        .instructions {
            margin-top: 20px;
            font-size: 0.8em;
            color: #ccc;
            text-align: left;
        }
        .instructions p {
            margin: 5px 0;
        }
        .instructions strong {
            color: #64FFDA;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Login to Chatbox</h2>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button id="loginButton">Login</button>
    <div id="error-message"></div>
    <div class="instructions">
        <p>Δοκιμαστικοί Χρήστες:</p>
        <p>Admin: <strong>admin</strong> / 123</p>
        <p>User: <strong>user1</strong> / 123</p>
    </div>
</div>

<script>
    const loginButton = document.getElementById('loginButton');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('error-message');

    loginButton.addEventListener('click', async () => {
        const username = usernameInput.value;
        const password = passwordInput.value;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (response.ok) {
                // Επιτυχής σύνδεση, ανακατεύθυνση στο chat
                window.location.href = result.redirect; 
            } else {
                errorMessage.textContent = result.error || 'Login failed. Try again.';
            }
        } catch (error) {
            console.error('Login error:', error);
            errorMessage.textContent = 'Network error during login.';
        }
    });

    // Επιτρέπει το Login με Enter
    passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            loginButton.click();
        }
    });
</script>
</body>
</html>
