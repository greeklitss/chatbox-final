<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            flex-direction: column;
        }
        #login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        #login-container a {
            text-decoration: none;
            background-color: #4285F4;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #login-container a:hover {
            background-color: #357ae8;
        }
        #chat-container {
            display: none; /* Το κρύβουμε στην αρχή */
            width: 400px;
            max-width: 90%;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 15px;
            box-sizing: border-box;
        }
        #chat-box {
            height: 300px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            background-color: #fafafa;
        }
        #message-input {
            width: calc(100% - 70px);
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #send-button {
            width: 60px;
            padding: 8px;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="login-container">
        <h2>Σύνδεση</h2>
        <a href="/auth/google">Σύνδεση με Google</a>
    </div>

    <div id="chat-container">
        <div id="chat-box"></div>
        <input type="text" id="message-input" placeholder="Πληκτρολόγησε ένα μήνυμα...">
        <button id="send-button">Αποστολή</button>
    </div>

    <script>
 <script>
    // Όταν φορτώνει η σελίδα, ο χρήστης είναι ήδη συνδεδεμένος,
    // άρα εμφανίζουμε το chatbox απευθείας.
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('chat-container').style.display = 'block';

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');

    // Προσοχή: Βάλε εδώ το ακριβές domain της εφαρμογής σου στο Render!
    // Παράδειγμα: `wss://chatbox-final.onrender.com`
    const ws = new WebSocket(`https://chatbox-final.onrender.com`); 

    ws.onmessage = event => {
        chatBox.innerHTML += `<div>${event.data}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    sendButton.onclick = () => {
        const message = messageInput.value;
        if (message) {
            ws.send(message);
            messageInput.value = '';
        }
    };

    messageInput.onkeydown = event => {
        if (event.key === 'Enter') {
            sendButton.click();
        }
    };
    </script>
</body>
</html>
