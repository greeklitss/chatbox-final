<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <title>Chatbox</title>
	
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- GLOBAL & STRUCTURE --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            background-color: #ccf5f5; 
            color: #E0E0E0;
	        background-image: url('static/akoyme_background.png'); 
            background-size: cover;
            background-attachment: fixed;
        }
        
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: rgba(0, 0, 0, 0.7); 
        }

        /* --- TOP BAR --- */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #1F2937; 
            color: #F9FAFB;
            border-bottom: 2px solid #64FFDA;
            flex-shrink: 0;
        }

        #top-bar h1 {
            margin: 0;
            font-size: 1.5em;
            color: #64FFDA;
        }
        
        #top-bar button {
            background-color: #374151; 
            color: #F9FAFB;
            border: none;
            padding: 8px 15px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #top-bar button:hover {
            background-color: #4B5563;
        }

        /* --- CHAT AREA --- */
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            max-width: 80%;
            word-wrap: break-word;
            padding: 10px;
            border-radius: 10px;
            transition: opacity 0.3s;
        }

        .message.self {
            align-self: flex-end;
            background-color: #3B82F6; 
            color: white;
            border-bottom-right-radius: 0;
        }

        .message.other {
            align-self: flex-start;
            background-color: #4B5563; 
            color: #E5E7EB;
            border-bottom-left-radius: 0;
        }
        
        .message-header {
            font-size: 0.8em;
            margin-bottom: 5px;
            opacity: 0.7;
            display: flex;
            align-items: center;
        }

        .message-sender {
            font-weight: bold;
            color: #64FFDA; 
        }
        
        /* Στυλ για τον Admin */
        .message-sender.admin {
            color: #FF6464; /* Κόκκινο για Admin */
        }
        
        .message-content {
            font-size: 1em;
            line-height: 1.4;
        }

        /* --- INPUT AREA --- */
        #input-area {
            flex-shrink: 0;
            padding: 20px;
            background-color: #1F2937;
            border-top: 2px solid #64FFDA;
        }
        
        #input-area > div {
            display: flex;
            align-items: center;
        }

        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid #374151;
            border-radius: 5px;
            margin-right: 10px;
            background-color: #374151;
            color: #E0E0E0;
            resize: none;
            overflow: auto;
            height: 40px;
            line-height: 20px;
        }

        #sendButton, #uploadButton, #exportPdfButton, #settingsButton, #adminPanelButton {
            background-color: #64FFDA;
            color: #1F2937;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-left: 5px;
        }

        #sendButton:hover, #uploadButton:hover, #exportPdfButton:hover, #settingsButton:hover, #adminPanelButton:hover {
            background-color: #10B981;
        }
        
        #adminPanelButton {
            background-color: #FF6464; /* Κόκκινο για Admin Panel */
            color: white;
        }
        
        #adminPanelButton:hover {
            background-color: #CC0000;
        }


        #format-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        #format-controls button {
            background: none;
            border: 1px solid #64FFDA;
            color: #64FFDA;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #format-controls button.active {
            background-color: #64FFDA;
            color: #1F2937;
        }
        
        #colorPicker {
            border: none;
            width: 30px;
            height: 30px;
            padding: 0;
            background-color: transparent;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="top-bar">
        <h1>Chatbox</h1>
        <div>
            <button id="adminPanelButton" title="Admin Panel" style="display:none;"><i class="fas fa-user-shield"></i> Admin</button>
            <button id="settingsButton" title="Settings"><i class="fas fa-cog"></i></button>
            <button id="logoutButton">Logout</button>
        </div>
    </div>
    
    <div id="chatbox">
        </div>
    
    <div id="input-area">
        <div id="format-controls">
            <button id="boldButton" title="Bold"><i class="fas fa-bold"></i></button>
            <input type="color" id="colorPicker" value="#E0E0E0" title="Text Color">
            <button id="exportPdfButton" title="Export Chat to PDF"><i class="fas fa-file-pdf"></i></button>
        </div>
        
        <div>
            <textarea id="messageInput" placeholder="Type a message..."></textarea>
            <label for="fileUpload" id="uploadButton" title="Upload File"><i class="fas fa-upload"></i></label>
            <input type="file" id="fileUpload" style="display: none;">
            <button id="sendButton">Send</button>
        </div>
    </div>

</div>

<script>
    let socket = null;
    let currentUserRole = null;
    let currentUserName = null;

    // --- UTILITIES ---
    
    async function initializeChat() {
        const response = await fetch('/check_login');
        if (!response.ok) {
            // Αν δεν είναι συνδεδεμένος, τον στέλνουμε στο login (αν δεν το έχει κάνει ήδη το Flask)
            window.location.href = '/login.html';
            return;
        }
        
        const userData = await response.json();
        currentUserRole = userData.role;
        currentUserName = userData.display_name;

        // Εμφάνιση του Admin Panel αν ο ρόλος είναι 'admin'
        if (currentUserRole === 'admin') {
            document.getElementById('adminPanelButton').style.display = 'inline-block';
        }

        // Σύνδεση στο WebSocket αφού έχουμε τα δεδομένα του χρήστη
        socket = io(); 
        
        // --- SOCKETIO EVENTS ---
        socket.on('connect', () => {
            console.log(`Συνδέθηκε στο chat ως: ${currentUserName}`);
        });

        socket.on('disconnect', () => {
            console.log('Αποσυνδέθηκε από το chat');
        });

        socket.on('message', (data) => {
            displayMessage(data);
        });
        
        socket.on('userStatus', (data) => {
            displayMessage({
                displayName: data.displayName,
                message: data.status === 'connected' ? 'joined the chat.' : 'left the chat.',
                timestamp: new Date().toISOString(), 
                role: 'system' 
            });
        });
    }

    const chatbox = document.getElementById('chatbox');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const boldButton = document.getElementById('boldButton');
    const colorPicker = document.getElementById('colorPicker');
    const uploadButton = document.getElementById('uploadButton');
    const fileUpload = document.getElementById('fileUpload');
    const logoutButton = document.getElementById('logoutButton');
    const exportPdfButton = document.getElementById('exportPdfButton');
    const settingsButton = document.getElementById('settingsButton'); 
    const adminPanelButton = document.getElementById('adminPanelButton'); // ΝΕΟ
    
    let isBold = false;
    
    function displayMessage(data) {
        if (!data.message) return;

        const isSelf = data.displayName === currentUserName; 

        const messageElement = document.createElement('div');
        messageElement.className = `message ${isSelf ? 'self' : 'other'}`;
        
        const senderSpan = document.createElement('span');
        senderSpan.className = 'message-sender';
        
        // ΧΡΗΣΗ ΡΟΛΟΥ ΓΙΑ STYLING:
        if (data.role === 'admin') {
            senderSpan.classList.add('admin');
        } else if (data.role === 'system') {
            senderSpan.style.color = 'yellow';
        }
        
        const nameText = document.createTextNode(data.displayName);
        senderSpan.appendChild(nameText);
        
        const date = new Date(data.timestamp);
        const timeString = date.toLocaleString('el-GR', { 
           year: 'numeric', 
           month: 'numeric', 
           day: 'numeric', 
           hour: '2-digit', 
           minute: '2-digit', 
           second: '2-digit' 
        });
        const timeText = document.createTextNode(` [${timeString}]: `);
        
        const contentContainer = document.createElement('div');
        contentContainer.className = 'message-header';

        const messageText = document.createElement('p');
        messageText.className = 'message-content';
        // ΧΡΗΣΗ FORMATTING:
        messageText.style.fontWeight = data.isBold ? 'bold' : 'normal';
        messageText.style.color = data.color || '#E0E0E0';
        
        const text = data.message;
        const urlRegex = /(https?:\/\/[^\s]+)/g;

        if (urlRegex.test(text)) {
            messageText.innerHTML = text.replace(urlRegex, function(url) {
                if (/\.(gif|jpe?g|png|webp)$/i.test(url)) {
                    return `<img src="${url}" alt="image attachment" style="max-width: 200px;">`;
                }
                return `<a href="${url}" target="_blank" style="color: #64FFDA; text-decoration: underline;">${url}</a>`;
            });
        } else {
            messageText.innerHTML = text.replace(/\n/g, '<br>');
        }
        
        contentContainer.appendChild(messageText);
        senderSpan.appendChild(timeText);
        contentContainer.prepend(senderSpan);
        messageElement.appendChild(contentContainer);
        
        chatbox.appendChild(messageElement);
        chatbox.scrollTop = chatbox.scrollHeight;
    }
    
    function sendMessage() {
        if (!socket) return;
        
        const text = messageInput.value.trim();
        if (text === '') return;

        const messageFormat = {
            text: text,
            isBold: isBold,
            color: colorPicker.value
        };
        
        socket.emit('message', JSON.stringify(messageFormat));

        messageInput.value = '';
        isBold = false;
        boldButton.classList.remove('active');
        messageInput.style.fontWeight = 'normal';
    }
    
    // --- EVENT LISTENERS ---
    
    sendButton.addEventListener('click', sendMessage);
    
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    boldButton.addEventListener('click', () => {
        isBold = !isBold;
        boldButton.classList.toggle('active', isBold);
        messageInput.style.fontWeight = isBold ? 'bold' : 'normal';
    });

    settingsButton.addEventListener('click', () => {
        alert('Settings panel will be implemented here!'); 
    });
    
    adminPanelButton.addEventListener('click', () => {
        alert('Admin panel functionality will be here!');
        // Μπορείτε να ανακατευθύνετε: window.location.href = '/admin';
    });

    logoutButton.addEventListener('click', async () => {
        try {
            const response = await fetch('/logout', { method: 'POST' });
            const result = await response.json();
            
            if (response.ok) {
                alert('Logged out successfully.');
                // Ανακατεύθυνση στο login page
                window.location.href = result.redirect || '/login.html'; 
            } else {
                alert('Logout failed.');
            }
        } catch (error) {
            console.error('Error during logout:', error);
            alert('An error occurred during logout.');
        }
    });
    
    exportPdfButton.addEventListener('click', () => {
        alert('PDF Export functionality coming soon!');
    });

    uploadButton.addEventListener('click', () => {
        fileUpload.click();
    });

    fileUpload.addEventListener('change', async () => {
        if (fileUpload.files.length === 0) return;
        
        const file = fileUpload.files[0];
        const formData = new FormData();
        formData.append('file', file);
        
        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (response.ok) {
                const fileMessage = {
                    url: result.url
                };
                socket.emit('message', JSON.stringify(fileMessage));
            } else {
                alert(`Upload failed: ${result.error}`);
            }
        } catch (error) {
            console.error('Upload error:', error);
            alert('An error occurred during file upload.');
        }
        
        fileUpload.value = ''; 
    });
    
    // ΕΚΚΙΝΗΣΗ CHAT
    initializeChat();

</script>
</body>
</html>
