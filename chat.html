<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- CSS STYLING: FULL SCREEN & MINIMALISM --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Merriweather', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5; 
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            max-width: none; 
            max-height: none; 
            background: none; 
            box-shadow: none; 
            border-radius: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- ΑΦΑΙΡΕΣΗ HEADER/ΠΕΡΙΤΩΝ ΣΤΟΙΧΕΙΩΝ --- */
        #header { display: none !important; }
        
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative; 
            /* Βεβαιωθείτε ότι το 'akoyme_background.png' υπάρχει στο φάκελο 'static' του server */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- DARK OVERLAY (70% opacity) --- */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 1; 
        }
        
        /* --- ΕΝΤΕΛΩΣ ΔΙΑΦΑΝΗ ΜΗΝΥΜΑΤΑ --- */
        .message {
            z-index: 2; 
            margin-bottom: 12px; 
            padding: 5px 0; 
            word-wrap: break-word;
            max-width: 80%; 
            align-self: flex-start !important; 
            display: flex;
            align-items: flex-start;
            background: none !important; 
            box-shadow: none; 
        }
        
        .message-content {
             text-shadow: none; 
             color: white; 
             font-weight: 400; 
        }
        
        .message .sender {
             font-weight: 700;
             text-shadow: 0 0 2px rgba(0, 0, 0, 0.8); 
        }
        
        .user-message .sender { color: #ffffff; }
        .moderator-message .sender { color: #99FFFF; text-shadow: 0 0 5px rgba(153, 255, 255, 0.6); }
        .admin-message .sender { color: #FFD700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.6); }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.6); 
            flex-shrink: 0; 
        }

        /* --- INPUT BAR & BUTTONS: FULLY TRANSPARENT & ICONS ONLY --- */
        #input-container {
            display: flex;
            flex-direction: column; 
            padding: 10px 15px; 
            background-color: transparent !important; 
            box-shadow: none; 
            flex-shrink: 0; 
            z-index: 10;
        }

        #messageInputRow {
            display: flex;
            width: 100%;
            align-items: center;
        }

        #formatting-bar {
            display: flex;
            justify-content: flex-start;
            padding-bottom: 5px;
            width: 100%;
        }

        /* Κουμπιά (Icons Only) */
        .format-btn, #urlBtn, #emojiBtn, #gifBtn, #sendBtn {
            border: none;
            width: 40px; 
            height: 40px; 
            padding: 0; 
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 18px;
            
            background-color: rgba(0, 123, 255, 0.5); 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .format-btn:hover, #urlBtn:hover, #emojiBtn:hover, #gifBtn:hover, #sendBtn:hover {
            background-color: #007bff; 
        }
        .format-btn.active {
            background-color: #007bff;
        }

        #sendBtn {
            width: 50px; 
            margin-left: 5px;
            margin-right: 0;
            font-size: 20px;
        }
        
        /* ΕΠΑΝΟΡΑΤΟΤΗΤΑ ΚΕΙΜΕΝΟΥ ΚΑΙ PLACEHOLDER */
        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 5px;
            margin-right: 10px;
            background-color: rgba(255, 255, 255, 0.05); 
            
            /* ΕΠΙΒΟΛΗ: Το κείμενο εισαγωγής είναι πάντα λευκό */
            color: white !important; 
            
            text-shadow: 0 0 1px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s;
        }

        /* ΕΠΙΒΟΛΗ: Πολύ διαφανές placeholder */
        #messageInput::placeholder {
            color: rgba(255, 255, 255, 0.15) !important; 
        }
        #messageInput:focus {
             border-color: #007bff;
             outline: none;
        }

        /* --- MENU ΡΥΘΜΙΣΕΩΝ --- */
        #settings-menu {
             position: fixed;
             top: 55px; 
             right: 15px;
             background: rgba(0, 0, 0, 0.9);
             border-radius: 5px;
             box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
             padding: 5px 0;
             z-index: 101; 
             width: 200px;
             display: none; 
             flex-direction: column;
        }

        .menu-item {
             background: none;
             color: white;
             border: none;
             padding: 10px 15px;
             text-align: left;
             width: 100%;
             cursor: pointer;
             font-size: 14px;
             transition: background-color 0.2s;
        }
        .menu-item:hover {
             background-color: rgba(255, 255, 255, 0.1);
        }
        .menu-item i {
             margin-right: 10px;
        }
        
        /* Κουμπί Menu (Γρανάζι) */
        #menuToggleBtn {
            background-color: rgba(0, 123, 255, 0.7);
            color: white;
            border: none;
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; 
            top: 15px;
            right: 15px;
            z-index: 100;
        }
        
        /* Admin/Profile Panels (fixed to take up right side) */
        #admin-panel, #profile-settings {
             background: rgba(0, 0, 0, 0.85); 
             color: white;
             padding: 20px;
             position: fixed; 
             top: 0; 
             right: 0; 
             width: 300px;
             height: 100%;
             box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
             z-index: 20;
             display: none; 
             overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <button id="menuToggleBtn" title="Menu"><i class="fas fa-cog"></i></button>

        <div id="chatbox-container">
            <div id="chatbox"></div>
            
            <div id="settings-menu" style="display: none;">
                <button id="menuProfileBtn" class="menu-item"><i class="fas fa-user-circle"></i> Ρυθμίσεις Προφίλ</button>
                <button id="menuAdminBtn" class="menu-item"><i class="fas fa-shield-alt"></i> Admin Panel</button>
                <hr style="border-color: rgba(255, 255, 255, 0.2); margin: 5px 0;">
                <button id="menuLogoutBtn" class="menu-item" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Αποσύνδεση</button>
            </div>

            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        
        <div id="input-container">
            <div id="formatting-bar">
                <button class="format-btn" id="boldBtn" data-format="isBold" title="Bold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" id="italicBtn" data-format="isItalic" title="Italic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" id="colorBtn" data-format="color" title="Color"><i class="fas fa-palette"></i></button>
                <input type="color" id="colorPicker" style="display: none;">
            </div>
            
            <div id="messageInputRow">
                <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
                <button id="urlBtn" title="Εισαγωγή URL"><i class="fas fa-link"></i></button>
                <button id="emojiBtn" title="Emojis">😊</button>
                <button id="gifBtn" title="GIF"><i class="fas fa-gift"></i></button>
                <button id="sendBtn" disabled title="Αποστολή"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker"></emoji-picker>

    <div id="gifPicker">
        <input type="text" id="gifSearchInput" placeholder="Αναζήτηση GIF...">
        <div id="gifResults"></div>
    </div>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const adminPanel = document.getElementById('admin-panel');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        const avatarForm = document.getElementById('avatar-form');
        
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const settingsMenu = document.getElementById('settings-menu');
        const menuLogoutBtn = document.getElementById('menuLogoutBtn'); 
        const menuProfileBtn = document.getElementById('menuProfileBtn');
        const menuAdminBtn = document.getElementById('menuAdminBtn');

        // Κρύβουμε τα panels κατά την εκκίνηση
        adminPanel.style.display = 'none';
        profileSettings.style.display = 'none';
        settingsMenu.style.display = 'none'; 

        const urlBtn = document.getElementById('urlBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');
        const gifPicker = document.getElementById('gifPicker');
        const gifSearchInput = document.getElementById('gifSearchInput');
        const gifResults = document.getElementById('gifResults');

        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorBtn = document.getElementById('colorBtn');
        const colorPicker = document.getElementById('colorPicker');
        
        let formattingState = {
            isBold: false,
            isItalic: false,
            color: '#FFFFFF' 
        };

        // Υποθέτουμε ότι το websocket setup είναι σωστό
        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        const GIPHY_API_KEY = 'UQxRacYoTn67CWCJ5zbdOvUnzmU0QnUs'; 

        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        sendBtn.disabled = true; 
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        
        ws.onopen = () => {
             console.log('WebSocket Connected!');
             sendBtn.disabled = false; 
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket Error:', error);
            sendBtn.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'oldMessages':
                    chatbox.innerHTML = '';
                    data.messages.forEach(message => appendMessage(message)); 
                    break;
                case 'newMessage':
                    appendMessage(data);
                    break;
                case 'deleteMessage':
                    deleteMessage(data.messageId);
                    break;
                case 'clearChat':
                    chatbox.innerHTML = '';
                    break;
            }
        };
        
        // --- PLACEHOLDER FUNCTIONS ---
        async function loadAdminPanel() { console.log('Admin panel content loading (Backend required)'); }
        window.changeRole = async function(selectElement) { console.log('Role change initiated (Backend required)'); }
        // ------------------------------------------------------------------

        // --- ΕΛΕΓΧΟΣ ΡΟΛΟΥ ΚΑΙ MENU LOGIC ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                // Avatar Logic 
                let avatarSource = '/uploads/default-avatar.png';
                if (data.avatarUrl && data.avatarUrl !== 'default-avatar.png') {
                    if (data.avatarUrl.startsWith('/')) {
                        avatarSource = data.avatarUrl;
                    } else {
                        avatarSource = `/uploads/${data.avatarUrl}`; 
                    }
                } else if (data.avatarUrl && data.avatarUrl.includes('/uploads/')) {
                     avatarSource = data.avatarUrl;
                }
                currentAvatar.src = avatarSource;
                currentAvatar.onerror = function() { this.src = '/uploads/default-avatar.png'; };
                
                // Ρύθμιση Εμφάνισης Menu Items βάσει Ρόλου
                menuAdminBtn.style.display = (data.role === 'admin') ? 'flex' : 'none'; 
                menuProfileBtn.style.display = 'flex'; 
                
                // Event Listeners για το Menu
                menuToggleBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    settingsMenu.style.display = settingsMenu.style.display === 'flex' ? 'none' : 'flex';
                    adminPanel.style.display = 'none';
                    profileSettings.style.display = 'none';
                });

                menuProfileBtn.addEventListener('click', () => {
                    settingsMenu.style.display = 'none'; 
                    profileSettings.style.display = 'block'; 
                });

                menuAdminBtn.addEventListener('click', () => {
                    settingsMenu.style.display = 'none';
                    adminPanel.style.display = 'block';
                    loadAdminPanel();
                });
                
                // Λογική Αποσύνδεσης ΜΕΣΑ στο Menu
                menuLogoutBtn.addEventListener('click', async () => {
                     if (confirm('Είστε σίγουροι ότι θέλετε να αποσυνδεθείτε;')) {
                         try {
                             const res = await fetch('/logout', { method: 'POST' });
                             if (res.ok) {
                                 window.location.href = '/login'; 
                             } else {
                                 alert('Αποτυχία αποσύνδεσης.');
                             }
                         } catch (error) {
                             console.error('Logout error:', error);
                         }
                     }
                 });


            })
            .catch(error => {
                console.error('Σφάλμα κατά την ανάκτησης πληροφοριών χρήστη:', error);
            });
        
        
        // --- ΕΝΙΣΧΥΜΕΝΗ appendMessage (Για JSON/Avatar Fallback) ---
        function appendMessage(data) {
             const messageElement = document.createElement('div');
             messageElement.classList.add('message');
             messageElement.dataset.messageId = data.id || data.messageId; 
             messageElement.dataset.userId = data.user_id || data.userId;
             
             switch (data.role) {
                 case 'admin': messageElement.classList.add('admin-message'); break;
                 case 'moderator': messageElement.classList.add('moderator-message'); break;
                 default: messageElement.classList.add('user-message'); break;
             }
             
             const avatarImg = document.createElement('img');
             avatarImg.classList.add('avatar');
             let avatarUrl = '/uploads/default-avatar.png';
             if (data.avatar_url || data.avatarUrl) {
                 const providedUrl = data.avatar_url || data.avatarUrl;
                  if (providedUrl.startsWith('/')) {
                      avatarUrl = providedUrl;
                  } else if (providedUrl !== 'default-avatar.png') {
                      avatarUrl = `/uploads/${providedUrl}`;
                  }
             }
             avatarImg.src = avatarUrl; 
             avatarImg.onerror = function() { this.src = '/uploads/default-avatar.png'; };
             messageElement.appendChild(avatarImg);

             const contentContainer = document.createElement('div');
             contentContainer.classList.add('message-content-container');
             
             const senderSpan = document.createElement('span');
             senderSpan.classList.add('sender');
             const nameSpan = document.createElement('span');
             nameSpan.textContent = data.displayName;
             senderSpan.appendChild(nameSpan);

             const isGif = data.message && (data.message.startsWith('http://') || data.message.startsWith('https://')) && (data.message.includes('giphy.com') || data.message.includes('media'));
            
             if (isGif) {
                 const gifImage = document.createElement('img');
                 gifImage.src = data.message;
                 gifImage.classList.add('gif');
                 contentContainer.appendChild(gifImage);
             } else {
                 
                 let text = data.message;
                 let format = {};
                 
                 // Χειρισμός JSON strings
                 try {
                     const parsedData = JSON.parse(text);
                     if (parsedData.text) {
                         text = parsedData.text; 
                         format = parsedData;
                     }
                 } catch (e) { /* Not JSON */ }

                 const messageText = document.createElement('span');
                 messageText.classList.add('message-content');
                 
                 // Εφαρμογή Formatting
                 if (format.isBold === true) { messageText.style.fontWeight = 'bold'; }
                 if (format.isItalic === true) { messageText.style.fontStyle = 'italic'; }
                 if (format.color && format.color !== '#FFFFFF') { messageText.style.color = format.color; }
                 
                 messageText.textContent = text; 
                 contentContainer.appendChild(messageText);

             }
             
             const date = new Date(data.timestamp);
             const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
             const timeText = document.createTextNode(` [${timeString}]: `);
             senderSpan.appendChild(timeText);
             
             contentContainer.prepend(senderSpan);
             messageElement.appendChild(contentContainer);
             
             chatbox.appendChild(messageElement);
             chatbox.scrollTop = chatbox.scrollHeight;
        }

        
        // --- ΛΟΓΙΚΗ FORMATTING BUTTONS (ΠΛΗΡΩΣ ΛΕΙΤΟΥΡΓΙΚΗ) ---
        boldBtn.addEventListener('click', () => toggleFormatting('isBold', boldBtn));
        italicBtn.addEventListener('click', () => toggleFormatting('isItalic', italicBtn));
        
        colorBtn.addEventListener('click', () => { colorPicker.click(); });

        colorPicker.addEventListener('input', (e) => {
            formattingState.color = e.target.value;
            colorBtn.style.backgroundColor = e.target.value;
            colorBtn.classList.add('active'); 
            
            // ΕΠΙΒΟΛΗ: Εφαρμογή χρώματος στο input (χρησιμοποιούμε setProperty για να παρακάμψουμε το CSS !important)
            messageInput.style.setProperty('color', e.target.value, 'important');
        });
        
        function toggleFormatting(formatKey, button) {
            if (formatKey === 'color') { return; }
            formattingState[formatKey] = !formattingState[formatKey];
            button.classList.toggle('active', formattingState[formatKey]);
            
            // Προεπισκόπηση στο input
            messageInput.style.fontWeight = formattingState.isBold ? 'bold' : 'normal';
            messageInput.style.fontStyle = formattingState.isItalic ? 'italic' : 'normal';
        }
        
        // --- SEND MESSAGE LOGIC (ΠΕΡΙΛΑΜΒΑΝΕΙ RESET) ---
        sendBtn.addEventListener('click', () => {
            const rawMessage = messageInput.value.trim();
            if (rawMessage && ws.readyState === WebSocket.OPEN) {
                const formattedMessage = JSON.stringify({
                    text: rawMessage,
                    isBold: formattingState.isBold,
                    isItalic: formattingState.isItalic,
                    color: formattingState.color
                });
                
                ws.send(JSON.stringify({ type: 'chatMessage', message: formattedMessage }));
                messageInput.value = '';
                
                // Reset formatting state and buttons after sending
                formattingState = { isBold: false, isItalic: false, color: '#FFFFFF' };
                boldBtn.classList.remove('active');
                italicBtn.classList.remove('active');
                colorBtn.style.backgroundColor = 'rgba(0, 123, 255, 0.5)';
                colorBtn.classList.remove('active');
                
                // Reset input bar style (Επαναφορά χρώματος σε λευκό)
                messageInput.style.fontWeight = 'normal';
                messageInput.style.fontStyle = 'normal';
                messageInput.style.setProperty('color', 'white', 'important'); 
            } else if (ws.readyState !== WebSocket.OPEN) {
                 alert('Η σύνδεση στο chat δεν είναι έτοιμη.');
            }
        });

        // --- ΑΠΟΣΤΟΛΗ ΜΕ ENTER ---
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { 
                e.preventDefault(); 
                sendBtn.click(); 
            }
        });
        
        // --- CLOSING PANELS LOGIC ---
        document.addEventListener('click', (e) => { 
            const clickedInsideMenu = settingsMenu.contains(e.target) || menuToggleBtn.contains(e.target);
            const clickedInsideAdmin = adminPanel.contains(e.target);
            const clickedInsideSettings = profileSettings.contains(e.target);

            if (settingsMenu.style.display === 'flex' && !clickedInsideMenu) {
                settingsMenu.style.display = 'none';
            }
            if (adminPanel.style.display === 'block' && !clickedInsideAdmin && e.target !== menuAdminBtn) {
                 adminPanel.style.display = 'none';
            }
            if (profileSettings.style.display === 'block' && !clickedInsideSettings && e.target !== menuProfileBtn) {
                 profileSettings.style.display = 'none';
            }
        });


        // ... (emoji/gif logic - Πρέπει να προστεθεί εάν χρειάζεται) ...
    }); 
</script>
</body>
</html>
