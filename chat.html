<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- CSS STYLING: FULL SCREEN, TRANSPARENT MESSAGES & COLORED NAMES --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Merriweather', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5; 
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            max-width: none; 
            max-height: none; 
            background: none; 
            box-shadow: none; 
            border-radius: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* --- HEADER (Διαφανές με Blur) --- */
        #header {
            padding: 15px;
            background: rgba(0, 123, 255, 0.6); 
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; 
            backdrop-filter: blur(5px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10; 
        }
        #header h2 {
            margin: 0;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        #logoutBtn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        #logoutBtn:hover {
            background-color: #c82333;
        }
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            border-bottom: none; 
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: none; 
            display: flex;
            flex-direction: column;
            position: relative; 

            /* BACKGROUND IMAGE */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- DARK OVERLAY (70% opacity) --- */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 1; 
        }
        
        /* --- ΑΛΛΑΓΗ 1: ΕΝΤΕΛΩΣ ΔΙΑΦΑΝΗ ΜΗΝΥΜΑΤΑ --- */
        .message {
            z-index: 2; 
            margin-bottom: 12px; 
            padding: 5px 0; /* Μικρότερο padding & 0 αριστερά/δεξιά */
            border-radius: 0; 
            word-wrap: break-word;
            max-width: 80%; 
            position: relative;
            
            align-self: flex-start !important; 
            
            display: flex;
            align-items: flex-start;
            
            background: none !important; /* Κανένα background */
            backdrop-filter: none; /* Κανένα blur */
            box-shadow: none; /* Καμία σκιά πλαισίου */
        }
        
        /* Βασικό χρώμα κειμένου μηνυμάτων: Λευκό + ΣΚΙΑ (για αναγνωσιμότητα) */
        .message-content {
             /* Δυνατή σκιά για να φαίνεται πάνω σε κάθε φόντο */
             text-shadow: 1px 1px 4px rgba(0, 0, 0, 1), 0 0 2px rgba(255, 255, 255, 0.5); 
             color: white; 
             font-weight: 400; 
        }
        
        /* Χρωματισμός Ονόματος Χρήστη */
        .message .sender {
             font-weight: 700;
             /* Ελαφριά σκιά στο όνομα */
             text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9); 
        }
        
        /* Χρώματα Ρόλων */
        .user-message .sender { color: #ffffff; }
        .moderator-message .sender { color: #99FFFF; }
        .admin-message .sender { color: #FFD700; }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.6); 
            flex-shrink: 0; 
        }

        /* --- INPUT BAR & BUTTONS (Διαφανές) --- */
        #input-container {
            display: flex;
            padding: 15px; 
            border-top: none; 
            position: relative;
            background-color: transparent; 
            flex-shrink: 0; 
            flex-wrap: nowrap; 
            z-index: 10;
        }

        #formatting-bar {
            display: none !important; 
        }

        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 5px;
            margin-right: 10px;
            background-color: rgba(255, 255, 255, 0.1); 
            color: white; 
        }
        #messageInput::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* --- ΑΛΛΑΓΗ 2: ΕΠΑΝΑΦΟΡΑ ΚΟΥΜΠΙΩΝ --- */
        #sendBtn, #emojiBtn, #gifBtn, #urlBtn {
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
            background-color: rgba(0, 123, 255, 0.7); 
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        #sendBtn:hover, #emojiBtn:hover, #gifBtn:hover, #urlBtn:hover {
            background-color: #007bff; 
        }
        /* Εμφάνιση των κουμπιών */
        #emojiBtn, #gifBtn {
             display: inline-block !important; 
        }
        /* Το urlBtn θα προστεθεί στο HTML */

        /* Εμφάνιση των panels */
        #emojiPicker, #gifPicker {
            position: absolute;
            bottom: 75px;
            right: 15px;
            z-index: 1000;
            display: none;
        }
        #gifPicker {
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #gifResults {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
        #gifResults img {
            width: 100%;
            height: auto;
            cursor: pointer;
            border-radius: 4px;
        }
        /* --- ΥΠΟΛΟΙΠΑ STYLES --- */
        .message-content-container {
            display: flex;
            flex-direction: column;
            padding-top: 3px; 
        }
        .message .sender {
            display: block;
            margin-bottom: 2px;
            display: flex; 
            align-items: center;
        }
        .message-content {
            display: inline-block;
        }
        .message img.gif {
            max-width: 100%;
            border-radius: 4px;
            display: block;
            margin-top: 5px;
        }
        .admin-badge {
            background-color: #f5c518;
            color: black; 
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
            text-shadow: none; 
        }
        .delete-btn {
            background-color: transparent;
            color: #dc3545;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            padding: 0;
            margin-left: 10px;
            line-height: 1; 
            text-shadow: none; 
        }
        .settings-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        #current-avatar-container {
            text-align: center;
            margin-bottom: 15px;
        }
        #current-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #007bff;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="header">
            <h2>Chatbox - Webradio Akoyme</h2>
            <div style="display: flex; align-items: center;">
                <button id="settingsBtn" class="settings-btn">Ρυθμίσεις</button>
                <button id="logoutBtn">Αποσύνδεση</button>
            </div>
        </div>
        <div id="chatbox-container">
            <div id="chatbox"></div>
            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        <div id="input-container">
            <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
            <button id="urlBtn">URL</button> <button id="emojiBtn">😊</button>
            <button id="gifBtn">GIF</button>
            <button id="sendBtn" disabled>Αποστολή</button>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker"></emoji-picker>

    <div id="gifPicker">
        <input type="text" id="gifSearchInput" placeholder="Αναζήτηση GIF...">
        <div id="gifResults"></div>
    </div>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        const adminPanel = document.getElementById('admin-panel');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const savePdfBtn = document.getElementById('savePdfBtn');
        const userListDiv = document.getElementById('userList');
        const settingsBtn = document.getElementById('settingsBtn');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        const avatarForm = document.getElementById('avatar-form');
        
        const urlBtn = document.getElementById('urlBtn'); // ΝΕΟ
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');
        const gifPicker = document.getElementById('gifPicker');
        const gifSearchInput = document.getElementById('gifSearchInput');
        const gifResults = document.getElementById('gifResults');

        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        const GIPHY_API_KEY = 'UQxRacYoTn67CWCJ5zbdOvUnzmU0QnUs'; 

        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        sendBtn.disabled = true; 
        sendBtn.textContent = 'Σύνδεση...';
        
        ws.onopen = () => {
             console.log('WebSocket Connected!');
             sendBtn.disabled = false; 
             sendBtn.textContent = 'Αποστολή';
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket Error:', error);
            sendBtn.textContent = 'Σφάλμα';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'oldMessages':
                    chatbox.innerHTML = '';
                    data.messages.forEach(message => appendMessage(message)); 
                    break;
                case 'newMessage':
                    appendMessage(data);
                    break;
                case 'deleteMessage':
                    deleteMessage(data.messageId);
                    break;
                case 'clearChat':
                    chatbox.innerHTML = '';
                    break;
            }
        };

        // --- ΛΟΓΙΚΗ ΓΙΑ AVATAR, ADMIN PANEL & USER INFO ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                let avatarSource = '/uploads/default-avatar.png';
                if (data.avatarUrl && data.avatarUrl !== 'default-avatar.png') {
                    if (data.avatarUrl.startsWith('/')) {
                        avatarSource = data.avatarUrl;
                    } else {
                        avatarSource = `/uploads/${data.avatarUrl}`; 
                    }
                } else if (data.avatarUrl && data.avatarUrl.includes('/uploads/')) {
                     avatarSource = data.avatarUrl;
                }
                
                currentAvatar.src = avatarSource;
                
                if (data.role === 'admin') {
                    const adminButton = document.createElement('button');
                    adminButton.id = 'adminPanelBtn';
                    adminButton.classList.add('settings-btn');
                    adminButton.textContent = 'Admin Panel';
                    
                    adminButton.addEventListener('click', () => {
                        if (adminPanel.style.display === 'block') {
                            adminPanel.style.display = 'none';
                        } else {
                            adminPanel.style.display = 'block';
                            if (profileSettings.style.display === 'block') {
                                profileSettings.style.display = 'none';
                            }
                        }
                    });
                    document.getElementById('header').querySelector('div').prepend(adminButton);
                    
                    loadAdminPanel(); 
                }
            })
            .catch(error => {
                console.error('Σφάλμα κατά την ανάκτησης πληροφοριών χρήστη:', error);
            });
        
        settingsBtn.addEventListener('click', () => { /* ... unchanged ... */ });
        document.addEventListener('click', (e) => { /* ... unchanged ... */ });
        async function loadAdminPanel() { /* ... unchanged ... */ }
        clearHistoryBtn.addEventListener('click', async () => { /* ... unchanged ... */ });
        savePdfBtn.addEventListener('click', () => { /* ... unchanged ... */ });
        avatarForm.addEventListener('submit', async (e) => { /* ... unchanged ... */ });

        function appendMessage(data) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.dataset.messageId = data.id || data.messageId; 
            messageElement.dataset.userId = data.user_id || data.userId;

            switch (data.role) {
                case 'admin':
                    messageElement.classList.add('admin-message');
                    break;
                case 'moderator':
                    messageElement.classList.add('moderator-message');
                    break;
                default:
                    messageElement.classList.add('user-message');
                    break;
            }
            
            const avatarImg = document.createElement('img');
            avatarImg.classList.add('avatar');
            
            let avatarUrl = '/uploads/default-avatar.png';
            if (data.avatar_url || data.avatarUrl) {
                const providedUrl = data.avatar_url || data.avatarUrl;
                 if (providedUrl.startsWith('/')) {
                     avatarUrl = providedUrl;
                 } else if (providedUrl !== 'default-avatar.png') {
                     avatarUrl = `/uploads/${providedUrl}`;
                 }
            }
            avatarImg.src = avatarUrl; 
            messageElement.appendChild(avatarImg);
            
            const contentContainer = document.createElement('div');
            contentContainer.classList.add('message-content-container');
            
            const senderSpan = document.createElement('span');
            senderSpan.classList.add('sender');
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = data.displayName;
            if (data.role === 'admin') {
                const adminBadge = document.createElement('span');
                adminBadge.classList.add('admin-badge');
                adminBadge.textContent = 'Admin';
                nameSpan.appendChild(adminBadge);
            }
            
            senderSpan.appendChild(nameSpan);

            const isGif = data.message && (data.message.startsWith('http://') || data.message.startsWith('https://')) && (data.message.includes('giphy.com') || data.message.includes('media'));
            
            if (isGif) {
                const gifImage = document.createElement('img');
                gifImage.src = data.message;
                gifImage.classList.add('gif');
                contentContainer.appendChild(gifImage);
            } else {
                const messageText = document.createElement('span');
                messageText.classList.add('message-content');
                
                let text = data.message;
                
                // *** ΕΛΕΓΧΟΣ ΓΙΑ URL (Απλή αντικατάσταση κειμένου με <a>) ***
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                if (urlRegex.test(text)) {
                    // Αν υπάρχει URL, το αντικαθιστούμε με clickable link
                    const parts = text.split(urlRegex);
                    parts.forEach(part => {
                        if (urlRegex.test(part)) {
                            const link = document.createElement('a');
                            link.href = part;
                            link.textContent = part;
                            link.target = '_blank';
                            link.style.color = '#79d1ff'; // Φωτεινό μπλε για τα links
                            link.style.textShadow = '1px 1px 2px rgba(0, 0, 0, 0.5)';
                            contentContainer.appendChild(link);
                        } else {
                            contentContainer.appendChild(document.createTextNode(part));
                        }
                    });
                    
                } else {
                    messageText.textContent = text;
                    contentContainer.appendChild(messageText);
                }
            }

            
            const date = new Date(data.timestamp);
            const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const timeText = document.createTextNode(` [${timeString}]: `);
            senderSpan.appendChild(timeText);

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.innerHTML = '&#x2715;';
            deleteBtn.title = 'Διαγραφή μηνύματος';
            
            if (currentUserRole === 'admin') { 
                deleteBtn.style.display = 'inline-block'; 
                deleteBtn.addEventListener('click', async () => {
                    if (confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μήνυμα;')) {
                        try {
                            const messageId = data.id || data.messageId;
                            const res = await fetch(`/delete-message/${messageId}`, { method: 'DELETE' }); 
                            if (!res.ok) {
                                const errorText = await res.text();
                                alert(`Αποτυχία διαγραφής μηνύματος: ${errorText}`); 
                            }
                        } catch (error) {
                            console.error('Error deleting message:', error);
                        }
                    }
                });
            } else {
                deleteBtn.style.display = 'none'; 
            }

            if (currentUserRole === 'admin') {
                senderSpan.appendChild(deleteBtn);
            }

            contentContainer.prepend(senderSpan);
            messageElement.appendChild(contentContainer);
            
            chatbox.appendChild(messageElement);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function deleteMessage(messageId) { /* ... unchanged ... */ }

        sendBtn.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if (message) {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'chatMessage', message: message }));
                    messageInput.value = '';
                } else {
                    alert('Η σύνδεση στο chat δεν είναι έτοιμη. Δοκιμάστε να ανανεώσετε τη σελίδα.');
                }
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        logoutBtn.addEventListener('click', async () => { /* ... unchanged ... */ });

        // --- ΛΟΓΙΚΗ ΓΙΑ EMOJI/GIF BUTTONS & PANELS ---
        
        let gifVisible = false;
        let emojiVisible = false;

        urlBtn.addEventListener('click', () => {
            // Αυτό το κουμπί απλά βάζει το http:// στο input για διευκόλυνση
            messageInput.value += 'http://';
            messageInput.focus();
        });

        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (gifVisible) {
                gifPicker.style.display = 'none';
                gifVisible = false;
            }
            emojiPicker.style.display = emojiVisible ? 'none' : 'block';
            emojiVisible = !emojiVisible;
        });

        emojiPicker.addEventListener('emoji-click', event => {
            messageInput.value += event.detail.unicode;
            messageInput.focus();
        });

        gifBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (emojiVisible) {
                emojiPicker.style.display = 'none';
                emojiVisible = false;
            }
            gifPicker.style.display = gifVisible ? 'none' : 'block';
            gifVisible = !gifVisible;
            if (gifVisible) searchGifs('trending');
        });

        document.addEventListener('click', (e) => {
            if (gifVisible && !gifPicker.contains(e.target) && e.target !== gifBtn) {
                gifPicker.style.display = 'none';
                gifVisible = false;
            }
            if (emojiVisible && !emojiPicker.contains(e.target) && e.target !== emojiBtn) {
                emojiPicker.style.display = 'none';
                emojiVisible = false;
            }
        });

        gifSearchInput.addEventListener('input', () => {
            searchGifs(gifSearchInput.value);
        });

        async function searchGifs(query = 'trending') {
            const url = query === 'trending' 
                ? `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_API_KEY}&limit=10&rating=g`
                : `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${query}&limit=10&rating=g`;
            
            try {
                const response = await fetch(url);
                const result = await response.json();
                displayGifs(result.data);
            } catch (error) {
                console.error('Error fetching GIFs:', error);
                gifResults.innerHTML = '<p>Σφάλμα φόρτωσης GIF.</p>';
            }
        }

        function displayGifs(gifs) {
            gifResults.innerHTML = '';
            gifs.forEach(gif => {
                const img = document.createElement('img');
                img.src = gif.images.fixed_height_small.url; 
                img.alt = gif.title;
                img.addEventListener('click', () => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'chatMessage', message: gif.images.original.url }));
                        gifPicker.style.display = 'none';
                        gifVisible = false;
                        messageInput.value = ''; 
                    }
                });
                gifResults.appendChild(img);
            });
        }
    }); 
</script>
</body>
</html>
