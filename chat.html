<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <title>Web Radio Chatbox</title>
	
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- GLOBAL & STRUCTURE --- */
        :root {
            --primary-accent: #FF5733; /* Ζωντανό Πορτοκαλί/Κόκκινο (Radio Vibe) */
            --secondary-accent: #FFC300; /* Χαρούμενο Κίτρινο */
            --text-color: #E0E0E0;
            --dark-bg: rgba(18, 18, 18, 0.95);
        }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            background-color: #ccf5f5; 
            color: var(--text-color);
	        background-image: url('static/akoyme_background.png'); 
            background-size: 100% 100%; /* Responsive Background */
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* --- CHATBOX & BACKGROUND --- */
        #chatbox {
            flex-grow: 1; 
            overflow-y: auto;
            padding: 20px 20px 0;
            background-color: transparent; 
        }

        /* --- TOP BAR --- */
        #top-bar {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--dark-bg); 
            box-shadow: 0 2px 8px rgba(255, 87, 51, 0.4); 
            z-index: 10;
        }
        
        #top-bar h1 {
            margin: 0;
            font-size: 1.5em;
            color: var(--primary-accent); 
        }

        #top-bar button {
            background-color: transparent;
            color: var(--text-color);
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1em;
            transition: color 0.2s, transform 0.2s;
        }

        #top-bar button:hover {
            color: var(--secondary-accent);
            transform: scale(1.1); 
        }
        
        /* --- MESSAGE INPUT ROW --- */
        #messageInputRow {
            display: flex;
            align-items: center; 
            padding: 10px 20px;
            border-top: 2px solid var(--primary-accent); 
            background-color: rgba(31, 31, 31, 0.90); 
            z-index: 10;
        }

        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 8px;
            margin-right: 10px;
            background-color: #333;
            color: var(--text-color);
            font-size: 1em;
            outline: none;
            resize: none; 
            height: 40px; 
            line-height: 20px;
            overflow: auto;
            transition: border-color 0.3s;
        }
        
        #messageInput:focus {
            border-color: var(--primary-accent); 
        }

        #messageInputRow button {
            background-color: var(--primary-accent);
            color: #121212;
            border: none;
            padding: 10px 15px;
            border-radius: 8px; 
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.2s;
            margin-left: 5px;
        }

        #messageInputRow button:hover {
            background-color: var(--secondary-accent);
            transform: translateY(-2px); 
        }
        
        /* --- MESSAGE STYLES --- */
        .message-element {
            display: flex;
            margin-bottom: 5px; 
            align-items: flex-start;
            position: relative; 
            justify-content: flex-start; 
        }
        
        .message-element.self {
             justify-content: flex-end; 
        }

        .message-content-container {
            max-width: 70%;
            padding: 0; 
            background-color: transparent; 
            box-shadow: none; 
        }
        
        .sender-info {
            font-size: 0.9em; 
            color: var(--secondary-accent); 
            font-weight: bold;
            text-shadow: 1px 1px 3px #000; 
            display: block; 
            margin-bottom: 3px;
        }
        
        /* Admin-Specific Styling */
        .sender-info.admin {
            color: #FF5555; 
        }
        
        .message-content {
            font-size: 1.1em; 
            text-shadow: 1px 1px 3px #000; 
            display: block; 
        }

        /* --- IMAGE MESSAGE STYLES (GIFS/FILES) --- */
        .message-content-container img {
            max-width: 300px; 
            height: auto;
            border-radius: 8px;
            display: block;
            margin-top: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s;
        }
        
        .message-content-container img:hover {
             transform: scale(1.02);
             box-shadow: 0 4px 15px rgba(255, 87, 51, 0.6);
        }
        
        /* Avatar placeholder (ΝΕΟ) */
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #4CAF50; /* Default color */
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            color: white;
            margin-right: 10px;
            flex-shrink: 0;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            /* Εφαρμόστε το margin/position ανάλογα αν το βάλετε αριστερά/δεξιά */
        }
        
        .message-element.self .avatar {
            margin-right: 0;
            margin-left: 10px;
            order: 2; /* Το avatar να είναι δεξιά για τα δικά μου μηνύματα */
        }

        /* --- FORMATTING BUTTONS --- */
        #formatting-buttons {
             display: flex;
             gap: 5px;
             margin-right: 10px;
             align-items: center;
        }
        
        #formatting-buttons button {
            padding: 8px;
            background-color: #333;
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        #formatting-buttons button.active {
            background-color: var(--primary-accent);
            color: #121212;
        }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8); }
        .modal-content { 
            background-color: #1f1f1f; 
            margin: 10% auto; 
            padding: 20px; 
            border: 2px solid var(--primary-accent); 
            width: 80%; 
            max-width: 500px;
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            max-height: 80vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* Emoji Grid Styles */
        .emoji-grid {
             display: grid;
             grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); 
             gap: 5px; 
             overflow-y: auto; 
             padding-top: 10px; 
             text-align: center;
        }
        
        .emoji-item {
            font-size: 28px; 
            cursor: pointer;
            transition: transform 0.1s;
        }

    </style>
</head>
<body>
    
    <audio id="chatSound" src="static/chat_notification.mp3" preload="auto"></audio> 

    <div class="container">
        <div id="top-bar">
            <h1><i class="fas fa-headphones-alt"></i> Web Radio Chat</h1>
            <div>
                 <button id="settingsBtn" title="Settings"><i class="fas fa-cog"></i> Settings</button> <button id="adminPanelButton" title="Admin Panel" style="display:none;"><i class="fas fa-user-shield"></i> Admin</button>
                <button id="logoutButton"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div id="chatbox">
            </div>

        <div id="messageInputRow">
            <div id="formatting-buttons">
                <button id="boldBtn" title="Bold"><i class="fas fa-bold"></i></button>
                <button id="italicBtn" title="Italic"><i class="fas fa-italic"></i></button> 
                <button id="urlBtn" title="Insert URL"><i class="fas fa-link"></i></button> <button id="emoticonBtn" title="Emoticons"><i class="far fa-smile"></i></button>
                <button id="color-picker-btn" title="Text Color">
                    <i class="fas fa-palette"></i>
                    <input type="color" id="colorPicker" value="#E0E0E0">
                </button>
            </div>

            <textarea id="messageInput" placeholder="Πες μας τη γνώμη σου ή στείλε αφιέρωση!"></textarea> 

            <div id="media-buttons">
                <button id="giphyBtn" title="Giphy Search"><i class="fas fa-gift"></i></button>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button id="attachFileBtn" title="Attach Image"><i class="fas fa-paperclip"></i></button>
            <button id="sendButton"><i class="fas fa-paper-plane"></i> Send</button>
        </div>
    </div>

    <div id="giphyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Search GIPHY</h2>
                <span class="close-btn" onclick="document.getElementById('giphyModal').style.display='none'" style="position: absolute; top: 10px; right: 20px; font-size: 1.5em; cursor: pointer;">&times;</span>
            </div>
            <div style="display: flex; margin-bottom: 15px;">
                <input type="text" id="giphySearchInput" class="giphy-search-input" placeholder="Search GIFs...">
                <button id="searchGiphyBtn">Search</button>
            </div>
            <div class="giphy-grid" id="giphyGrid" style="overflow-y: auto;">
                </div>
        </div>
    </div>
    
    <div id="emojiModal" class="modal">
        <div class="modal-content" style="max-width: 400px; margin-top: 5%;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Select Emoji</h2>
                <button class="close-btn" onclick="document.getElementById('emojiModal').style.display='none'" style="background:none; color:white; font-size:1.5em; cursor: pointer;">&times;</button>
            </div>
            <div class="emoji-grid" id="emojiGrid">
                </div>
        </div>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content" style="max-width: 450px; margin-top: 10%;">
             <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="fas fa-cogs"></i> Ρυθμίσεις Χρήστη</h2>
                <button class="close-btn" onclick="document.getElementById('settingsModal').style.display='none'" style="background:none; color:white; font-size:1.5em; cursor: pointer;">&times;</button>
            </div>
            
            <div style="margin-top: 20px;">
                <h3><i class="fas fa-user-circle"></i> Avatar</h3>
                <input type="text" id="avatarInput" placeholder="URL εικόνας ή αρχικά (π.χ. JS)" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #555; background-color: #333; color: white;">
                <button onclick="saveAvatarSettings()" style="margin-top: 10px; width: 100%; background-color: #4CAF50;">Αποθήκευση Avatar</button>
            </div>

            <div style="margin-top: 20px;">
                <h3><i class="fas fa-volume-up"></i> Ήχος Chat</h3>
                <label style="display: block; margin-bottom: 10px;">
                    <input type="checkbox" id="soundToggle" checked> Ενεργοποίηση ήχου ειδοποίησης μηνυμάτων
                </label>
                <p style="font-size: 0.8em; color: #aaa;">(Βεβαιωθείτε ότι έχετε το αρχείο `static/chat_notification.mp3` στο server)</p>
            </div>
        </div>
    </div>


<script>
    let socket = null;
    let currentUserRole = null;
    let currentUserName = null;
    let appSettings = {}; 
    let userAvatarSetting = localStorage.getItem('userAvatar') || 'JS'; // Default Avatar
    let soundEnabled = localStorage.getItem('soundEnabled') === 'false' ? false : true;
    
    // Ενημερωμένη λίστα Emojis για Web Radio Vibe
    const EMOJI_LIST = [
        '🎧', '🎶', '🎤', '📻', '💃', '🕺', '🥳', '🎉', '🎁', '🎂', '🍻', '🥂', '🍾', '🔥', '💖', '🌟', '🤣', '😂', '😊', '😍', '😎', '👍', '🙏', '🙌', '👏', '🎵', '🎹', '🎸', '🥁', '🎺', '🎷', '😇', '😈', '🤯', '🤩', '😘', '🤪'
    ];
    
    // --- UTILITIES ---
    
    async function initializeChat() {
        const response = await fetch('/check_login');
        if (!response.ok) {
            window.location.href = '/login.html';
            return;
        }
        
        const userData = await response.json();
        currentUserRole = userData.role;
        currentUserName = userData.display_name;

        if (currentUserRole === 'admin') {
            document.getElementById('adminPanelButton').style.display = 'inline-block';
        }

        await loadAndApplySettings();

        socket = io({
             transports: ['websocket'],
             upgrade: false
        }); 
        
        // Initialize sound toggle state
        document.getElementById('soundToggle').checked = soundEnabled;
        document.getElementById('avatarInput').value = userAvatarSetting;

        // --- SOCKETIO EVENTS ---
        socket.on('connect', () => {
            console.log(`Συνδέθηκε στο chat ως: ${currentUserName}`);
        });

        socket.on('message', (data) => {
            displayMessage(data);
            if (soundEnabled && data.displayName !== currentUserName) {
                 // Play sound only for messages from others
                 document.getElementById('chatSound').play().catch(e => console.log("Sound play prevented."));
            }
        });
        
        socket.on('userStatus', (data) => {
             if (data.displayName !== currentUserName) { 
                displayMessage({
                    displayName: data.displayName,
                    message: `{"text": "${data.status === 'connected' ? 'joined the party! 🎉' : 'faded out. 📻'}"}`,
                    timestamp: new Date().toISOString(), 
                    role: 'system' 
                });
             }
        });
        
        renderEmojis();
    }

    async function loadAndApplySettings() {
        try {
            const response = await fetch('/api/settings');
            if (!response.ok) { throw new Error('Failed to fetch settings'); }
            appSettings = await response.json();
        } catch (error) {
            console.error('Error applying settings:', error);
            appSettings = { allow_gif_searches: 'true', default_font_color: '#E0E0E0' }; // Default fallback
        }
    }


    const chatbox = document.getElementById('chatbox');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const logoutButton = document.getElementById('logoutButton');
    const boldBtn = document.getElementById('boldBtn');
    const italicBtn = document.getElementById('italicBtn');
    const urlBtn = document.getElementById('urlBtn'); // ΝΕΟ
    const emoticonBtn = document.getElementById('emoticonBtn');
    const colorPicker = document.getElementById('colorPicker');
    const attachFileBtn = document.getElementById('attachFileBtn');
    const fileInput = document.getElementById('fileInput');
    const giphyBtn = document.getElementById('giphyBtn');
    const giphyModal = document.getElementById('giphyModal');
    const searchGiphyBtn = document.getElementById('searchGiphyBtn');
    const giphySearchInput = document.getElementById('giphySearchInput');
    const giphyGrid = document.getElementById('giphyGrid');
    const emojiModal = document.getElementById('emojiModal'); 
    const emojiGrid = document.getElementById('emojiGrid'); 
    const settingsBtn = document.getElementById('settingsBtn'); // ΝΕΟ
    const settingsModal = document.getElementById('settingsModal'); // ΝΕΟ
    const soundToggle = document.getElementById('soundToggle');


    let isBold = false;
    let isItalic = false; 
    let selectedColor = '#E0E0E0';

    function sendMessage(textOrUrl, isFile = false) {
        if (!socket || (textOrUrl.trim() === '' && !isFile)) return;
        
        const messageFormat = {};

        if (isFile) {
             messageFormat.url = textOrUrl;
        } else {
            messageFormat.text = textOrUrl;
        }

        messageFormat.isBold = isBold;
        messageFormat.isItalic = isItalic; 
        messageFormat.color = selectedColor;

        socket.emit('message', JSON.stringify(messageFormat));

        messageInput.value = '';
        
        // Επαναφορά formatting
        isBold = false;
        boldBtn.classList.remove('active');
        isItalic = false; 
        italicBtn.classList.remove('active');
        selectedColor = '#E0E0E0';
        colorPicker.value = '#E0E0E0';
        messageInput.style.fontWeight = 'normal';
        messageInput.style.fontStyle = 'normal';
    }
    
    // --- EVENT LISTENERS ---
    
    sendButton.addEventListener('click', () => {
        sendMessage(messageInput.value.trim());
    });

    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage(messageInput.value.trim());
        }
    });

    logoutButton.addEventListener('click', async () => {
        try {
            const response = await fetch('/logout', { method: 'POST' });
            const result = await response.json();
            if (response.ok) {
                window.location.href = result.redirect || '/login.html'; 
            } else {
                alert('Logout failed.');
            }
        } catch (error) {
            console.error('Error during logout:', error);
            alert('An error occurred during logout.');
        }
    });
    
    // --- FORMATTING LISTENERS ---
    boldBtn.addEventListener('click', () => {
        isBold = !isBold;
        boldBtn.classList.toggle('active', isBold);
        messageInput.style.fontWeight = isBold ? 'bold' : 'normal';
    });

    italicBtn.addEventListener('click', () => {
        isItalic = !isItalic; 
        italicBtn.classList.toggle('active', isItalic);
        messageInput.style.fontStyle = isItalic ? 'italic' : 'normal';
    });
    
    // ΝΕΟ: URL Button Logic
    urlBtn.addEventListener('click', () => {
        const url = prompt("Εισάγετε το URL:");
        if (url) {
            const currentText = messageInput.value;
            // Προσθέτουμε το URL στο τέλος (θα αναγνωριστεί ως link στο displayMessage)
            messageInput.value = currentText + ' ' + url;
            messageInput.focus();
        }
    });
    
    emoticonBtn.addEventListener('click', () => {
        emojiModal.style.display = 'block';
    });
    
    // Ρυθμίσεις Modal
    settingsBtn.addEventListener('click', () => {
        // Ενημέρωση της τιμής του input με την τρέχουσα ρύθμιση
        document.getElementById('avatarInput').value = localStorage.getItem('userAvatar') || '';
        document.getElementById('soundToggle').checked = soundEnabled;
        settingsModal.style.display = 'block';
    });
    
    // Λογική Sound Toggle
    soundToggle.addEventListener('change', () => {
        soundEnabled = soundToggle.checked;
        localStorage.setItem('soundEnabled', soundEnabled);
    });
    
    function saveAvatarSettings() {
        const avatarValue = document.getElementById('avatarInput').value.trim();
        userAvatarSetting = avatarValue;
        localStorage.setItem('userAvatar', avatarValue);
        settingsModal.style.display = 'none';
        alert('Οι ρυθμίσεις αποθηκεύτηκαν! Το Avatar θα ενημερωθεί στα επόμενα μηνύματα.');
    }
    
    function renderEmojis() {
        emojiGrid.innerHTML = '';
        EMOJI_LIST.forEach(emoji => {
            const span = document.createElement('span');
            span.classList.add('emoji-item');
            span.textContent = emoji;
            span.title = emoji;
            span.addEventListener('click', () => {
                const start = messageInput.selectionStart;
                const end = messageInput.selectionEnd;
                const value = messageInput.value;
                messageInput.value = value.substring(0, start) + emoji + value.substring(end);
                messageInput.selectionStart = messageInput.selectionEnd = start + emoji.length;
                
                emojiModal.style.display = 'none';
                messageInput.focus();
            });
            emojiGrid.appendChild(span);
        });
    }

    colorPicker.addEventListener('input', (e) => {
        selectedColor = e.target.value;
    });

    // --- FILE UPLOAD LISTENERS ---
    attachFileBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file); 
        
        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const result = await response.json();
                sendMessage(result.url, true); 
            } else {
                alert('Σφάλμα κατά την αποστολή αρχείου: ' + response.statusText);
            }
        } catch (error) {
            console.error('Upload error:', error);
            alert('Σφάλμα δικτύου κατά την αποστολή αρχείου.');
        }
        fileInput.value = ''; 
    });
    
    // --- GIPHY LISTENERS ---
    giphyBtn.addEventListener('click', () => {
        if (appSettings.allow_gif_searches === 'true') { 
            giphyModal.style.display = 'block';
            giphySearchInput.value = '';
            giphyGrid.innerHTML = ''; // Clear previous results
            searchGiphy(); // Show trending by default
        } else {
            alert('Η αναζήτηση GIF είναι απενεργοποιημένη από τον διαχειριστή.');
        }
    });
    
    // Fix: Close Modals when clicking outside
    window.addEventListener('click', (event) => {
        if (event.target === giphyModal) {
            giphyModal.style.display = 'none';
        }
        if (event.target === emojiModal) {
            emojiModal.style.display = 'none';
        }
        if (event.target === settingsModal) {
            settingsModal.style.display = 'none';
        }
    });
    
    searchGiphyBtn.addEventListener('click', () => {
        searchGiphy(giphySearchInput.value);
    });
    
    giphySearchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            searchGiphy(giphySearchInput.value);
        }
    });
    
    async function searchGiphy(query = 'trending') {
        const apiKey = 'UQxRacYoTn67CWCJ5zbdOvUnzmU0QnUs'; 
        let url;
        
        if (query === 'trending' || !query.trim()) {
            url = `https://api.giphy.com/v1/gifs/trending?api_key=${apiKey}&limit=20`;
        } else {
            url = `https://api.giphy.com/v1/gifs/search?api_key=${apiKey}&q=${encodeURIComponent(query)}&limit=20`;
        }

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            giphyGrid.innerHTML = ''; 
            
            data.data.forEach(gif => {
                const img = document.createElement('img');
                img.src = gif.images.fixed_height.url;
                img.alt = gif.title;
                
                img.addEventListener('click', () => {
                    // Στέλνουμε το GIF URL
                    sendMessage(img.src, true); 
                    giphyModal.style.display = 'none';
                });
                
                giphyGrid.appendChild(img);
            });
            
        } catch (error) {
            console.error('Giphy search error:', error);
            giphyGrid.innerHTML = '<p style="color: red;">Failed to load GIFs. Check API Key or network.</p>';
        }
    }
    
    // --- Avatar Generator Function ---
    function createAvatarElement(displayName, avatarSetting) {
        const avatar = document.createElement('div');
        avatar.classList.add('avatar');
        
        // 1. Έλεγχος για URL εικόνας
        if (avatarSetting && avatarSetting.match(/^(http|https):\/\/[^ "]+$/)) {
            avatar.style.backgroundImage = `url('${avatarSetting}')`;
            avatar.style.backgroundSize = 'cover';
            avatar.style.backgroundColor = 'transparent';
            avatar.textContent = '';
        } 
        // 2. Έλεγχος για αρχικά
        else if (avatarSetting && avatarSetting.length <= 3) {
            avatar.textContent = avatarSetting.toUpperCase();
            // generate random color based on initials for better differentiation
            const hash = avatarSetting.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const color = `hsl(${hash % 360}, 70%, 50%)`;
            avatar.style.backgroundColor = color;
        }
        // 3. Default: Αρχικό του ονόματος
        else {
             const initials = displayName.charAt(0).toUpperCase();
             avatar.textContent = initials;
             const hash = displayName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
             const color = `hsl(${hash % 360}, 70%, 50%)`;
             avatar.style.backgroundColor = color;
        }

        return avatar;
    }
    
    // --- DISPLAY MESSAGE FUNCTION ---
    function displayMessage(data) {
             // System messages
             if (data.role === 'system') {
                 try {
                     const systemText = JSON.parse(data.message).text;
                     const systemMsg = document.createElement('div');
                     systemMsg.textContent = `${data.displayName} ${systemText}`;
                     // ... (System styling)
                     chatbox.appendChild(systemMsg);
                     chatbox.scrollTop = chatbox.scrollHeight;
                     return;
                 } catch (e) { 
                 }
             }

             const messageElement = document.createElement('div');
             messageElement.classList.add('message-element');
             
             const isSelf = data.displayName === currentUserName;
             if (isSelf) {
                 messageElement.classList.add('self');
             }
             
             // --- AVATAR ---
             // Εδώ πρέπει να βρούμε το σωστό avatar setting. Προσωρινά, χρησιμοποιούμε του τρέχοντος χρήστη για τον εαυτό μας
             // Και default για τους άλλους (σε πραγματικό chat θα ερχόταν από το backend)
             const avatarToUse = isSelf ? userAvatarSetting : data.displayName.charAt(0).toUpperCase(); 
             const avatarElement = createAvatarElement(data.displayName, avatarToUse);
             
             // --- MESSAGE CONTAINER ---
             const contentContainer = document.createElement('div');
             contentContainer.classList.add('message-content-container');
             
             const senderSpan = document.createElement('span');
             senderSpan.classList.add('sender-info');
             if (data.role === 'admin') { senderSpan.classList.add('admin'); }
             
             const nameSpan = document.createElement('span');
             nameSpan.textContent = data.displayName;
             senderSpan.appendChild(nameSpan);

             let text = data.message;
             
             const messageText = document.createElement('span');
             messageText.classList.add('message-content');
             
             // ΕΦΑΡΜΟΓΗ ΜΟΡΦΟΠΟΙΗΣΗΣ
             if (data.isBold) { messageText.style.fontWeight = 'bold'; }
             if (data.isItalic) { messageText.style.fontStyle = 'italic'; } 
             if (data.color) { messageText.style.color = data.color; } 
             
             
             const urlRegex = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
             
             if (text.match(urlRegex)) {
                 messageText.innerHTML = text.replace(urlRegex, function(url) {
                     // Αν είναι εικόνα/GIF/Video, την εμφανίζουμε (η λογική για τα gif)
                     if (/\.(gif|jpe?g|png|webp|mp4|webm|mov)$/i.test(url) || url.includes('giphy.com')) {
                         return `<img src="${url}" alt="media attachment">`;
                     }
                     // Αλλιώς, εμφανίζουμε hyperlink
                     return `<a href="${url}" target="_blank" style="color: var(--secondary-accent); text-decoration: underline; text-shadow: none;">${url}</a>`;
                 });
             } else {
                 messageText.innerHTML = text.replace(/\n/g, '<br>');
             }
             
             contentContainer.appendChild(messageText);

             const date = new Date(data.timestamp);
             const timeString = date.toLocaleString('el-GR', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
             });
             const timeText = document.createTextNode(` [${timeString}]: `);
             senderSpan.appendChild(timeText);
             
             contentContainer.prepend(senderSpan);
             
             // --- ΤΟΠΟΘΕΤΗΣΗ ---
             messageElement.appendChild(avatarElement); // Προσθέτουμε το avatar
             messageElement.appendChild(contentContainer);
             
             chatbox.appendChild(messageElement);
             chatbox.scrollTop = chatbox.scrollHeight;
        } 

    initializeChat();
</script>
