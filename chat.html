<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- CSS STYLING: FULL SCREEN, TRANSPARENT MESSAGES & COLORED NAMES --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Merriweather', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5; 
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            max-width: none; 
            max-height: none; 
            background: none; 
            box-shadow: none; 
            border-radius: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- ΑΛΛΑΓΗ 1: ΑΦΑΙΡΕΣΗ HEADER --- */
        #header {
            display: none !important; 
        }
        
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            border-bottom: none; 
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: none; 
            display: flex;
            flex-direction: column;
            position: relative; 

            /* BACKGROUND IMAGE */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- DARK OVERLAY (70% opacity) --- */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 1; 
        }
        
        /* --- ΕΝΤΕΛΩΣ ΔΙΑΦΑΝΗ ΜΗΝΥΜΑΤΑ --- */
        .message {
            z-index: 2; 
            margin-bottom: 12px; 
            padding: 5px 0; 
            border-radius: 0; 
            word-wrap: break-word;
            max-width: 80%; 
            position: relative;
            align-self: flex-start !important; 
            display: flex;
            align-items: flex-start;
            background: none !important; 
            backdrop-filter: none; 
            box-shadow: none; 
        }
        
        /* Κείμενο: Λευκό, ΧΩΡΙΣ βαριά ΣΚΙΑ */
        .message-content {
             text-shadow: none; 
             color: white; 
             font-weight: 400; 
        }
        
        /* Ονόματα: Ελαφρύ glow */
        .message .sender {
             font-weight: 700;
             text-shadow: 0 0 2px rgba(0, 0, 0, 0.8); 
        }
        
        /* Χρώματα Ρόλων */
        .user-message .sender { color: #ffffff; }
        .moderator-message .sender { color: #99FFFF; text-shadow: 0 0 5px rgba(153, 255, 255, 0.6); }
        .admin-message .sender { color: #FFD700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.6); }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.6); 
            flex-shrink: 0; 
        }

        /* --- INPUT BAR & BUTTONS: FULLY TRANSPARENT & ICONS ONLY --- */
        #input-container {
            display: flex;
            flex-direction: column; /* Για να μπει η μπάρα formatting από πάνω */
            padding: 10px 15px; 
            border-top: none; 
            position: relative;
            background-color: transparent !important; 
            box-shadow: none; 
            flex-shrink: 0; 
            z-index: 10;
        }

        #messageInputRow {
            display: flex;
            width: 100%;
            align-items: center;
        }

        #formatting-bar {
            display: flex;
            justify-content: flex-start;
            padding-bottom: 5px;
            width: 100%;
        }

        /* --- ΑΛΛΑΓΗ 3: ΜΟΝΟ ΕΙΚΟΝΙΔΙΑ & ΔΙΑΦΑΝΑ ΚΟΥΜΠΙΑ --- */
        .format-btn, #urlBtn, #emojiBtn, #gifBtn, #sendBtn {
            border: none;
            width: 40px; 
            height: 40px; 
            padding: 0; 
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 18px;
            
            /* Διαφανές Background */
            background-color: rgba(0, 123, 255, 0.5); 
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .format-btn:hover, #urlBtn:hover, #emojiBtn:hover, #gifBtn:hover, #sendBtn:hover {
            background-color: #007bff; 
        }
        .format-btn.active {
            background-color: #007bff;
        }

        #sendBtn {
            width: 50px; 
            margin-left: 5px;
            margin-right: 0;
            font-size: 20px;
        }
        
        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 5px;
            margin-right: 10px;
            background-color: rgba(255, 255, 255, 0.05); /* Σχεδόν αόρατο */
            color: white; 
            text-shadow: 0 0 1px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s;
        }
        #messageInput:focus {
             border-color: #007bff;
             outline: none;
        }
        #messageInput::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Panels (κρυμμένα by default) */
        #admin-panel, #profile-settings {
            /* ... (CSS panels) ... */
             background: rgba(0, 0, 0, 0.85); 
             color: white;
             padding: 20px;
             position: absolute;
             top: 0; 
             right: 0; 
             width: 300px;
             height: 100%;
             box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
             z-index: 20;
             display: none; 
             overflow-y: auto;
        }
        
        .user-item {
             display: flex;
             justify-content: space-between;
             align-items: center;
             margin-bottom: 10px;
             padding: 5px;
             background: rgba(255, 255, 255, 0.1);
             border-radius: 3px;
        }
        
        /* Ειδικό κουμπί ρυθμίσεων (προστίθεται δυναμικά στο JS) */
        .settings-btn {
            background-color: rgba(0, 123, 255, 0.7);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
            position: fixed; /* Βγάζουμε τα κουμπιά έξω από το flow */
            top: 15px;
            right: 15px;
            z-index: 100;
        }
        #adminPanelBtn {
             right: 140px; /* Δίπλα στο SettingsBtn */
        }
        #logoutBtn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
        }
        #logoutBtn:hover { background-color: #c82333; }
        
        /* Emoji/GIF Panels */
        #emojiPicker, #gifPicker {
            position: absolute;
            bottom: 75px;
            right: 15px;
            z-index: 1000;
            display: none;
        }
        #gifPicker {
            background: rgba(255, 255, 255, 0.9); 
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px); 
        }
        #gifResults {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
        #gifResults img {
            width: 100%;
            height: auto;
            cursor: pointer;
            border-radius: 4px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        
        <button id="logoutBtn">Αποσύνδεση</button>
        <button id="settingsBtn" class="settings-btn">Ρυθμίσεις</button>

        <div id="chatbox-container">
            <div id="chatbox"></div>
            
            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        
        <div id="input-container">
             <div id="formatting-bar">
                <button class="format-btn" id="boldBtn" data-format="isBold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" id="italicBtn" data-format="isItalic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" id="colorBtn" data-format="color"><i class="fas fa-palette"></i></button>
                <input type="color" id="colorPicker" style="display: none;">
            </div>
            
            <div id="messageInputRow">
                <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
                <button id="urlBtn" title="Εισαγωγή URL"><i class="fas fa-link"></i></button>
                <button id="emojiBtn" title="Emojis">😊</button>
                <button id="gifBtn" title="GIF"><i class="fas fa-gift"></i></button>
                <button id="sendBtn" disabled title="Αποστολή"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker"></emoji-picker>

    <div id="gifPicker">
        <input type="text" id="gifSearchInput" placeholder="Αναζήτηση GIF...">
        <div id="gifResults"></div>
    </div>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        const adminPanel = document.getElementById('admin-panel');
        const settingsBtn = document.getElementById('settingsBtn');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        const avatarForm = document.getElementById('avatar-form');
        
        // Panels (Κρύβονται με JS για ασφάλεια)
        adminPanel.style.display = 'none';
        profileSettings.style.display = 'none';

        const urlBtn = document.getElementById('urlBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');
        const gifPicker = document.getElementById('gifPicker');
        const gifSearchInput = document.getElementById('gifSearchInput');
        const gifResults = document.getElementById('gifResults');

        // Formatting Buttons
        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorBtn = document.getElementById('colorBtn');
        const colorPicker = document.getElementById('colorPicker');
        
        let formattingState = {
            isBold: false,
            isItalic: false,
            color: '#FFFFFF' 
        };

        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        const GIPHY_API_KEY = 'UQxRacYoTn67CWCJ5zbdOvUnzmU0QnUs'; 

        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        sendBtn.disabled = true; 
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        
        ws.onopen = () => {
             console.log('WebSocket Connected!');
             sendBtn.disabled = false; 
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket Error:', error);
            sendBtn.innerHTML = 'Σφάλμα';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'oldMessages':
                    chatbox.innerHTML = '';
                    data.messages.forEach(message => appendMessage(message)); 
                    break;
                case 'newMessage':
                    appendMessage(data);
                    break;
                case 'deleteMessage':
                    deleteMessage(data.messageId);
                    break;
                case 'clearChat':
                    chatbox.innerHTML = '';
                    break;
            }
        };

        // --- ΕΛΕΓΧΟΣ ΡΟΛΟΥ ΚΑΙ ΑΣΦΑΛΕΙΑΣ FRONTEND ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                let avatarSource = '/uploads/default-avatar.png';
                if (data.avatarUrl && data.avatarUrl !== 'default-avatar.png') {
                    if (data.avatarUrl.startsWith('/')) {
                        avatarSource = data.avatarUrl;
                    } else {
                        avatarSource = `/uploads/${data.avatarUrl}`; 
                    }
                } else if (data.avatarUrl && data.avatarUrl.includes('/uploads/')) {
                     avatarSource = data.avatarUrl;
                }
                
                currentAvatar.src = avatarSource;
                
                // Εμφάνιση Admin Panel ΜΟΝΟ σε Admin
                if (data.role === 'admin') {
                    const adminButton = document.createElement('button');
                    adminButton.id = 'adminPanelBtn';
                    adminButton.classList.add('settings-btn');
                    adminButton.textContent = 'Admin Panel';
                    
                    adminButton.addEventListener('click', () => {
                        if (adminPanel.style.display === 'block') {
                            adminPanel.style.display = 'none';
                        } else {
                            adminPanel.style.display = 'block';
                            if (profileSettings.style.display === 'block') {
                                profileSettings.style.display = 'none';
                            }
                            // Επανατοποθετούμε το Admin Panel (είναι fixed)
                            adminPanel.style.position = 'fixed';
                            loadAdminPanel(); 
                        }
                    });
                    document.body.appendChild(adminButton); // Το προσθέτουμε στο body
                }

                // Λογική για το κουμπί 'Ρυθμίσεις' (Profile Settings)
                settingsBtn.addEventListener('click', () => {
                    if (profileSettings.style.display === 'block') {
                        profileSettings.style.display = 'none';
                    } else {
                        profileSettings.style.display = 'block';
                         // Επανατοποθετούμε το Profile Settings (είναι fixed)
                        profileSettings.style.position = 'fixed';
                        const adminPanelBtn = document.getElementById('adminPanelBtn');
                        if (currentUserRole === 'admin' && adminPanel.style.display === 'block') {
                             adminPanel.style.display = 'none';
                        }
                    }
                });

            })
            .catch(error => {
                console.error('Σφάλμα κατά την ανάκτησης πληροφοριών χρήστη:', error);
            });
        
        // ... (admin panel, pdf, avatar form logic) ...

        function appendMessage(data) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.dataset.messageId = data.id || data.messageId; 
            messageElement.dataset.userId = data.user_id || data.userId;

            // ... (role classification) ...
            switch (data.role) {
                case 'admin':
                    messageElement.classList.add('admin-message');
                    break;
                case 'moderator':
                    messageElement.classList.add('moderator-message');
                    break;
                default:
                    messageElement.classList.add('user-message');
                    break;
            }
            
            const avatarImg = document.createElement('img');
            avatarImg.classList.add('avatar');
            
            let avatarUrl = '/uploads/default-avatar.png';
            if (data.avatar_url || data.avatarUrl) {
                const providedUrl = data.avatar_url || data.avatarUrl;
                 if (providedUrl.startsWith('/')) {
                     avatarUrl = providedUrl;
                 } else if (providedUrl !== 'default-avatar.png') {
                     avatarUrl = `/uploads/${providedUrl}`;
                 }
            }
            avatarImg.src = avatarUrl; 
            avatarImg.onerror = function() {
                this.src = '/uploads/default-avatar.png'; 
            };
            messageElement.appendChild(avatarImg);
            
            const contentContainer = document.createElement('div');
            contentContainer.classList.add('message-content-container');
            
            const senderSpan = document.createElement('span');
            senderSpan.classList.add('sender');
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = data.displayName;
            // ... (admin badge logic) ...
            
            senderSpan.appendChild(nameSpan);

            const isGif = data.message && (data.message.startsWith('http://') || data.message.startsWith('https://')) && (data.message.includes('giphy.com') || data.message.includes('media'));
            
            if (isGif) {
                // ... (GIF logic) ...
            } else {
                
                let text = data.message;
                let format = {};
                
                // ΔΙΟΡΘΩΣΗ 2: Χειρισμός JSON strings (και εφαρμογή formatting)
                try {
                    const parsedData = JSON.parse(text);
                    if (parsedData.text) {
                        text = parsedData.text; 
                        format = parsedData;
                    }
                } catch (e) {
                    // Είναι απλό κείμενο, format παραμένει κενό
                }

                const messageText = document.createElement('span');
                messageText.classList.add('message-content');
                
                // Εφαρμογή Formatting
                if (format.isBold === true) {
                    messageText.style.fontWeight = 'bold';
                }
                if (format.isItalic === true) {
                    messageText.style.fontStyle = 'italic';
                }
                if (format.color && format.color !== '#FFFFFF') {
                    messageText.style.color = format.color;
                }
                
                // *** ΕΛΕΓΧΟΣ ΓΙΑ URL (Απλή αντικατάσταση κειμένου με <a>) ***
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                if (urlRegex.test(text)) {
                    const parts = text.split(urlRegex);
                    parts.forEach(part => {
                        if (urlRegex.test(part)) {
                            const link = document.createElement('a');
                            link.href = part;
                            link.textContent = part;
                            link.target = '_blank';
                            link.style.color = '#79d1ff'; 
                            link.style.textShadow = '0 0 1px rgba(0, 0, 0, 0.5)';
                            contentContainer.appendChild(link);
                        } else {
                            const regularText = messageText.cloneNode(true); 
                            regularText.textContent = part;
                            contentContainer.appendChild(regularText);
                        }
                    });
                    
                } else {
                    messageText.textContent = text;
                    contentContainer.appendChild(messageText);
                }
            }
            
            // ... (timestamp, deleteBtn logic - παραμένουν) ...

            contentContainer.prepend(senderSpan);
            messageElement.appendChild(contentContainer);
            
            chatbox.appendChild(messageElement);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        // --- LOGIC ΓΙΑ FORMATTING BUTTONS ---
        boldBtn.addEventListener('click', () => toggleFormatting('isBold', boldBtn));
        italicBtn.addEventListener('click', () => toggleFormatting('isItalic', italicBtn));
        
        colorBtn.addEventListener('click', () => {
            colorPicker.click();
        });

        colorPicker.addEventListener('input', (e) => {
            formattingState.color = e.target.value;
            colorBtn.style.backgroundColor = e.target.value;
            colorBtn.classList.add('active');
        });
        
        function toggleFormatting(formatKey, button) {
            if (formatKey === 'color') {
                // Done via colorPicker
                return;
            }
            formattingState[formatKey] = !formattingState[formatKey];
            button.classList.toggle('active', formattingState[formatKey]);
            if (formatKey === 'isBold' || formatKey === 'isItalic') {
                 messageInput.style[formatKey] = formattingState[formatKey] ? 'bold' : 'normal';
            }
        }
        
        // --- SEND MESSAGE LOGIC (UPDATED FOR FORMATTING) ---
        sendBtn.addEventListener('click', () => {
            const rawMessage = messageInput.value.trim();
            if (rawMessage) {
                if (ws.readyState === WebSocket.OPEN) {
                    const formattedMessage = JSON.stringify({
                        text: rawMessage,
                        isBold: formattingState.isBold,
                        isItalic: formattingState.isItalic,
                        color: formattingState.color
                    });
                    
                    ws.send(JSON.stringify({ type: 'chatMessage', message: formattedMessage }));
                    messageInput.value = '';
                    
                    // Reset formatting state and buttons after sending
                    formattingState = { isBold: false, isItalic: false, color: '#FFFFFF' };
                    boldBtn.classList.remove('active');
                    italicBtn.classList.remove('active');
                    colorBtn.style.backgroundColor = 'rgba(0, 123, 255, 0.5)';
                    colorBtn.classList.remove('active');
                } else {
                    alert('Η σύνδεση στο chat δεν είναι έτοιμη. Δοκιμάστε να ανανεώσετε τη σελίδα.');
                }
            }
        });

        // ... (messageInput keypress, logoutBtn, emoji/gif logic - παραμένουν) ...
    }); 
</script>
</body>
</html>
