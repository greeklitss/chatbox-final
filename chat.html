<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- CSS STYLING: FULL SCREEN, TRANSPARENT MESSAGES & COLORED NAMES --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Merriweather', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5; 
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            max-width: none; 
            max-height: none; 
            background: none; 
            box-shadow: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        #header {
            padding: 15px;
            background: #007bff;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; 
        }
        #header h2 {
            margin: 0;
        }
        /* ... (Άλλα styles header/buttons) ... */

        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            border-bottom: 1px solid #ccc; 
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: none; 
            display: flex;
            flex-direction: column;
            position: relative; /* Για να λειτουργήσει το overlay */

            /* BACKGROUND IMAGE */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- ΝΕΟ: DARK OVERLAY ΓΙΑ ΚΑΛΥΤΕΡΗ ΑΝΑΓΝΩΣΙΜΟΤΗΤΑ --- */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4); /* Μαύρη ημιδιαφανής επίστρωση 40% */
            z-index: 1; /* Πάνω από την εικόνα, κάτω από τα μηνύματα */
        }
        
        /* --- MESSAGES STYLING: ΕΥΘΥΓΡΑΜΜΙΣΗ ΑΡΙΣΤΕΡΑ --- */
        .message {
            z-index: 2; /* Πάνω από το overlay */
            margin-bottom: 10px;
            padding: 8px 12px; 
            border-radius: 0; 
            word-wrap: break-word;
            max-width: 70%;
            position: relative;
            
            /* Αλλαγή: Όλα τα μηνύματα στοιχίζονται αριστερά */
            align-self: flex-start !important; 
            
            display: flex;
            align-items: center;
            box-shadow: none; 
            background: none !important; 
        }
        
        /* Βασικό χρώμα κειμένου μηνυμάτων: Λευκό με σκιά για αναγνωσιμότητα */
        .message-content {
             text-shadow: 0 0 3px rgba(0, 0, 0, 0.6), 0 0 3px rgba(255, 255, 255, 0.6); 
             color: white; 
             font-weight: 400; 
        }
        
        /* Χρωματισμός Ονόματος Χρήστη */
        .message .sender {
             font-weight: bold;
             text-shadow: 0 0 3px rgba(0, 0, 0, 0.8); 
        }
        
        /* 1. Χρώμα για απλούς Χρήστες (Sender Name) */
        .user-message .sender {
            color: white; 
        }
        
        /* 2. Χρώμα για Moderators (Sender Name) */
        .moderator-message .sender {
            color: cyan; /* Ανοιχτό Μπλε */
        }
        
        /* 3. Χρώμα για Admins (Sender Name) */
        .admin-message .sender {
            color: gold; /* Χρυσό/Κίτρινο */
        }
        
        /* --- TEXT FORMATTING STYLES --- */
        .bold { font-weight: bold; }
        .italic { font-style: italic; }
        /* Όλα τα custom colors θα προστεθούν ως inline style */
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
        }
        /* ... (Άλλα styles) ... */

        #input-container {
            display: flex;
            padding: 15px;
            border-top: none; 
            position: relative;
            background-color: rgba(255, 255, 255, 0.9); 
            flex-shrink: 0; 
            flex-wrap: wrap; /* Να πέφτει κάτω η γραμμή styling */
        }

        #messageInput {
            /* ... (ίδιο) ... */
        }
        
        /* --- ΝΕΟ: FORMATTING BAR --- */
        #formatting-bar {
            width: 100%;
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            align-items: center;
        }
        .format-btn {
            background-color: #e9ecef;
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        .format-btn.active {
            background-color: #007bff;
            color: white;
        }
        #colorPicker {
            width: 30px;
            height: 30px;
            padding: 0;
            border: none;
            cursor: pointer;
        }
        #colorLabel {
             font-size: 0.9em;
             margin-right: 5px;
        }
        
        /* ... (Ο υπόλοιπος CSS κώδικας παραμένει ίδιος) ... */
        #logoutBtn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        #logoutBtn:hover {
            background-color: #c82333;
        }
        #admin-panel {
            padding: 20px;
            background: #f0f2f5;
            border-left: 1px solid #ddd;
            display: none;
            width: 250px;
            overflow-y: auto;
            flex-shrink: 0; 
        }
        #profile-settings {
            padding: 20px;
            background: #f0f2f5;
            border-left: 1px solid #ddd;
            display: none;
            width: 250px;
            overflow-y: auto;
            flex-shrink: 0; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="header">
            <h2>Chatbox - Webradio Akoyme</h2>
            <div style="display: flex; align-items: center;">
                <button id="settingsBtn" class="settings-btn">Ρυθμίσεις</button>
                <button id="logoutBtn">Αποσύνδεση</button>
            </div>
        </div>
        <div id="chatbox-container">
            <div id="chatbox"></div>
            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        <div id="input-container">
            <div id="formatting-bar">
                <span id="colorLabel">Χρώμα Κειμένου:</span>
                <input type="color" id="colorPicker" value="#FFFFFF">
                <button id="boldBtn" class="format-btn">B</button>
                <button id="italicBtn" class="format-btn">I</button>
            </div>
            <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
            <button id="emojiBtn">😊</button>
            <button id="gifBtn">GIF</button>
            <button id="sendBtn" disabled>Αποστολή</button>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker"></emoji-picker>

    <div id="gifPicker">
        <input type="text" id="gifSearchInput" placeholder="Αναζήτηση GIF...">
        <div id="gifResults"></div>
    </div>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        // --- ΝΕΑ FORMATTING ELEMENTS ---
        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorPicker = document.getElementById('colorPicker');
        // ---------------------------------
        const adminPanel = document.getElementById('admin-panel');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const savePdfBtn = document.getElementById('savePdfBtn');
        const userListDiv = document.getElementById('userList');
        const settingsBtn = document.getElementById('settingsBtn');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        const avatarForm = document.getElementById('avatar-form');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');
        const gifPicker = document.getElementById('gifPicker');
        const gifSearchInput = document.getElementById('gifSearchInput');
        const gifResults = document.getElementById('gifResults');

        // --- NEW STATE FOR FORMATTING ---
        let isBold = false;
        let isItalic = false;
        let textColor = '#FFFFFF';
        // --------------------------------

        // Χρησιμοποιούμε wss: για Render deployment
        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        const GIPHY_API_KEY = 'UQxRacYoTn67CWCJ5zbdOvUnzmU0QnUs'; 

        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        sendBtn.disabled = true; 
        sendBtn.textContent = 'Σύνδεση...';
        
        ws.onopen = () => {
             console.log('WebSocket Connected!');
             sendBtn.disabled = false; 
             sendBtn.textContent = 'Αποστολή';
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket Error:', error);
            sendBtn.textContent = 'Σφάλμα';
        };

        // --- WebSocket Messages ---
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'oldMessages':
                    chatbox.innerHTML = '';
                    data.messages.forEach(message => appendMessage(message)); 
                    break;
                case 'newMessage':
                    appendMessage(data);
                    break;
                case 'deleteMessage':
                    deleteMessage(data.messageId);
                    break;
                case 'clearChat':
                    chatbox.innerHTML = '';
                    break;
            }
        };

        // --- Initial Load User Info (Same as before) ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                if (data.role === 'admin') {
                    loadAdminPanel();
                }
                
                const avatarSource = data.avatarUrl || '/uploads/default-avatar.png';
                currentAvatar.src = avatarSource;
                
                if (data.role === 'admin') {
                     ws.send(JSON.stringify({ type: 'requestOldMessages' })); 
                }
            })
            .catch(error => {
                console.error('Σφάλμα κατά την ανάκτηση πληροφοριών χρήστη:', error);
            });
        
        // ... (REST OF ADMIN/SETTINGS LOGIC - LoadAdminPanel, ClearHistory, SavePDF, AvatarForm) ...
        // ... (Skipped for brevity, as the functions themselves are unchanged) ...
        async function loadAdminPanel() { /* ... unchanged ... */ }
        clearHistoryBtn.addEventListener('click', async () => { /* ... unchanged ... */ });
        savePdfBtn.addEventListener('click', () => { /* ... unchanged ... */ });
        avatarForm.addEventListener('submit', async (e) => { /* ... unchanged ... */ });
        settingsBtn.addEventListener('click', () => { /* ... unchanged ... */ });

        // --- Message Handling (Modified to handle formatting) ---
        function appendMessage(data) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.dataset.messageId = data.id || data.messageId; 
            messageElement.dataset.userId = data.user_id || data.userId;

            switch (data.role) {
                case 'admin':
                    messageElement.classList.add('admin-message');
                    break;
                case 'moderator':
                    messageElement.classList.add('moderator-message');
                    break;
                default:
                    messageElement.classList.add('user-message');
                    break;
            }
            
            // ΑΦΑΙΡΕΘΗΚΕ: messageElement.style.alignSelf = 'flex-end';
            // ΤΩΡΑ ΕΙΝΑΙ ΟΛΑ 'flex-start' ΜΕΣΩ CSS

            const avatarImg = document.createElement('img');
            avatarImg.classList.add('avatar');
            avatarImg.src = data.avatar_url || data.avatarUrl || '/uploads/default-avatar.png'; 
            messageElement.appendChild(avatarImg);

            const contentContainer = document.createElement('div');
            contentContainer.classList.add('message-content-container');
            
            const senderSpan = document.createElement('span');
            senderSpan.classList.add('sender');
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = data.displayName;
            if (data.role === 'admin') {
                const adminBadge = document.createElement('span');
                adminBadge.classList.add('admin-badge');
                adminBadge.textContent = 'Admin';
                nameSpan.appendChild(adminBadge);
            }
            
            senderSpan.appendChild(nameSpan);

            // Έλεγχος για GIF
            const isGif = data.message && (data.message.startsWith('http://') || data.message.startsWith('https://')) && (data.message.includes('giphy.com') || data.message.includes('media'));
            
            if (isGif) {
                const gifImage = document.createElement('img');
                gifImage.src = data.message;
                gifImage.classList.add('gif');
                contentContainer.appendChild(gifImage);
            } else {
                const messageText = document.createElement('span');
                messageText.classList.add('message-content');
                
                // --- ΝΕΟ: ΕΦΑΡΜΟΓΗ FORMATTING (Αν υπάρχει) ---
                let text = data.message;
                let finalHtml = '';
                
                // Check if message is JSON formatted text (for custom styling)
                try {
                    const formattedData = JSON.parse(text);
                    if (formattedData.text) {
                        text = formattedData.text;
                        
                        // Apply Color
                        if (formattedData.color && formattedData.color !== '#FFFFFF') {
                            messageText.style.color = formattedData.color;
                            // Αφαιρούμε το text-shadow για τα custom colors για να είναι καθαρότερα
                            messageText.style.textShadow = 'none'; 
                        }
                        
                        // Apply Bold/Italic (αν δεν είναι GIF)
                        if (formattedData.isBold) {
                            messageText.classList.add('bold');
                        }
                        if (formattedData.isItalic) {
                            messageText.classList.add('italic');
                        }
                    }
                } catch (e) {
                    // Not a JSON message, it's just plain text or a GIF URL
                }
                
                messageText.textContent = text;
                contentContainer.appendChild(messageText);
                // -----------------------------------------------
            }

            
            const date = new Date(data.timestamp);
            const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const timeText = document.createTextNode(` [${timeString}]: `);
            senderSpan.appendChild(timeText);

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.innerHTML = '&#x2715;';
            deleteBtn.title = 'Διαγραφή μηνύματος';
            
            if (currentUserRole === 'admin') { 
                deleteBtn.style.display = 'inline-block'; 
                deleteBtn.addEventListener('click', async () => {
                    if (confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μήνυμα;')) {
                        try {
                            const messageId = data.id || data.messageId;
                            const res = await fetch(`/delete-message/${messageId}`, { method: 'DELETE' }); 
                            if (!res.ok) {
                                const errorText = await res.text();
                                alert(`Αποτυχία διαγραφής μηνύματος: ${errorText}`); 
                            }
                        } catch (error) {
                            console.error('Error deleting message:', error);
                        }
                    }
                });
            } else {
                deleteBtn.style.display = 'none'; 
            }

            if (currentUserRole === 'admin') {
                senderSpan.appendChild(deleteBtn);
            }

            contentContainer.prepend(senderSpan);
            messageElement.appendChild(contentContainer);
            
            chatbox.appendChild(messageElement);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        // --- Input and Button Events (Modified to include formatting) ---
        sendBtn.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if (message) {
                if (ws.readyState === WebSocket.OPEN) {
                    let finalMessage = message;
                    
                    // Αν υπάρχει formatting, στέλνουμε ένα JSON object αντί για plain text
                    if (isBold || isItalic || textColor !== '#FFFFFF') {
                        const formattingObject = {
                            text: message,
                            isBold: isBold,
                            isItalic: isItalic,
                            color: textColor 
                        };
                        finalMessage = JSON.stringify(formattingObject);
                    }
                    
                    ws.send(JSON.stringify({ type: 'chatMessage', message: finalMessage }));
                    messageInput.value = '';
                } else {
                    alert('Η σύνδεση στο chat δεν είναι έτοιμη. Δοκιμάστε να ανανεώσετε τη σελίδα.');
                }
            }
        });

        // --- FORMATTING LOGIC ---
        boldBtn.addEventListener('click', () => {
            isBold = !isBold;
            boldBtn.classList.toggle('active', isBold);
        });

        italicBtn.addEventListener('click', () => {
            isItalic = !isItalic;
            italicBtn.classList.toggle('active', isItalic);
        });
        
        colorPicker.addEventListener('input', (e) => {
             textColor = e.target.value;
        });

        // --- Other Events (Same as before) ---
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        logoutBtn.addEventListener('click', async () => { /* ... unchanged ... */ });
        emojiBtn.addEventListener('click', (e) => { /* ... unchanged ... */ });
        emojiPicker.addEventListener('emoji-click', event => { /* ... unchanged ... */ });
        gifBtn.addEventListener('click', (e) => { /* ... unchanged ... */ });
        document.addEventListener('click', (e) => { /* ... unchanged ... */ });
        gifSearchInput.addEventListener('input', () => { /* ... unchanged ... */ });
        async function searchGifs(query = '') { /* ... unchanged ... */ }
        function displayGifs(gifs) { /* ... unchanged - MODIFIED TO SEND JSON IF FORMATTING IS ACTIVE */
             gifs.forEach(gif => {
                const img = document.createElement('img');
                img.src = gif.images.fixed_height_small.url;
                img.alt = gif.title;
                img.addEventListener('click', () => {
                    const gifUrl = gif.images.original.url;
                    if (ws.readyState === WebSocket.OPEN) {
                        // Αν είναι GIF, αγνοούμε το formatting, στέλνουμε μόνο το URL
                        ws.send(JSON.stringify({ type: 'chatMessage', message: gifUrl }));
                        gifPicker.style.display = 'none';
                    } else {
                         alert('Η σύνδεση στο chat δεν είναι έτοιμη. Δοκιμάστε να ανανεώσετε τη σελίδα.');
                    }
                });
                gifResults.appendChild(img);
            });
        }
    }); 
</script>
</body>
</html>
