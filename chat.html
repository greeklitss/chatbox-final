<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- GLOBAL & STRUCTURE --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            background-color: #121212; 
            color: #E0E0E0;
            /* ΠΡΟΣΘΗΚΗ: Εικόνα Φόντου */
            background-image: url('akoyme_background.jpg'); 
            background-size: cover;
            background-attachment: fixed;
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- MENU --- */
        #top-bar {
            /* ... (Ο υπάρχων κώδικας για το top-bar) ... */
        }
        
        #top-bar button {
            /* ... (Ο υπάρχων κώδικας για τα κουμπιά) ... */
        }

        /* --- CHATBOX & BACKGROUND --- */
        #chatbox {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            /* ΔΙΟΡΘΩΣΗ: Προσθέτουμε position: relative; και z-index χαμηλό 
               για να επιτρέψει το #messageInputRow να έρθει από πάνω. */
            position: relative;
            z-index: 1;
        }
        
        /* ... (ο υπόλοιπος κώδικας CSS) ... */

        /* --- MESSAGE ROW --- */
        #messageInputRow {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: #1f1f1f;
            border-top: 1px solid #333;
            /* ΔΙΟΡΘΩΣΗ: ΘΕΤΟΥΜΕ ΥΨΗΛΟ Z-INDEX ΚΑΙ POSITION: RELATIVE */
            /* Αυτό διορθώνει το πρόβλημα όπου τα κουμπιά δεν κλικάρονται */
            position: relative; 
            z-index: 10;
        }

        #messageInputRow button, #messageInputRow input[type="color"] {
            /* ... (Ο υπάρχων κώδικας για τα κουμπιά) ... */
        }

        /* ... (ο κώδικας για τα Emojis) ... */
        
        /* --- MESSAGES --- */
        .message {
            /* ... */
        }

        .message-content-container {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            /* ΔΙΟΡΘΩΣΗ: Αλλάζουμε το background-color σε RGBA για διαφάνεια 85% */
            background-color: rgba(51, 51, 51, 0.85); 
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        /* ... (Ο υπόλοιπος κώδικας CSS) ... */
    </style>
</head>

<body>
</body>
</html>
