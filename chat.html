<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- GLOBAL & STRUCTURE --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            background-color: #121212; 
            color: #E0E0E0;
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* --- CHATBOX & BACKGROUND --- */
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative; 
            background-color: #1A1A1A; 
            
            /* Background Image (Διόρθωση 404: Ελέγξτε αν υπάρχει το αρχείο!) */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1; 
        }
        
        /* --- MESSAGES --- */
        .message {
            z-index: 2; 
            margin-bottom: 15px; 
            padding: 5px 0; 
            word-wrap: break-word;
            max-width: 90%; 
            display: flex;
            align-items: flex-start;
        }
        
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid #444; 
            flex-shrink: 0; 
        }
        
        .message-content-container {
            display: flex;
            flex-direction: column;
        }

        .sender {
             font-weight: 700;
             font-size: 0.9em;
             margin-bottom: 3px;
        }
        
        .user-message .sender { color: #8888FF; } 
        .moderator-message .sender { color: #32CD32; } 
        .admin-message .sender { color: #FFD700; } 
        
        .message-content {
             color: #E0E0E0; 
             font-size: 1em;
             line-height: 1.4;
        }

        /* --- INPUT & FORMATTING BAR --- */
        #input-container {
            display: flex;
            flex-direction: column; 
            padding: 10px 15px; 
            background-color: #282828; 
            flex-shrink: 0; 
            z-index: 10;
        }

        #messageInputRow {
            display: flex;
            width: 100%;
            align-items: center;
        }

        #formatting-bar {
            display: flex;
            justify-content: flex-start;
            padding-bottom: 8px;
            width: 100%;
        }

        /* Κουμπιά */
        .format-btn, #urlBtn, #emojiBtn, #gifBtn, #sendBtn {
            border: none;
            width: 38px; 
            height: 38px; 
            padding: 0; 
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 18px;
            background-color: #3A3A3A; 
            color: #E0E0E0;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .format-btn:hover, #urlBtn:hover, #emojiBtn:hover, #gifBtn:hover {
            background-color: #555555; 
        }
        .format-btn.active, #sendBtn {
            background-color: #007bff; 
        }

        #sendBtn {
            width: 50px; 
            margin-left: 5px;
            font-size: 20px;
        }
        
        /* INPUT FIELD: Εγγύηση Ορατότητας */
        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #444; 
            border-radius: 5px;
            margin-right: 10px;
            background-color: #3A3A3A; 
            
            /* ΕΠΙΒΟΛΗ: Το κείμενο εισαγωγής είναι πάντα λευκό */
            color: white !important; 
            
            font-size: 1em;
            transition: border-color 0.3s;
        }

        /* Placeholder */
        #messageInput::placeholder {
            color: #999 !important; 
            opacity: 1 !important;
        }
        #messageInput:focus {
             border-color: #007bff;
             outline: none;
        }

        /* --- MENU ΡΥΘΜΙΣΕΩΝ --- */
        #menuToggleBtn {
            background-color: #007bff;
            color: white;
            border: none;
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; 
            top: 15px;
            right: 15px;
            z-index: 100;
        }
        
        #settings-menu {
             position: fixed;
             top: 55px; 
             right: 15px;
             background: #282828;
             border-radius: 5px;
             box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
             padding: 5px 0;
             z-index: 101; 
             width: 200px;
             display: none; 
             flex-direction: column;
        }

        .menu-item {
             background: none;
             color: #E0E0E0;
             border: none;
             padding: 10px 15px;
             text-align: left;
             width: 100%;
             cursor: pointer;
             font-size: 14px;
             transition: background-color 0.2s;
        }
        .menu-item:hover {
             background-color: #3A3A3A;
        }
        .menu-item i {
             margin-right: 10px;
        }
        
        #admin-panel, #profile-settings {
             background: #1A1A1A; 
             color: #E0E0E0;
             padding: 20px;
             position: fixed; 
             top: 0; 
             right: 0; 
             width: 300px;
             height: 100%;
             box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
             z-index: 20;
             display: none; 
             overflow-y: auto;
        }
        
        #current-avatar-container img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        
        #userList div {
            padding: 8px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #userList select {
            padding: 5px;
            border-radius: 5px;
            background-color: #3A3A3A;
            color: #E0E0E0;
            border: none;
        }
        
    </style>
</head>
<body>
    <div class="container">
        
        <button id="menuToggleBtn" title="Menu"><i class="fas fa-cog"></i></button>

        <div id="chatbox-container">
            <div id="chatbox"></div>
            
            <div id="settings-menu" style="display: none;">
                <button id="menuProfileBtn" class="menu-item"><i class="fas fa-user-circle"></i> Ρυθμίσεις Προφίλ</button>
                <button id="menuAdminBtn" class="menu-item"><i class="fas fa-shield-alt"></i> Admin Panel</button>
                <hr style="border-color: #444; margin: 5px 0;">
                <button id="menuLogoutBtn" class="menu-item" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Αποσύνδεση</button>
            </div>

            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn" disabled title="Δεν έχει υλοποιηθεί">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="" alt="Avatar">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        
        <div id="input-container">
            <div id="formatting-bar">
                <button class="format-btn" id="boldBtn" data-format="isBold" title="Bold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" id="italicBtn" data-format="isItalic" title="Italic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" id="colorBtn" data-format="color" title="Color"><i class="fas fa-palette"></i></button>
                <input type="color" id="colorPicker" style="display: none;">
            </div>
            
            <div id="messageInputRow">
                <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
                
                <button id="urlBtn" title="Εισαγωγή URL"><i class="fas fa-link"></i></button>
                <button id="emojiBtn" title="Emojis">😊</button>
                <button id="gifBtn" title="GIF"><i class="fas fa-gift"></i></button>
                
                <button id="sendBtn" disabled title="Αποστολή"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker" style="display:none; position:absolute; bottom: 70px; right: 20px; z-index: 1000;"></emoji-picker>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- DOM Elements ---
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const adminPanel = document.getElementById('admin-panel');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const settingsMenu = document.getElementById('settings-menu');
        const menuLogoutBtn = document.getElementById('menuLogoutBtn'); 
        const menuProfileBtn = document.getElementById('menuProfileBtn');
        const menuAdminBtn = document.getElementById('menuAdminBtn');
        
        // References για τα κουμπιά λειτουργιών
        const urlBtn = document.getElementById('urlBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');

        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorBtn = document.getElementById('colorBtn');
        const colorPicker = document.getElementById('colorPicker');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn'); 
        
        // --- State ---
        let formattingState = {
            isBold: false,
            isItalic: false,
            color: '#FFFFFF' 
        };

        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        // --- Init ---
        sendBtn.disabled = true; 
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        adminPanel.style.display = 'none';
        profileSettings.style.display = 'none';
        settingsMenu.style.display = 'none'; 
        
        // --- WebSockets ---
        ws.onopen = () => { sendBtn.disabled = false; };
        ws.onerror = (error) => { sendBtn.innerHTML = '<i class="fas fa-exclamation-triangle"></i>'; };
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'oldMessages') {
                chatbox.innerHTML = '';
                data.messages.forEach(message => appendMessage(message)); 
            } else if (data.type === 'newMessage') {
                appendMessage(data);
            } else if (data.type === 'deleteMessage') { // Χειρισμός διαγραφής
                const messageEl = document.querySelector(`[data-message-id="${data.messageId}"]`);
                if (messageEl) messageEl.remove();
            } else if (data.type === 'clearChat') { // Χειρισμός καθαρισμού ιστορικού
                chatbox.innerHTML = '';
            }
        };
        
        // --- ADMIN PANEL & USER MANAGEMENT ---
        async function loadAdminPanel() {
            try {
                const res = await fetch('/users');
                if (!res.ok) throw new Error('Could not fetch users or not authorized.');
                const users = await res.json();
                
                const userList = document.getElementById('userList');
                userList.innerHTML = '';
                
                users.forEach(user => {
                    if (user.id === currentUserId) return; 
                    
                    const div = document.createElement('div');
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = user.display_name + ': ';
                    
                    const select = document.createElement('select');
                    select.dataset.userId = user.id;
                    ['user', 'moderator', 'admin'].forEach(role => {
                        const option = document.createElement('option');
                        option.value = role;
                        option.textContent = role.charAt(0).toUpperCase() + role.slice(1);
                        if (user.role === role) option.selected = true;
                        select.appendChild(option);
                    });
                    
                    select.addEventListener('change', async (e) => {
                        try {
                            const newRole = e.target.value;
                            const updateRes = await fetch('/change-role', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userId: user.id, newRole })
                            });
                            if (!updateRes.ok) throw new Error('Role update failed');
                            alert(`Ο ρόλος του ${user.display_name} άλλαξε σε ${newRole}.`);
                        } catch (err) {
                            console.error('Error changing role:', err);
                            alert('Αποτυχία αλλαγής ρόλου.');
                        }
                    });
                    
                    div.appendChild(nameSpan);
                    div.appendChild(select);
                    userList.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading admin panel:', error);
                alert('Δεν ήταν δυνατή η φόρτωση του Admin Panel.');
            }
        }
        
        // --- USER INFO & AVATAR FIX (για να φαίνονται τα avatars) ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                let avatarSource = '/uploads/default-avatar.png'; // Fallback
                if (data.avatarUrl) {
                    // Ελέγχουμε αν το path είναι απόλυτο ή σχετικό
                    avatarSource = data.avatarUrl.startsWith('/') ? data.avatarUrl : `/uploads/${data.avatarUrl}`;
                }
                currentAvatar.src = avatarSource;
                // Αν δεν βρει την εικόνα, βάζει το default (για 404)
                currentAvatar.onerror = function() { this.src = '/uploads/default-avatar.png'; };
                
                menuAdminBtn.style.display = (data.role === 'admin') ? 'flex' : 'none'; 
                
            })
            .catch(error => {
                console.error('Σφάλμα (User Info / Avatar):', error);
                menuAdminBtn.style.display = 'none'; 
                menuProfileBtn.style.display = 'none';
            });
        
        
        // --- EVENT LISTENERS ---
        
        // MENU
        menuToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            settingsMenu.style.display = settingsMenu.style.display === 'flex' ? 'none' : 'flex';
            adminPanel.style.display = 'none';
            profileSettings.style.display = 'none';
        });

        menuProfileBtn.addEventListener('click', () => {
            settingsMenu.style.display = 'none'; 
            profileSettings.style.display = 'block'; 
        });

        menuAdminBtn.addEventListener('click', () => {
            settingsMenu.style.display = 'none';
            adminPanel.style.display = 'block';
            loadAdminPanel();
        });
        
        // LOGOUT FIX
        menuLogoutBtn.addEventListener('click', async () => {
             if (confirm('Είστε σίγουροι ότι θέλετε να αποσυνδεθείτε;')) {
                 try {
                     const res = await fetch('/logout', { method: 'POST' }); 
                     if (res.ok) {
                         window.location.href = '/'; 
                     } else {
                         alert('Αποτυχία αποσύνδεσης.');
                     }
                 } catch (error) {
                     console.error('Logout request error:', error);
                 }
             }
         });

        // AVATAR FORM HANDLER
        document.getElementById('avatar-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/change-avatar', {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentAvatar.src = data.avatarUrl; 
                    alert('Η εικόνα προφίλ ενημερώθηκε επιτυχώς.');
                    profileSettings.style.display = 'none';
                    // Ζητάμε τα παλιά μηνύματα για να ενημερωθούν τα avatars σε όλα
                    ws.send(JSON.stringify({ type: 'requestOldMessages' })); 
                } else {
                    alert('Αποτυχία ενημέρωσης εικόνας προφίλ.');
                }
            } catch (error) {
                console.error('Error uploading avatar:', error);
                alert('Σφάλμα δικτύου κατά την ενημέρωση του avatar.');
            }
        });
        
        // ADMIN CLEAR HISTORY
        clearHistoryBtn.addEventListener('click', async () => {
            if (confirm('Είστε σίγουροι ότι θέλετε να καθαρίσετε το ιστορικό συνομιλίας; Αυτό είναι μη αναστρέψιμο.')) {
                try {
                    const res = await fetch('/clear-history', { method: 'DELETE' });
                    if (!res.ok) throw new Error('Clear history failed');
                    // Ο WebSocket θα στείλει το clearChat σε όλους
                    adminPanel.style.display = 'none';
                } catch (error) {
                    console.error('Clear history error:', error);
                    alert('Αποτυχία καθαρισμού ιστορικού.');
                }
            }
        });
        
        // URL/GIF/EMOJI BUTTONS
        urlBtn.addEventListener('click', () => {
            const url = prompt("Εισαγωγή URL:");
            if (url) {
                messageInput.value += ` [URL: ${url}] `;
                messageInput.focus();
            }
        });

        gifBtn.addEventListener('click', () => {
            alert("Λειτουργία GIF: Χρειάζεται ενσωμάτωση με εξωτερικό API (π.χ. Giphy).");
        });

        emojiBtn.addEventListener('click', () => {
             const picker = document.getElementById('emojiPicker');
             if (picker) {
                 picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
             }
        });
        
        if (emojiPicker) {
            emojiPicker.addEventListener('emoji-click', (event) => {
                messageInput.value += event.detail.emoji.unicode;
                emojiPicker.style.display = 'none';
                messageInput.focus();
            });
        }
        
        // FORMATTING
        boldBtn.addEventListener('click', () => toggleFormatting('isBold', boldBtn));
        italicBtn.addEventListener('click', () => toggleFormatting('isItalic', italicBtn));
        colorBtn.addEventListener('click', () => { colorPicker.click(); });

        colorPicker.addEventListener('input', (e) => {
            formattingState.color = e.target.value;
            colorBtn.style.backgroundColor = e.target.value;
            colorBtn.classList.add('active'); 
            messageInput.style.color = e.target.value;
        });
        
        function toggleFormatting(formatKey, button) {
            if (formatKey === 'color') { return; }
            formattingState[formatKey] = !formattingState[formatKey];
            button.classList.toggle('active', formattingState[formatKey]);
            messageInput.style.fontWeight = formattingState.isBold ? 'bold' : 'normal';
            messageInput.style.fontStyle = formattingState.isItalic ? 'italic' : 'normal';
        }

        // SEND MESSAGE & ENTER KEY
        sendBtn.addEventListener('click', () => {
            const rawMessage = messageInput.value.trim();
            if (rawMessage && ws.readyState === WebSocket.OPEN) {
                const formattedMessage = JSON.stringify({
                    text: rawMessage,
                    isBold: formattingState.isBold,
                    isItalic: formattingState.isItalic,
                    color: formattingState.color
                });
                
                ws.send(JSON.stringify({ type: 'chatMessage', message: formattedMessage }));
                messageInput.value = '';
                
                // Reset UI state
                formattingState = { isBold: false, isItalic: false, color: '#FFFFFF' };
                boldBtn.classList.remove('active');
                italicBtn.classList.remove('active');
                colorBtn.style.backgroundColor = '#3A3A3A'; 
                colorBtn.classList.remove('active');
                messageInput.style.fontWeight = 'normal';
                messageInput.style.fontStyle = 'normal';
                messageInput.style.color = 'white'; 
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { 
                e.preventDefault(); 
                sendBtn.click(); 
            }
        });

        // CLOSING PANELS LOGIC
        document.addEventListener('click', (e) => { 
            const clickedInsideMenu = settingsMenu.contains(e.target) || menuToggleBtn.contains(e.target);
            const clickedInsideAdmin = adminPanel.contains(e.target);
            const clickedInsideSettings = profileSettings.contains(e.target);
            const clickedInsideInputBar = document.getElementById('input-container').contains(e.target);

            if (settingsMenu.style.display === 'flex' && !clickedInsideMenu) {
                settingsMenu.style.display = 'none';
            }
            if (!clickedInsideInputBar) {
                const picker = document.getElementById('emojiPicker');
                if (picker) picker.style.display = 'none';
            }
            if (adminPanel.style.display === 'block' && !clickedInsideAdmin && e.target !== menuAdminBtn) {
                 adminPanel.style.display = 'none';
            }
            if (profileSettings.style.display === 'block' && !clickedInsideSettings && e.target !== menuProfileBtn) {
                 profileSettings.style.display = 'none';
            }
        });
        
        // --- appendMessage ---
        function appendMessage(data) {
             const messageElement = document.createElement('div');
             messageElement.classList.add('message', `${data.role}-message`);
             messageElement.dataset.messageId = data.id || data.messageId; 
             
             const avatarImg = document.createElement('img');
             avatarImg.classList.add('avatar');
             let avatarUrl = '/uploads/default-avatar.png';
             if (data.avatar_url || data.avatarUrl) {
                 const providedUrl = data.avatar_url || data.avatarUrl;
                 avatarUrl = providedUrl.startsWith('/') ? providedUrl : `/uploads/${providedUrl}`;
             }
             avatarImg.src = avatarUrl; 
             avatarImg.onerror = function() { this.src = '/uploads/default-avatar.png'; };
             messageElement.appendChild(avatarImg);

             const contentContainer = document.createElement('div');
             contentContainer.classList.add('message-content-container');
             
             const senderSpan = document.createElement('span');
             senderSpan.classList.add('sender');
             const nameSpan = document.createElement('span');
             nameSpan.textContent = data.displayName;
             senderSpan.appendChild(nameSpan);

             let text = data.message;
             let format = {};
             try {
                 const parsedData = JSON.parse(text);
                 if (parsedData.text) { text = parsedData.text; format = parsedData; }
             } catch (e) { /* Not JSON */ }

             const messageText = document.createElement('span');
             messageText.classList.add('message-content');
             if (format.isBold) { messageText.style.fontWeight = 'bold'; }
             if (format.isItalic) { messageText.style.fontStyle = 'italic'; }
             if (format.color && format.color !== '#FFFFFF') { messageText.style.color = format.color; }
             messageText.textContent = text; 
             contentContainer.appendChild(messageText);

             const date = new Date(data.timestamp);
             const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
             const timeText = document.createTextNode(` [${timeString}]: `);
             senderSpan.appendChild(timeText);
             
             // ADMIN DELETE BUTTON
             if (currentUserRole === 'admin') {
                 const deleteBtn = document.createElement('span');
                 deleteBtn.textContent = ' ❌';
                 deleteBtn.style.cursor = 'pointer';
                 deleteBtn.style.marginLeft = '10px';
                 deleteBtn.style.color = '#ff6b6b';
                 deleteBtn.title = 'Διαγραφή Μηνύματος';
                 
                 deleteBtn.addEventListener('click', async () => {
                     if (confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μήνυμα;')) {
                         try {
                             const res = await fetch(`/delete-message/${data.messageId}`, { method: 'DELETE' });
                             if (!res.ok) throw new Error('Delete failed');
                         } catch (error) {
                             console.error('Delete message error:', error);
                             alert('Αποτυχία διαγραφής μηνύματος.');
                         }
                     }
                 });
                 senderSpan.appendChild(deleteBtn);
             }
             
             contentContainer.prepend(senderSpan);
             messageElement.appendChild(contentContainer);
             
             chatbox.appendChild(messageElement);
             chatbox.scrollTop = chatbox.scrollHeight;
        }

    }); 
</script>
</body>
</html>
