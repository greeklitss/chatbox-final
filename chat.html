<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- GLOBAL & STRUCTURE --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            background-color: #121212; 
            color: #E0E0E0;
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- MENU --- */
        #top-bar {
            background-color: #1f1f1f;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        #top-bar h1 {
            margin: 0;
            font-size: 1.5em;
            color: #4CAF50;
        }

        #user-info {
            display: flex;
            align-items: center;
        }

        #user-info button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-left: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #user-info button:hover {
            background-color: #0056b3;
        }

        #username-display {
            font-weight: bold;
            color: #4CAF50;
        }

        /* --- CHATBOX & MESSAGES --- */
        #chatbox {
            flex-grow: 1;
            padding: 10px 20px;
            overflow-y: auto;
            background-color: #1e1e1e;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #383838;
            margin-left: auto;
            text-align: right;
        }

        .admin-message, .moderator-message {
            background-color: #5d4037; /* Darker red/brown for Admin/Mod */
            margin-right: auto;
        }
        
        .system-message {
            text-align: center;
            font-style: italic;
            color: #ffc107;
        }

        .sender-info {
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: flex-start; 
        }

        .user-message .sender-info {
            justify-content: flex-end; /* Για να ευθυγραμμίζεται δεξιά ο χρήστης */
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 8px;
        }

        .user-message .avatar {
            margin-left: 8px;
            margin-right: 0;
            order: 2; /* Για να πηγαίνει δεξιά στο μήνυμα του χρήστη */
        }
        
        .user-message .content-container {
             flex-direction: row-reverse; /* Αντιστροφή σειράς για το μήνυμα του χρήστη */
        }

        .display-name {
            color: #4CAF50;
        }

        .message-content {
            display: block;
            margin-top: 5px;
            line-height: 1.4;
        }
        
        /* --- ΝΕΟ CSS: Για GIF/Images και Delete Button --- */
        .message-content img {
            max-width: 100%; 
            max-height: 200px; 
            border-radius: 8px; 
            margin-top: 5px;
            display: block; 
        }
        .delete-btn {
            cursor: pointer;
            margin-left: 10px;
            color: #ff6b6b;
            font-size: 1.2em;
        }
        /* ------------------------------------------------ */

        /* --- INPUT AREA --- */
        #input-container {
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            background-color: #1f1f1f;
            border-top: 1px solid #333;
        }
        
        #formatting-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        #formatting-bar button {
            background: none;
            border: 1px solid #444;
            color: #E0E0E0;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        #formatting-bar button:hover, .active-format {
            background-color: #333 !important;
            border-color: #4CAF50 !important;
        }

        #color-picker {
            cursor: pointer;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            padding: 0;
        }

        #message-send-area {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #2b2b2b;
            color: white;
            resize: none;
            font-size: 1em;
            box-sizing: border-box;
        }

        #send-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        #send-btn:hover {
            background-color: #45a049;
        }
        
        /* --- PROFILE SETTINGS / ADMIN PANEL --- */
        #profile-settings, #admin-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1f1f1f;
            border: 1px solid #444;
            padding: 30px;
            z-index: 1000;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            display: none; /* Hidden by default */
        }

        #profile-settings input[type="file"], #profile-settings input[type="text"], #profile-settings input[type="url"], #profile-settings button {
             width: 100%;
             padding: 10px;
             margin-top: 10px;
             box-sizing: border-box;
             background-color: #3A3A3A;
             color: white;
             border: 1px solid #444;
             border-radius: 5px;
        }
        #profile-settings button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border: none;
        }
        #current-avatar {
             width: 80px;
             height: 80px;
             border-radius: 50%;
             object-fit: cover;
             margin-bottom: 15px;
        }

        /* --- EMOJI PICKER --- */
        #emoji-picker-container {
            position: absolute;
            bottom: 60px;
            right: 20px;
            background-color: #1f1f1f;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            z-index: 999;
            display: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            max-height: 200px;
            overflow-y: auto;
            width: 200px;
        }
        .emoji-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            padding: 5px;
            transition: transform 0.1s;
        }
        .emoji-button:hover {
            transform: scale(1.1);
        }

        /* --- ADMIN PANEL SPECIFIC --- */
        .admin-form {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #555;
            border-radius: 5px;
        }
        .admin-form label, .admin-form input, .admin-form button {
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        .admin-form button {
            background-color: #ff4d4d;
        }
        
    </style>
</head>
<body>
    <div class="container">
        
        <div id="top-bar">
            <h1>Chatroom</h1>
            <div id="user-info">
                <span id="username-display"></span>
                <button id="menu-btn">Μενού</button>
            </div>
        </div>

        <div id="chatbox">
            </div>

        <div id="input-container">
            <div id="formatting-bar">
                <button id="bold-btn"><b>B</b></button>
                <button id="italic-btn"><i>I</i></button>
                <button id="emoji-btn">😊</button>
                <button id="url-btn"><i class="fas fa-link"></i></button>
                <button id="gif-btn">GIF</button>
                <input type="color" id="color-picker" value="#FFFFFF">
            </div>
            <div id="message-send-area">
                <textarea id="message-input" placeholder="Πληκτρολογήστε μήνυμα..."></textarea>
                <button id="send-btn">Αποστολή</button>
            </div>
        </div>

        <div id="menu-overlay" style="display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.8); z-index: 990; justify-content: center; align-items: center;">
            <div style="background-color: #1f1f1f; padding: 30px; border-radius: 10px; text-align: center;">
                <button id="profile-settings-btn" style="display: block; width: 200px; padding: 10px; margin: 10px auto; background-color: #3f3f3f; color: white; border: none; border-radius: 5px; cursor: pointer;">Ρυθμίσεις Προφίλ</button>
                <button id="admin-panel-btn" style="display: none; width: 200px; padding: 10px; margin: 10px auto; background-color: #ffc107; color: black; border: none; border-radius: 5px; cursor: pointer;">Admin Panel</button>
                <button id="logout-btn" style="display: block; width: 200px; padding: 10px; margin: 10px auto; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">Αποσύνδεση</button>
                <button id="close-menu-btn" style="display: block; width: 200px; padding: 10px; margin: 10px auto; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">Κλείσιμο</button>
            </div>
        </div>

        <div id="profile-settings">
            <h3>Ρυθμίσεις Προφίλ</h3>
            <div id="current-avatar-container">
                <img id="current-avatar" src="" alt="Avatar">
            </div>

            <h4>Αλλαγή Εικόνας Προφίλ (Αρχείο)</h4>
            <form id="avatar-form">
                <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                <button type="submit">Αποθήκευση Αρχείου</button>
            </form>

            <hr style="border-color: #444; margin: 20px 0;">

            <h4>Αλλαγή Εικόνας Προφίλ (URL)</h4>
            <form id="avatar-url-form">
                <input type="url" id="avatar-url-input" placeholder="Εισαγωγή μόνιμου URL εικόνας..." required>
                <button type="submit">Αποθήκευση URL</button>
            </form>
            <button onclick="document.getElementById('profile-settings').style.display='none';" style="background-color: #6c757d; margin-top: 15px;">Κλείσιμο</button>
        </div>

        <div id="admin-panel">
            <h3>Admin Panel</h3>
            <button onclick="document.getElementById('admin-panel').style.display='none';" style="background-color: #6c757d; margin-top: 15px;">Κλείσιμο</button>
        </div>

        <div id="emoji-picker-container">
            </div>

    </div>
    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- DOM Elements & State ---
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const usernameDisplay = document.getElementById('username-display');
        const menuBtn = document.getElementById('menu-btn');
        const menuOverlay = document.getElementById('menu-overlay');
        const logoutBtn = document.getElementById('logout-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const profileSettingsBtn = document.getElementById('profile-settings-btn');
        const adminPanelBtn = document.getElementById('admin-panel-btn');
        const profileSettings = document.getElementById('profile-settings');
        const adminPanel = document.getElementById('admin-panel');
        const avatarForm = document.getElementById('avatar-form');
        const avatarUrlForm = document.getElementById('avatar-url-form'); 
        const avatarUrlInput = document.getElementById('avatar-url-input'); 
        const currentAvatar = document.getElementById('current-avatar');

        // Formatting Buttons
        const boldBtn = document.getElementById('bold-btn');
        const italicBtn = document.getElementById('italic-btn');
        const colorPicker = document.getElementById('color-picker');
        const emojiBtn = document.getElementById('emoji-btn');
        const urlBtn = document.getElementById('url-btn');
        const gifBtn = document.getElementById('gif-btn');

        let currentUserRole = 'guest'; 
        let currentUserId = null; // ΝΕΟ: Για να ξέρουμε ποιος στέλνει
        let formattingState = {
            isBold: false,
            isItalic: false,
            color: '#FFFFFF'
        };
        
        // --- WebSockets Connection ---
        const ws = new WebSocket(`ws://${window.location.host}`);

        ws.onopen = () => {
            console.log('Connected to the chat server');
            ws.send(JSON.stringify({ type: 'requestUserInfo' })); 
            ws.send(JSON.stringify({ type: 'requestOldMessages' }));
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'userInfo') {
                usernameDisplay.textContent = `${data.displayName} (${data.role})`;
                currentUserRole = data.role;
                currentUserId = data.userId; // Αποθήκευση του User ID
                currentAvatar.src = data.avatarUrl; 

                if (data.role === 'admin' || data.role === 'moderator') {
                    adminPanelBtn.style.display = 'block';
                } else {
                    adminPanelBtn.style.display = 'none';
                }

            } else if (data.type === 'oldMessages') {
                chatbox.innerHTML = '';
                data.messages.forEach(appendMessage);

            } else if (data.type === 'chatMessage') {
                appendMessage(data);

            } else if (data.type === 'systemMessage') {
                // ... (System message logic) ...
                appendSystemMessage(data.message);
                
            } else if (data.type === 'deleteMessage') {
                const messageEl = document.querySelector(`[data-message-id="${data.messageId}"]`);
                if (messageEl) {
                    messageEl.remove();
                    appendSystemMessage(`Το μήνυμα με ID ${data.messageId} διαγράφηκε από τον διαχειριστή/συντονιστή.`);
                }
            }
        };

        ws.onclose = () => {
            console.log('Disconnected from server');
            alert('Αποσυνδεθήκατε από το chat. Παρακαλώ συνδεθείτε ξανά.');
            window.location.href = '/login.html';
        };

        ws.onerror = (error) => {
            console.error('WebSocket Error:', error);
        };
        
        // --- UI & EVENT LISTENERS ---

        // ... (MENU LOGIC ΕΔΩ) ...

        // FORMATTING LOGIC
        boldBtn.addEventListener('click', () => {
            formattingState.isBold = !formattingState.isBold;
            boldBtn.classList.toggle('active-format', formattingState.isBold);
        });

        italicBtn.addEventListener('click', () => {
            formattingState.isItalic = !formattingState.isItalic;
            italicBtn.classList.toggle('active-format', formattingState.isItalic);
        });
        
        colorPicker.addEventListener('change', (e) => {
            formattingState.color = e.target.value;
        });

        // URL BUTTON
        urlBtn.addEventListener('click', () => {
            const url = prompt("Εισαγωγή URL (πρέπει να ξεκινά με http:// ή https://):");
            if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                messageInput.value += ` [LINK:${url}] `; 
                messageInput.focus();
            } else if (url) {
                 alert("Παρακαλώ εισάγετε έγκυρο URL (πρέπει να ξεκινά με http:// ή https://).");
            }
        });

        // GIF BUTTON (Λύνει το 401 GIF)
        gifBtn.addEventListener('click', async () => {
            const query = prompt("Πληκτρολογήστε όρο αναζήτησης GIF:");
            if (query && query.trim() !== '') {
                try {
                    const res = await fetch(`/search-gifs?q=${encodeURIComponent(query)}`);
                    
                    if (res.status === 401) {
                         alert("Δεν έχετε δικαίωμα αναζήτησης GIF. Συνδεθείτε ξανά.");
                         return;
                    }
                    if (!res.ok) {
                        const errorText = await res.text();
                        throw new Error(`Failed to fetch GIFs from server: ${errorText}`);
                    }
                    
                    const data = await res.json();
                    
                    if (data.success && data.url) {
                        messageInput.value = `[GIF:${data.url}]`; 
                        sendBtn.click(); 
                    } else {
                        alert(data.message || "Δεν βρέθηκαν GIF για τον όρο. Ελέγξτε GIPHY_API_KEY.");
                    }
                    
                } catch (error) {
                    console.error('GIF search error:', error);
                    alert("Αποτυχία αναζήτησης GIF. Ελέγξτε GIPHY_API_KEY.");
                }
            }
        });

        // SEND MESSAGE (Επικαιροποιήθηκε για GIF/LINK)
        sendBtn.addEventListener('click', () => {
            const rawMessage = messageInput.value.trim();
            if (rawMessage && ws.readyState === WebSocket.OPEN) {
                
                // Έλεγχος αν είναι μόνο special tag (GIF ή LINK)
                const isSpecialTag = rawMessage.match(/^\[(GIF|LINK):http[s]?:\/\/[^\s]+\]$/i); 
                
                let messageToSend;
                
                if (isSpecialTag) {
                     messageToSend = rawMessage;
                } else {
                    // Στέλνουμε το μήνυμα με το formatting JSON
                    messageToSend = JSON.stringify({
                        text: rawMessage,
                        isBold: formattingState.isBold,
                        isItalic: formattingState.isItalic,
                        color: formattingState.color
                    });
                }
                
                ws.send(JSON.stringify({ type: 'chatMessage', message: messageToSend }));
                messageInput.value = '';
                // ... (reset formatting state/UI here) ...
            }
        });
        
        // AVATAR FORM HANDLER (ΑΡΧΕΙΟ)
        avatarForm.addEventListener('submit', async (e) => {
             e.preventDefault();
             // ... (file upload logic) ...
        });
        
        // AVATAR FORM HANDLER (URL - Μόνιμη λύση 404)
        avatarUrlForm.addEventListener('submit', async (e) => {
             e.preventDefault();
             const avatarUrl = avatarUrlInput.value.trim();
             
             if (!avatarUrl || (!avatarUrl.startsWith('http://') && !avatarUrl.startsWith('https://'))) {
                 alert('Παρακαλώ εισάγετε έγκυρο URL εικόνας.');
                 return;
             }
             
             try {
                 const res = await fetch('/change-avatar-url', {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ avatarUrl })
                 });
                 
                 if (res.ok) {
                     const data = await res.json();
                     currentAvatar.src = data.avatarUrl; 
                     alert('Το Avatar URL ενημερώθηκε επιτυχώς! (Μόνιμη αποθήκευση)');
                     profileSettings.style.display = 'none';
                     ws.send(JSON.stringify({ type: 'requestUserInfo' })); // Ενημέρωση του chatbox
                 } else {
                     const errorText = await res.text();
                     alert(`Αποτυχία ενημέρωσης Avatar URL: ${errorText}`);
                 }
             } catch (error) {
                 alert('Σφάλμα δικτύου κατά την ενημέρωση του Avatar URL.');
             }
        });
        
        // --- appendMessage (Η ΚΡΙΣΙΜΗ ΔΙΟΡΘΩΣΗ ΓΙΑ JSON/GIF/DELETE) ---
        function appendMessage(data) {
             const messageElement = document.createElement('div');
             messageElement.classList.add('message', `${data.role}-message`);
             messageElement.dataset.messageId = data.id || data.messageId; 
             
             const contentContainer = document.createElement('div');
             contentContainer.classList.add('content-container');
             contentContainer.style.display = 'flex';
             contentContainer.style.alignItems = 'flex-start'; 
             
             // 1. Avatar (ΔΙΟΡΘΩΣΗ: Χρησιμοποιεί το σωστό URL)
             const avatar = document.createElement('img');
             avatar.classList.add('avatar');
             avatar.src = data.avatar_url; 
             contentContainer.appendChild(avatar);

             // 2. Sender Info (Name/Time/Role)
             const senderSpan = document.createElement('span');
             senderSpan.classList.add('sender-info');
             
             const nameSpan = document.createElement('span');
             nameSpan.classList.add('display-name');
             nameSpan.textContent = data.display_name;
             senderSpan.appendChild(nameSpan);

             // 3. Message Content (Parsing JSON/GIF/LINK)
             let text = data.message;
             let format = {};
             // ΠΡΟΣΠΑΘΕΙΑ PARSE (αν είναι JSON με formatting)
             try {
                 const parsedData = JSON.parse(text);
                 if (parsedData.text) { 
                     text = parsedData.text; 
                     format = parsedData; 
                 }
             } catch (e) { /* Είναι απλό κείμενο ή special tag */ }

             const messageText = document.createElement('span');
             messageText.classList.add('message-content');
             // Εφαρμογή formatting
             if (format.isBold) { messageText.style.fontWeight = 'bold'; }
             if (format.isItalic) { messageText.style.fontStyle = 'italic'; }
             if (format.color && format.color !== '#FFFFFF') { messageText.style.color = format.color; }
             
             let contentHTML = text;
             
             // ΕΠΕΞΕΡΓΑΣΙΑ GIF/EIKONΩΝ: [GIF:url] -> <img> (ΔΙΟΡΘΩΣΗ: Λύνει το JSON rendering)
             contentHTML = contentHTML.replace(
                 /\[GIF:(http[s]?:\/\/[^\s]+)\]/gi, 
                 '<br><img src="$1" alt="GIF Media">'
             );
             
             // ΕΠΕΞΕΡΓΑΣΙΑ URL: [LINK:url] -> <a>
             contentHTML = contentHTML.replace(
                 /\[LINK:(http[s]?:\/\/[^\s]+)\]/gi, 
                 '<a href="$1" target="_blank" style="color: #4dc2ff; text-decoration: underline; word-break: break-all;">$1</a>'
             );
             
             // ΚΡΙΣΙΜΟ: Χρησιμοποιούμε innerHTML
             messageText.innerHTML = contentHTML; 
             contentContainer.appendChild(messageText);

             // 4. Timestamp
             const date = new Date(data.timestamp);
             const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
             const timeText = document.createTextNode(` [${timeString}]: `);
             senderSpan.appendChild(timeText);
             
             // 5. ADMIN/MODERATOR DELETE BUTTON (ΔΙΟΡΘΩΣΗ: Προσθέτει το κουμπί)
             if (currentUserRole === 'admin' || currentUserRole === 'moderator') {
                 const deleteBtn = document.createElement('span');
                 deleteBtn.textContent = ' ❌';
                 deleteBtn.classList.add('delete-btn');
                 deleteBtn.title = 'Διαγραφή Μηνύματος';
                 
                 deleteBtn.addEventListener('click', async () => {
                     const messageId = data.id || data.messageId; 
                     if (!messageId) {
                         console.error('Message ID is missing for deletion.', data);
                         return; 
                     }
                     if (confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μήνυμα;')) {
                         try {
                             const res = await fetch(`/delete-message/${messageId}`, { method: 'DELETE' });
                             // Αν η διαγραφή ήταν επιτυχής (π.χ. 200/204), ο server θα στείλει WS event για ενημέρωση
                             if (!res.ok) throw new Error('Delete failed');
                         } catch (error) {
                             console.error('Delete message error:', error);
                             alert('Αποτυχία διαγραφής μηνύματος.');
                         }
                     }
                 });
                 senderSpan.appendChild(deleteBtn);
             }
             
             contentContainer.prepend(senderSpan);
             messageElement.appendChild(contentContainer);
             
             chatbox.appendChild(messageElement);
             chatbox.scrollTop = chatbox.scrollHeight;
        }

        function appendSystemMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('system-message');
            messageElement.textContent = message;
            chatbox.appendChild(messageElement);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        // ... (rest of helper functions like loadEmojis) ...
        
    }); 
</script>
