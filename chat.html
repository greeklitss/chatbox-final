<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- CSS STYLING: FULL SCREEN, TRANSPARENT MESSAGES & COLORED NAMES --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Merriweather', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5; 
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            max-width: none; 
            max-height: none; 
            background: none; 
            box-shadow: none; 
            border-radius: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- ΑΦΑΙΡΕΣΗ HEADER --- */
        #header {
            display: none !important; 
        }
        
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            border-bottom: none; 
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: none; 
            display: flex;
            flex-direction: column;
            position: relative; 

            /* BACKGROUND IMAGE (Πρέπει να υπάρχει το αρχείο akoyme_background.png) */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- DARK OVERLAY (70% opacity) --- */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 1; 
        }
        
        /* --- ΕΝΤΕΛΩΣ ΔΙΑΦΑΝΗ ΜΗΝΥΜΑΤΑ --- */
        .message {
            z-index: 2; 
            margin-bottom: 12px; 
            padding: 5px 0; 
            border-radius: 0; 
            word-wrap: break-word;
            max-width: 80%; 
            position: relative;
            align-self: flex-start !important; 
            display: flex;
            align-items: flex-start;
            background: none !important; 
            backdrop-filter: none; 
            box-shadow: none; 
        }
        
        .message-content {
             text-shadow: none; 
             color: white; 
             font-weight: 400; 
        }
        
        .message .sender {
             font-weight: 700;
             text-shadow: 0 0 2px rgba(0, 0, 0, 0.8); 
        }
        
        /* Χρώματα Ρόλων */
        .user-message .sender { color: #ffffff; }
        .moderator-message .sender { 
            color: #99FFFF; 
            text-shadow: 0 0 5px rgba(153, 255, 255, 0.6); 
        }
        .admin-message .sender { 
            color: #FFD700; 
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.6); 
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.6); 
            flex-shrink: 0; 
        }

        /* --- INPUT BAR & BUTTONS: FULLY TRANSPARENT & ICONS ONLY --- */
        #input-container {
            display: flex;
            flex-direction: column; 
            padding: 10px 15px; 
            border-top: none; 
            position: relative;
            background-color: transparent !important; 
            box-shadow: none; 
            flex-shrink: 0; 
            z-index: 10;
        }

        #messageInputRow {
            display: flex;
            width: 100%;
            align-items: center;
        }

        #formatting-bar {
            display: flex;
            justify-content: flex-start;
            padding-bottom: 5px;
            width: 100%;
        }

        /* Κουμπιά (Icons Only) */
        .format-btn, #urlBtn, #emojiBtn, #gifBtn, #sendBtn {
            border: none;
            width: 40px; 
            height: 40px; 
            padding: 0; 
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 18px;
            
            background-color: rgba(0, 123, 255, 0.5); 
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .format-btn:hover, #urlBtn:hover, #emojiBtn:hover, #gifBtn:hover, #sendBtn:hover {
            background-color: #007bff; 
        }
        .format-btn.active {
            background-color: #007bff;
        }

        #sendBtn {
            width: 50px; 
            margin-left: 5px;
            margin-right: 0;
            font-size: 20px;
        }
        
        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 5px;
            margin-right: 10px;
            background-color: rgba(255, 255, 255, 0.05); 
            color: white; 
            text-shadow: 0 0 1px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s;
        }
        #messageInput:focus {
             border-color: #007bff;
             outline: none;
        }
        #messageInput::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Panels (Admin/Profile) */
        #admin-panel, #profile-settings {
             background: rgba(0, 0, 0, 0.85); 
             color: white;
             padding: 20px;
             position: fixed; /* Fixed αντί για Absolute */
             top: 0; 
             right: 0; 
             width: 300px;
             height: 100%;
             box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
             z-index: 20;
             display: none; 
             overflow-y: auto;
        }
        
        /* --- ΝΕΑ CSS ΓΙΑ ΤΟ MENU ΛΙΣΤΑΣ --- */
        #settings-menu {
             position: fixed;
             top: 55px; 
             right: 15px;
             background: rgba(0, 0, 0, 0.9);
             border-radius: 5px;
             box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
             padding: 5px 0;
             z-index: 101; 
             width: 200px;
             display: none; 
             flex-direction: column;
        }

        .menu-item {
             background: none;
             color: white;
             border: none;
             padding: 10px 15px;
             text-align: left;
             width: 100%;
             cursor: pointer;
             font-size: 14px;
             transition: background-color 0.2s;
        }
        .menu-item:hover {
             background-color: rgba(255, 255, 255, 0.1);
        }
        .menu-item i {
             margin-right: 10px;
        }
        
        /* Κουμπί Menu (Γρανάζι/Αστέρι) */
        #menuToggleBtn {
            background-color: rgba(0, 123, 255, 0.7);
            color: white;
            border: none;
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; 
            top: 15px;
            right: 15px;
            z-index: 100;
        }
        
        /* Κουμπί Αποσύνδεσης (Fixed - Αφαιρέθηκε από το Menu) */
        #menuLogoutBtnFixed {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
        }
        #menuLogoutBtnFixed:hover { background-color: #c82333; }
        
        /* ... (Υπόλοιπο CSS) ... */
    </style>
</head>
<body>
    <div class="container">
        
        <button id="menuLogoutBtnFixed">Αποσύνδεση</button>
        
        <button id="menuToggleBtn" title="Menu"><i class="fas fa-cog"></i></button>

        <div id="chatbox-container">
            <div id="chatbox"></div>
            
            <div id="settings-menu" style="display: none;">
                <button id="menuProfileBtn" class="menu-item"><i class="fas fa-user-circle"></i> Ρυθμίσεις Προφίλ</button>
                <button id="menuAdminBtn" class="menu-item"><i class="fas fa-shield-alt"></i> Admin Panel</button>
            </div>

            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        
        <div id="input-container">
            <div id="formatting-bar">
                <button class="format-btn" id="boldBtn" data-format="isBold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" id="italicBtn" data-format="isItalic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" id="colorBtn" data-format="color"><i class="fas fa-palette"></i></button>
                <input type="color" id="colorPicker" style="display: none;">
            </div>
            
            <div id="messageInputRow">
                <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
                <button id="urlBtn" title="Εισαγωγή URL"><i class="fas fa-link"></i></button>
                <button id="emojiBtn" title="Emojis">😊</button>
                <button id="gifBtn" title="GIF"><i class="fas fa-gift"></i></button>
                <button id="sendBtn" disabled title="Αποστολή"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker"></emoji-picker>

    <div id="gifPicker">
        <input type="text" id="gifSearchInput" placeholder="Αναζήτηση GIF...">
        <div id="gifResults"></div>
    </div>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        // const logoutBtn = document.getElementById('logoutBtn'); // Αφαιρέθηκε

        const adminPanel = document.getElementById('admin-panel');
        // const settingsBtn = document.getElementById('settingsBtn'); // Αφαιρέθηκε
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        const avatarForm = document.getElementById('avatar-form');
        
        // ΝΕΑ ΜΕΤΑΒΛΗΤΗ ΓΙΑ ΤΟ MENU
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const settingsMenu = document.getElementById('settings-menu');
        const menuLogoutBtnFixed = document.getElementById('menuLogoutBtnFixed'); // Fixed Logout Button
        const menuProfileBtn = document.getElementById('menuProfileBtn');
        const menuAdminBtn = document.getElementById('menuAdminBtn');

        // Panels (Κρύβονται με JS για ασφάλεια)
        adminPanel.style.display = 'none';
        profileSettings.style.display = 'none';
        settingsMenu.style.display = 'none'; // Κρύβουμε και το menu λίστας

        const urlBtn = document.getElementById('urlBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');
        const gifPicker = document.getElementById('gifPicker');
        const gifSearchInput = document.getElementById('gifSearchInput');
        const gifResults = document.getElementById('gifResults');

        // Formatting Buttons
        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorBtn = document.getElementById('colorBtn');
        const colorPicker = document.getElementById('colorPicker');
        
        let formattingState = {
            isBold: false,
            isItalic: false,
            color: '#FFFFFF' 
        };

        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        const GIPHY_API_KEY = 'UQxRacYoTn67CWCJ5zbdOvUnzmU0QnUs'; 

        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        sendBtn.disabled = true; 
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        
        ws.onopen = () => {
             console.log('WebSocket Connected!');
             sendBtn.disabled = false; 
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket Error:', error);
            sendBtn.innerHTML = 'Σφάλμα';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'oldMessages':
                    chatbox.innerHTML = '';
                    data.messages.forEach(message => appendMessage(message)); 
                    break;
                case 'newMessage':
                    appendMessage(data);
                    break;
                case 'deleteMessage':
                    deleteMessage(data.messageId);
                    break;
                case 'clearChat':
                    chatbox.innerHTML = '';
                    break;
            }
        };
        
        // --- ADMIN PANEL/SETTINGS FUNCTIONS (Placeholders - MUST BE IMPLEMENTED IN PYTHON BACKEND) ---
        async function loadAdminPanel() {
            try {
                const res = await fetch('/users');
                if (!res.ok) throw new Error('Failed to fetch users');
                const users = await res.json();
                
                userListDiv.innerHTML = '';
                users.forEach(user => {
                    const userItem = document.createElement('div');
                    userItem.classList.add('user-item');
                    userItem.innerHTML = `
                        <span>${user.displayName}</span>
                        <select data-user-id="${user.id}" onchange="changeRole(this)">
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                            <option value="moderator" ${user.role === 'moderator' ? 'selected' : ''}>Moderator</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    `;
                    userListDiv.appendChild(userItem);
                });
            } catch (error) {
                console.error('Error loading admin panel:', error);
                userListDiv.innerHTML = '<p style="color: red;">Σφάλμα φόρτωσης λίστας χρηστών.</p>';
            }
        }
        
        // Global function for role change (must be defined in the window object to be callable from onchange)
        window.changeRole = async function(selectElement) {
            const userId = selectElement.dataset.userId;
            const newRole = selectElement.value;
            if (confirm(`Είστε σίγουροι ότι θέλετε να αλλάξετε τον ρόλο του χρήστη ${userId} σε ${newRole};`)) {
                 try {
                     const res = await fetch('/change-role', {
                         method: 'POST',
                         headers: { 'Content-Type': 'application/json' },
                         body: JSON.stringify({ userId, role: newRole })
                     });
                     if (!res.ok) throw new Error('Αποτυχία αλλαγής ρόλου');
                     alert('Ο ρόλος άλλαξε επιτυχώς!');
                 } catch (error) {
                     console.error('Error changing role:', error);
                     alert('Σφάλμα κατά την αλλαγή ρόλου. Ελέγξτε το server log.');
                 }
            }
        }
        
        // --- ΕΛΕΓΧΟΣ ΡΟΛΟΥ ΚΑΙ ΑΣΦΑΛΕΙΑΣ FRONTEND ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                let avatarSource = '/uploads/default-avatar.png';
                if (data.avatarUrl && data.avatarUrl !== 'default-avatar.png') {
                    if (data.avatarUrl.startsWith('/')) {
                        avatarSource = data.avatarUrl;
                    } else {
                        avatarSource = `/uploads/${data.avatarUrl}`; 
                    }
                } else if (data.avatarUrl && data.avatarUrl.includes('/uploads/')) {
                     avatarSource = data.avatarUrl;
                }
                
                currentAvatar.src = avatarSource;
                currentAvatar.onerror = function() {
                    this.src = '/uploads/default-avatar.png'; 
                };
                
                // Ρύθμιση Εμφάνισης Menu Items βάσει Ρόλου
                menuAdminBtn.style.display = (data.role === 'admin') ? 'flex' : 'none'; 
                menuProfileBtn.style.display = 'flex'; 
                
                // Event Listeners για το Menu
                menuToggleBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    settingsMenu.style.display = settingsMenu.style.display === 'flex' ? 'none' : 'flex';
                    // Κρύψε τα Admin/Profile panels όταν ανοίγει το βασικό Menu
                    adminPanel.style.display = 'none';
                    profileSettings.style.display = 'none';
                });

                menuProfileBtn.addEventListener('click', () => {
                    settingsMenu.style.display = 'none'; 
                    profileSettings.style.display = 'block'; 
                });

                menuAdminBtn.addEventListener('click', () => {
                    settingsMenu.style.display = 'none';
                    adminPanel.style.display = 'block';
                    loadAdminPanel();
                });

            })
            .catch(error => {
                console.error('Σφάλμα κατά την ανάκτησης πληροφοριών χρήστη:', error);
            });
        
        // ... (admin panel buttons, avatar form logic) ...

        function appendMessage(data) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.dataset.messageId = data.id || data.messageId; 
            messageElement.dataset.userId = data.user_id || data.userId;

            switch (data.role) {
                case 'admin':
                    messageElement.classList.add('admin-message');
                    break;
                case 'moderator':
                    messageElement.classList.add('moderator-message');
                    break;
                default:
                    messageElement.classList.add('user-message');
                    break;
            }
            
            const avatarImg = document.createElement('img');
            avatarImg.classList.add('avatar');
            
            let avatarUrl = '/uploads/default-avatar.png';
            if (data.avatar_url || data.avatarUrl) {
                const providedUrl = data.avatar_url || data.avatarUrl;
                 if (providedUrl.startsWith('/')) {
                     avatarUrl = providedUrl;
                 } else if (providedUrl !== 'default-avatar.png') {
                     avatarUrl = `/uploads/${providedUrl}`;
                 }
            }
            avatarImg.src = avatarUrl; 
            avatarImg.onerror = function() {
                this.src = '/uploads/default-avatar.png'; 
            };
            messageElement.appendChild(avatarImg);
            
            const contentContainer = document.createElement('div');
            contentContainer.classList.add('message-content-container');
            
            const senderSpan = document.createElement('span');
            senderSpan.classList.add('sender');
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = data.displayName;
            if (data.role === 'admin') {
                const adminBadge = document.createElement('span');
                adminBadge.classList.add('admin-badge');
                adminBadge.textContent = 'Admin';
                nameSpan.appendChild(adminBadge);
            }
            
            senderSpan.appendChild(nameSpan);

            const isGif = data.message && (data.message.startsWith('http://') || data.message.startsWith('https://')) && (data.message.includes('giphy.com') || data.message.includes('media'));
            
            if (isGif) {
                const gifImage = document.createElement('img');
                gifImage.src = data.message;
                gifImage.classList.add('gif');
                contentContainer.appendChild(gifImage);
            } else {
                
                let text = data.message;
                let format = {};
                
                // ΔΙΟΡΘΩΣΗ JSON: Χειρισμός JSON strings από παλιά μηνύματα
                try {
                    const parsedData = JSON.parse(text);
                    if (parsedData.text) {
                        text = parsedData.text; 
                        format = parsedData;
                    }
                } catch (e) {
                    // Είναι απλό κείμενο, format παραμένει κενό
                }

                const messageText = document.createElement('span');
                messageText.classList.add('message-content');
                
                // Εφαρμογή Formatting
                if (format.isBold === true) {
                    messageText.style.fontWeight = 'bold';
                }
                if (format.isItalic === true) {
                    messageText.style.fontStyle = 'italic';
                }
                if (format.color && format.color !== '#FFFFFF') {
                    messageText.style.color = format.color;
                }
                
                // *** ΕΛΕΓΧΟΣ ΓΙΑ URL ***
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                if (urlRegex.test(text)) {
                    const parts = text.split(urlRegex);
                    parts.forEach(part => {
                        if (urlRegex.test(part)) {
                            const link = document.createElement('a');
                            link.href = part;
                            link.textContent = part;
                            link.target = '_blank';
                            link.style.color = '#79d1ff'; 
                            link.style.textShadow = '0 0 1px rgba(0, 0, 0, 0.5)';
                            contentContainer.appendChild(link);
                        } else {
                            const regularText = messageText.cloneNode(true); 
                            regularText.textContent = part;
                            contentContainer.appendChild(regularText);
                        }
                    });
                    
                } else {
                    messageText.textContent = text;
                    contentContainer.appendChild(messageText);
                }
            }

            
            const date = new Date(data.timestamp);
            const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const timeText = document.createTextNode(` [${timeString}]: `);
            senderSpan.appendChild(timeText);

            // ... (deleteBtn logic - παραμένει) ...

            contentContainer.prepend(senderSpan);
            messageElement.appendChild(contentContainer);
            
            chatbox.appendChild(messageElement);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
        
        // ... (deleteMessage, clearHistoryBtn, savePdfBtn, avatarForm logic) ...

        // --- LOGIC ΓΙΑ FORMATTING BUTTONS ---
        boldBtn.addEventListener('click', () => toggleFormatting('isBold', boldBtn));
        italicBtn.addEventListener('click', () => toggleFormatting('isItalic', italicBtn));
        
        colorBtn.addEventListener('click', () => {
            colorPicker.click();
        });

        colorPicker.addEventListener('input', (e) => {
            formattingState.color = e.target.value;
            colorBtn.style.backgroundColor = e.target.value;
            colorBtn.classList.add('active');
        });
        
        function toggleFormatting(formatKey, button) {
            if (formatKey === 'color') {
                return;
            }
            formattingState[formatKey] = !formattingState[formatKey];
            button.classList.toggle('active', formattingState[formatKey]);
            if (formatKey === 'isBold' || formatKey === 'isItalic') {
                 messageInput.style.fontWeight = formattingState.isBold ? 'bold' : 'normal';
                 messageInput.style.fontStyle = formattingState.isItalic ? 'italic' : 'normal';
            }
        }
        
        // --- SEND MESSAGE LOGIC (UPDATED FOR FORMATTING) ---
        sendBtn.addEventListener('click', () => {
            const rawMessage = messageInput.value.trim();
            if (rawMessage) {
                if (ws.readyState === WebSocket.OPEN) {
                    const formattedMessage = JSON.stringify({
                        text: rawMessage,
                        isBold: formattingState.isBold,
                        isItalic: formattingState.isItalic,
                        color: formattingState.color
                    });
                    
                    ws.send(JSON.stringify({ type: 'chatMessage', message: formattedMessage }));
                    messageInput.value = '';
                    
                    // Reset formatting state and buttons after sending
                    formattingState = { isBold: false, isItalic: false, color: '#FFFFFF' };
                    boldBtn.classList.remove('active');
                    italicBtn.classList.remove('active');
                    colorBtn.style.backgroundColor = 'rgba(0, 123, 255, 0.5)';
                    colorBtn.classList.remove('active');
                    messageInput.style.fontWeight = 'normal';
                    messageInput.style.fontStyle = 'normal';

                } else {
                    alert('Η σύνδεση στο chat δεν είναι έτοιμη. Δοκιμάστε να ανανεώσετε τη σελίδα.');
                }
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        // --- LOGOUT LOGIC ---
        menuLogoutBtnFixed.addEventListener('click', async () => {
            if (confirm('Είστε σίγουροι ότι θέλετε να αποσυνδεθείτε;')) {
                try {
                    const res = await fetch('/logout', { method: 'POST' });
                    if (res.ok) {
                        window.location.href = '/login'; 
                    } else {
                        alert('Αποτυχία αποσύνδεσης.');
                    }
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }
        });

        // --- CLOSING PANELS LOGIC ---
        document.addEventListener('click', (e) => { 
            const clickedInsideMenu = settingsMenu.contains(e.target) || menuToggleBtn.contains(e.target);
            const clickedInsideAdmin = adminPanel.contains(e.target);
            const clickedInsideSettings = profileSettings.contains(e.target);

            if (settingsMenu.style.display === 'flex' && !clickedInsideMenu) {
                settingsMenu.style.display = 'none';
            }
            if (adminPanel.style.display === 'block' && !clickedInsideAdmin && e.target !== menuAdminBtn) {
                 adminPanel.style.display = 'none';
            }
            if (profileSettings.style.display === 'block' && !clickedInsideSettings && e.target !== menuProfileBtn) {
                 profileSettings.style.display = 'none';
            }
        });


        // ... (emoji/gif logic - παραμένουν) ...
    }); 
</script>
</body>
</html>
