<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- CSS STYLING: FULL SCREEN, TRANSPARENT MESSAGES & COLORED NAMES --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }
        
        body {
            font-family: 'Merriweather', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5; 
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            max-width: none; 
            max-height: none; 
            background: none; 
            box-shadow: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* --- ΑΛΛΑΓΗ 3: ΔΙΑΦΑΝΕΙΑ ΚΕΦΑΛΙΔΑΣ (#header) --- */
        #header {
            padding: 15px;
            background: rgba(0, 123, 255, 0.6); /* Μπλε με 60% διαφάνεια */
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; 
            backdrop-filter: blur(5px); /* Εφέ θολώματος για να φαίνεται πιο "γυάλινο" */
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        #header h2 {
            margin: 0;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        #logoutBtn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        #logoutBtn:hover {
            background-color: #c82333;
        }
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            border-bottom: 1px solid #ccc; 
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: none; 
            display: flex;
            flex-direction: column;
            position: relative; 

            /* BACKGROUND IMAGE */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- DARK OVERLAY (70% opacity για μέγιστη αντίθεση) --- */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7); /* Αυξήθηκε στο 70% για να "σκάσουν" τα λευκά γράμματα */
            z-index: 1; 
        }
        
        /* --- MESSAGES STYLING: ΕΥΘΥΓΡΑΜΜΙΣΗ ΑΡΙΣΤΕΡΑ & ΕΝΤΕΛΩΣ ΔΙΑΦΑΝΕΣ (#2) --- */
        .message {
            z-index: 2; 
            margin-bottom: 12px; 
            padding: 8px 0; /* Μικρότερο padding για να φαίνεται πιο "σφιχτό" */
            border-radius: 0; 
            word-wrap: break-word;
            max-width: 80%; /* Αύξηση max-width για καλύτερη χρήση χώρου */
            position: relative;
            
            align-self: flex-start !important; 
            
            display: flex;
            align-items: flex-start;
            
            /* ΑΛΛΑΓΗ 2: ΕΝΤΕΛΩΣ ΔΙΑΦΑΝΕΣ BACKGROUND */
            background: none !important; 
            box-shadow: none; 
        }
        
        /* Βασικό χρώμα κειμένου μηνυμάτων: Λευκό με δυνατή σκιά για μέγιστη αναγνωσιμότητα */
        .message-content {
             /* Δυνατή σκιά για να φαίνεται πάνω σε κάθε φόντο */
             text-shadow: 1px 1px 4px rgba(0, 0, 0, 1), 0 0 2px rgba(255, 255, 255, 0.5); 
             color: white; 
             font-weight: 400; 
        }
        
        /* Χρωματισμός Ονόματος Χρήστη */
        .message .sender {
             font-weight: 700;
             text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9); 
        }
        
        /* 1. Χρώμα για απλούς Χρήστες (Sender Name) */
        .user-message .sender {
            color: #ffffff; /* Καθαρό Λευκό */
        }
        
        /* 2. Χρώμα για Moderators (Sender Name) */
        .moderator-message .sender {
            color: #4df9ff; /* Cyan */
        }
        
        /* 3. Χρώμα για Admins (Sender Name) */
        .admin-message .sender {
            color: #ffd700; /* Χρυσό */
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.6); 
        }

        /* --- ΑΛΛΑΓΗ 4: ΔΙΑΦΑΝΕΙΑ INPUT/BUTTONS --- */
        #input-container {
            display: flex;
            padding: 15px;
            border-top: none; 
            position: relative;
            background-color: transparent; /* Εντελώς διαφανές */
            flex-shrink: 0; 
            flex-wrap: wrap; 
        }

        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.5); /* Λευκό ημιδιαφανές περίγραμμα */
            border-radius: 5px;
            margin-right: 10px;
            background-color: rgba(255, 255, 255, 0.1); /* Πολύ ελαφρύ, ημιδιαφανές background input */
            color: white; /* Χρώμα κειμένου λευκό */
        }
        /* Placeholder styling */
        #messageInput::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* Formatting bar buttons */
        #formatting-bar {
            width: 100%;
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            align-items: center;
        }
        .format-btn {
            background-color: rgba(255, 255, 255, 0.2); /* Ημιδιαφανές */
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        .format-btn.active {
            background-color: #007bff;
            color: white;
        }
        #colorPicker {
             /* ... (ίδιο) ... */
        }
        #colorLabel {
             font-size: 0.9em;
             margin-right: 5px;
             color: white; /* Λευκό κείμενο για το label */
        }
        
        /* Send, Emoji, GIF buttons */
        #sendBtn, #emojiBtn, #gifBtn {
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
            background-color: rgba(0, 123, 255, 0.7); /* Μπλε ημιδιαφανές */
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        #sendBtn:hover, #emojiBtn:hover, #gifBtn:hover {
            background-color: #007bff; /* Πλήρες μπλε στο hover */
        }
        #admin-panel {
            padding: 20px;
            background: rgba(240, 242, 245, 0.9); /* Ελαφρύ panel background */
            border-left: 1px solid #ddd;
            display: none;
            width: 250px;
            overflow-y: auto;
            flex-shrink: 0; 
        }
        #profile-settings {
            padding: 20px;
            background: rgba(240, 242, 245, 0.9);
            border-left: 1px solid #ddd;
            display: none;
            width: 250px;
            overflow-y: auto;
            flex-shrink: 0; 
        }
        /* ... (Ο υπόλοιπος CSS κώδικας παραμένει ίδιος) ... */
    </style>
</head>
<body>
    <div class="container">
        <div id="header">
            <h2>Chatbox - Webradio Akoyme</h2>
            <div style="display: flex; align-items: center;">
                <button id="settingsBtn" class="settings-btn">Ρυθμίσεις</button>
                <button id="logoutBtn">Αποσύνδεση</button>
            </div>
        </div>
        <div id="chatbox-container">
            <div id="chatbox"></div>
            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        <div id="input-container">
            <div id="formatting-bar">
                <span id="colorLabel">Χρώμα Κειμένου:</span>
                <input type="color" id="colorPicker" value="#FFFFFF">
                <button id="boldBtn" class="format-btn">B</button>
                <button id="italicBtn" class="format-btn">I</button>
            </div>
            <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
            <button id="emojiBtn">😊</button>
            <button id="gifBtn">GIF</button>
            <button id="sendBtn" disabled>Αποστολή</button>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker"></emoji-picker>

    <div id="gifPicker">
        <input type="text" id="gifSearchInput" placeholder="Αναζήτηση GIF...">
        <div id="gifResults"></div>
    </div>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorPicker = document.getElementById('colorPicker');
        const adminPanel = document.getElementById('admin-panel');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const savePdfBtn = document.getElementById('savePdfBtn');
        const userListDiv = document.getElementById('userList');
        const settingsBtn = document.getElementById('settingsBtn');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        const avatarForm = document.getElementById('avatar-form');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');
        const gifPicker = document.getElementById('gifPicker');
        const gifSearchInput = document.getElementById('gifSearchInput');
        const gifResults = document.getElementById('gifResults');

        let isBold = false;
        let isItalic = false;
        let textColor = '#FFFFFF';

        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        const GIPHY_API_KEY = 'UQxRacYoTn67CWCJ5zbdOvUnzmU0QnUs'; 

        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        sendBtn.disabled = true; 
        sendBtn.textContent = 'Σύνδεση...';
        
        ws.onopen = () => {
             console.log('WebSocket Connected!');
             sendBtn.disabled = false; 
             sendBtn.textContent = 'Αποστολή';
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket Error:', error);
            sendBtn.textContent = 'Σφάλμα';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case 'oldMessages':
                    chatbox.innerHTML = '';
                    data.messages.forEach(message => appendMessage(message)); 
                    break;
                case 'newMessage':
                    appendMessage(data);
                    break;
                case 'deleteMessage':
                    deleteMessage(data.messageId);
                    break;
                case 'clearChat':
                    chatbox.innerHTML = '';
                    break;
            }
        };

        // --- ΑΛΛΑΓΗ 1: ΔΙΟΡΘΩΣΗ ASYNC LOGIC ΓΙΑ ΤΟ ADMIN BUTTON ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                if (data.role === 'admin') {
                    // Εμφάνιση Admin button ΜΟΝΟ αν είναι admin
                    const adminButton = document.createElement('button');
                    adminButton.id = 'adminPanelBtn';
                    adminButton.classList.add('settings-btn');
                    adminButton.textContent = 'Admin Panel';
                    
                    adminButton.addEventListener('click', () => {
                        if (adminPanel.style.display === 'block') {
                            adminPanel.style.display = 'none';
                        } else {
                            adminPanel.style.display = 'block';
                            if (profileSettings.style.display === 'block') {
                                profileSettings.style.display = 'none';
                            }
                        }
                    });
                    document.getElementById('header').querySelector('div').prepend(adminButton);
                    
                    loadAdminPanel(); // Φόρτωση panel data
                }
                
                const avatarSource = data.avatarUrl || '/uploads/default-avatar.png';
                currentAvatar.src = avatarSource;
                
                // Προσοχή, τα old messages τα ζητάμε μετά τη σύνδεση, όχι εδώ
            })
            .catch(error => {
                console.error('Σφάλμα κατά την ανάκτηση πληροφοριών χρήστη:', error);
            });
        
        settingsBtn.addEventListener('click', () => {
            if (profileSettings.style.display === 'block') {
                profileSettings.style.display = 'none';
            } else {
                profileSettings.style.display = 'block';
                const adminPanelBtn = document.getElementById('adminPanelBtn');
                // Αν είναι admin και το admin panel είναι ανοιχτό, κλείστο
                if (currentUserRole === 'admin' && adminPanel.style.display === 'block') {
                     adminPanel.style.display = 'none';
                }
            }
        });
        
        // --- ΑΦΑΙΡΕΘΗΚΕ: Ο κώδικας για το admin button βγήκε από το DOMContentLoaded και μπήκε στο .then()

        document.addEventListener('click', (e) => {
            const adminPanelBtn = document.getElementById('adminPanelBtn');
            const clickedInsideAdmin = adminPanel.contains(e.target) || (adminPanelBtn && adminPanelBtn.contains(e.target));
            const clickedInsideSettings = profileSettings.contains(e.target) || settingsBtn.contains(e.target);

            if (!clickedInsideAdmin && adminPanel.style.display === 'block') {
                adminPanel.style.display = 'none';
            }
            if (!clickedInsideSettings && profileSettings.style.display === 'block') {
                profileSettings.style.display = 'none';
            }
        });

        async function loadAdminPanel() {
             if (currentUserRole !== 'admin') return; // Έξτρα έλεγχος ασφαλείας
            try {
                const response = await fetch('/users');
                if (!response.ok) throw new Error('Failed to fetch users');
                const users = await response.json();
                userListDiv.innerHTML = '';
                users.forEach(user => {
                    const userItem = document.createElement('div');
                    userItem.classList.add('user-item');
                    userItem.innerHTML = `
                        <span>${user.display_name}</span>
                        <select data-user-id="${user.id}">
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                            <option value="moderator" ${user.role === 'moderator' ? 'selected' : ''}>Moderator</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    `;
                    const select = userItem.querySelector('select');
                    select.addEventListener('change', async () => {
                        const newRole = select.value;
                        const userId = select.dataset.userId;
                        try {
                            const res = await fetch('/change-role', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userId, newRole })
                            });
                            if (!res.ok) throw new Error('Role change failed');
                            alert('Ο ρόλος άλλαξε επιτυχώς!');
                        } catch (error) {
                            console.error('Error changing role:', error);
                            alert('Αποτυχία αλλαγής ρόλου.');
                        }
                    });
                    userListDiv.appendChild(userItem);
                });
            } catch (error) {
                console.error('Error loading admin panel:', error);
            }
        }

        // ... (Οι υπόλοιπες συναρτήσεις παραμένουν ίδιες) ...

        clearHistoryBtn.addEventListener('click', async () => { /* ... unchanged ... */ });
        savePdfBtn.addEventListener('click', () => { /* ... unchanged ... */ });
        avatarForm.addEventListener('submit', async (e) => { /* ... unchanged ... */ });
        
        function appendMessage(data) {
            // ... (Η appendMessage παραμένει ίδια, αλλά τα styles πλέον την κάνουν transparent) ...
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.dataset.messageId = data.id || data.messageId; 
            messageElement.dataset.userId = data.user_id || data.userId;

            switch (data.role) {
                case 'admin':
                    messageElement.classList.add('admin-message');
                    break;
                case 'moderator':
                    messageElement.classList.add('moderator-message');
                    break;
                default:
                    messageElement.classList.add('user-message');
                    break;
            }
            
            const avatarImg = document.createElement('img');
            avatarImg.classList.add('avatar');
            avatarImg.src = data.avatar_url || data.avatarUrl || '/uploads/default-avatar.png'; 
            messageElement.appendChild(avatarImg);

            const contentContainer = document.createElement('div');
            contentContainer.classList.add('message-content-container');
            
            const senderSpan = document.createElement('span');
            senderSpan.classList.add('sender');
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = data.displayName;
            if (data.role === 'admin') {
                const adminBadge = document.createElement('span');
                adminBadge.classList.add('admin-badge');
                adminBadge.textContent = 'Admin';
                nameSpan.appendChild(adminBadge);
            }
            
            senderSpan.appendChild(nameSpan);

            const isGif = data.message && (data.message.startsWith('http://') || data.message.startsWith('https://')) && (data.message.includes('giphy.com') || data.message.includes('media'));
            
            if (isGif) {
                const gifImage = document.createElement('img');
                gifImage.src = data.message;
                gifImage.classList.add('gif');
                contentContainer.appendChild(gifImage);
            } else {
                const messageText = document.createElement('span');
                messageText.classList.add('message-content');
                
                let text = data.message;
                
                try {
                    const formattedData = JSON.parse(text);
                    if (formattedData.text) {
                        text = formattedData.text;
                        
                        // Apply Color
                        if (formattedData.color && formattedData.color !== '#FFFFFF') {
                            messageText.style.color = formattedData.color;
                            messageText.style.textShadow = 'none'; 
                        }
                        
                        // Apply Bold/Italic
                        if (formattedData.isBold) {
                            messageText.classList.add('bold');
                        }
                        if (formattedData.isItalic) {
                            messageText.classList.add('italic');
                        }
                    }
                } catch (e) {
                    // Not a JSON message, it's just plain text
                }
                
                messageText.textContent = text;
                contentContainer.appendChild(messageText);
            }

            
            const date = new Date(data.timestamp);
            const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const timeText = document.createTextNode(` [${timeString}]: `);
            senderSpan.appendChild(timeText);

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.innerHTML = '&#x2715;';
            deleteBtn.title = 'Διαγραφή μηνύματος';
            
            if (currentUserRole === 'admin') { 
                deleteBtn.style.display = 'inline-block'; 
                deleteBtn.addEventListener('click', async () => {
                    if (confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μήνυμα;')) {
                        try {
                            const messageId = data.id || data.messageId;
                            const res = await fetch(`/delete-message/${messageId}`, { method: 'DELETE' }); 
                            if (!res.ok) {
                                const errorText = await res.text();
                                alert(`Αποτυχία διαγραφής μηνύματος: ${errorText}`); 
                            }
                        } catch (error) {
                            console.error('Error deleting message:', error);
                        }
                    }
                });
            } else {
                deleteBtn.style.display = 'none'; 
            }

            if (currentUserRole === 'admin') {
                senderSpan.appendChild(deleteBtn);
            }

            contentContainer.prepend(senderSpan);
            messageElement.appendChild(contentContainer);
            
            chatbox.appendChild(messageElement);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function deleteMessage(messageId) { /* ... unchanged ... */ }
        sendBtn.addEventListener('click', () => { /* ... unchanged ... */ });
        boldBtn.addEventListener('click', () => { /* ... unchanged ... */ });
        italicBtn.addEventListener('click', () => { /* ... unchanged ... */ });
        colorPicker.addEventListener('input', (e) => { /* ... unchanged ... */ });
        messageInput.addEventListener('keypress', (e) => { /* ... unchanged ... */ });
        logoutBtn.addEventListener('click', async () => { /* ... unchanged ... */ });
        emojiBtn.addEventListener('click', (e) => { /* ... unchanged ... */ });
        emojiPicker.addEventListener('emoji-click', event => { /* ... unchanged ... */ });
        gifBtn.addEventListener('click', (e) => { /* ... unchanged ... */ });
        document.addEventListener('click', (e) => { /* ... unchanged ... */ });
        gifSearchInput.addEventListener('input', () => { /* ... unchanged ... */ });
        async function searchGifs(query = '') { /* ... unchanged ... */ }
        function displayGifs(gifs) { /* ... unchanged ... */ }
    }); 
</script>
</body>
</html>
