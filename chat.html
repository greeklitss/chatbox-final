<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- GLOBAL & STRUCTURE --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            background-color: #121212; 
            color: #E0E0E0;
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* --- CHATBOX & BACKGROUND --- */
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative; 
            background-color: #1A1A1A; 
            
            /* Background Image */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1; 
        }
        
        /* --- MESSAGES --- */
        .message {
            z-index: 2; 
            margin-bottom: 15px; 
            padding: 5px 0; 
            word-wrap: break-word;
            max-width: 90%; 
            display: flex;
            align-items: flex-start;
        }
        
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid #444; 
            flex-shrink: 0; 
        }
        
        .message-content-container {
            display: flex;
            flex-direction: column;
        }

        .sender {
             font-weight: 700;
             font-size: 0.9em;
             margin-bottom: 3px;
        }
        
        .user-message .sender { color: #8888FF; } 
        .moderator-message .sender { color: #32CD32; } 
        .admin-message .sender { color: #FFD700; } 
        
        .message-content {
             color: #E0E0E0; 
             font-size: 1em;
             line-height: 1.4;
        }

        /* DELETE BUTTON for Admin */
        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 10px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .delete-btn:hover {
            opacity: 1;
        }

        /* --- INPUT & FORMATTING BAR --- */
        #input-container {
            display: flex;
            flex-direction: column; 
            padding: 10px 15px; 
            background-color: #282828; 
            flex-shrink: 0; 
            z-index: 10;
        }

        #messageInputRow {
            display: flex;
            width: 100%;
            align-items: center;
        }

        #formatting-bar {
            display: flex;
            justify-content: flex-start;
            padding-bottom: 8px;
            width: 100%;
        }

        /* Κουμπιά */
        .format-btn, #urlBtn, #emojiBtn, #gifBtn, #sendBtn {
            border: none;
            width: 38px; 
            height: 38px; 
            padding: 0; 
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 18px;
            background-color: #3A3A3A; 
            color: #E0E0E0;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .format-btn:hover, #urlBtn:hover, #emojiBtn:hover, #gifBtn:hover {
            background-color: #555555; 
        }
        .format-btn.active, #sendBtn {
            background-color: #007bff; 
        }

        #sendBtn {
            width: 50px; 
            margin-left: 5px;
            font-size: 20px;
        }
        
        /* INPUT FIELD: Εγγύηση Ορατότητας */
        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #444; 
            border-radius: 5px;
            margin-right: 10px;
            background-color: #3A3A3A; 
            
            /* ΕΠΙΒΟΛΗ: Το κείμενο εισαγωγής είναι πάντα λευκό */
            color: white !important; 
            
            font-size: 1em;
            transition: border-color 0.3s;
        }

        /* Placeholder */
        #messageInput::placeholder {
            color: #999 !important; 
            opacity: 1 !important;
        }
        #messageInput:focus {
             border-color: #007bff;
             outline: none;
        }

        /* --- MENU ΡΥΘΜΙΣΕΩΝ --- */
        #menuToggleBtn {
            background-color: #007bff;
            color: white;
            border: none;
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; 
            top: 15px;
            right: 15px;
            z-index: 100;
        }
        
        #settings-menu {
             position: fixed;
             top: 55px; 
             right: 15px;
             background: #282828;
             border-radius: 5px;
             box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
             padding: 5px 0;
             z-index: 101; 
             width: 200px;
             display: none; 
             flex-direction: column;
        }

        .menu-item {
             background: none;
             color: #E0E0E0;
             border: none;
             padding: 10px 15px;
             text-align: left;
             width: 100%;
             cursor: pointer;
             font-size: 14px;
             transition: background-color 0.2s;
        }
        .menu-item:hover {
             background-color: #3A3A3A;
        }
        .menu-item i {
             margin-right: 10px;
        }
        
        /* ADMIN/PROFILE PANELS */
        #admin-panel, #profile-settings {
             background: #1A1A1A; 
             color: #E0E0E0;
             padding: 20px;
             position: fixed; 
             top: 0; 
             right: 0; 
             width: 300px;
             height: 100%;
             box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
             z-index: 20;
             display: none; 
             overflow-y: auto;
        }
        
    </style>
</head>
<body>
    <div class="container">
        
        <button id="menuToggleBtn" title="Menu"><i class="fas fa-cog"></i></button>

        <div id="chatbox-container">
            <div id="chatbox"></div>
            
            <div id="settings-menu" style="display: none;">
                <button id="menuProfileBtn" class="menu-item"><i class="fas fa-user-circle"></i> Ρυθμίσεις Προφίλ</button>
                <button id="menuAdminBtn" class="menu-item"><i class="fas fa-shield-alt"></i> Admin Panel</button>
                <hr style="border-color: #444; margin: 5px 0;">
                <button id="menuLogoutBtn" class="menu-item" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Αποσύνδεση</button>
            </div>

            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr style="border-color: #444;">
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        
        <div id="input-container">
            <div id="formatting-bar">
                <button class="format-btn" id="boldBtn" data-format="isBold" title="Bold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" id="italicBtn" data-format="isItalic" title="Italic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" id="colorBtn" data-format="color" title="Color"><i class="fas fa-palette"></i></button>
                <input type="color" id="colorPicker" style="display: none;">
            </div>
            
            <div id="messageInputRow">
                <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
                
                <button id="urlBtn" title="Εισαγωγή URL"><i class="fas fa-link"></i></button>
                <button id="emojiBtn" title="Emojis">😊</button>
                <button id="gifBtn" title="GIF"><i class="fas fa-gift"></i></button>
                
                <button id="sendBtn" disabled title="Αποστολή"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker" style="display:none;"></emoji-picker>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- DOM Elements ---
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const adminPanel = document.getElementById('admin-panel');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const settingsMenu = document.getElementById('settings-menu');
        const menuLogoutBtn = document.getElementById('menuLogoutBtn'); 
        const menuProfileBtn = document.getElementById('menuProfileBtn');
        const menuAdminBtn = document.getElementById('menuAdminBtn');
        
        const clearHistoryBtn = document.getElementById('clearHistoryBtn'); 
        const userListDiv = document.getElementById('userList'); 
        const avatarForm = document.getElementById('avatar-form'); 
        const savePdfBtn = document.getElementById('savePdfBtn'); 
        
        const urlBtn = document.getElementById('urlBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');

        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorBtn = document.getElementById('colorBtn');
        const colorPicker = document.getElementById('colorPicker');
        
        // --- State ---
        let formattingState = {
            isBold: false,
            isItalic: false,
            color: '#FFFFFF' 
        };

        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        // --- Init ---
        sendBtn.disabled = true; 
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        adminPanel.style.display = 'none';
        profileSettings.style.display = 'none';
        settingsMenu.style.display = 'none'; 
        
        // --- WebSockets ---
        ws.onopen = () => { console.log('WebSocket Connected'); };
        ws.onerror = (error) => { console.error('WebSocket Error:', error); };
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'oldMessages') {
                chatbox.innerHTML = '';
                data.messages.forEach(message => appendMessage(message)); 
            } else if (data.type === 'newMessage') {
                appendMessage(data);
            } else if (data.type === 'clearChat') { 
                chatbox.innerHTML = '';
            } else if (data.type === 'deleteMessage') { 
                const el = document.querySelector(`[data-message-id="${data.messageId}"]`);
                if(el) el.remove();
            }
            chatbox.scrollTop = chatbox.scrollHeight; 
        };
        
        // --- PLACEHOLDER FUNCTIONS (Απαιτείται Backend) ---
        async function loadAdminPanel() { 
             try {
                const res = await fetch('/users');
                if (!res.ok) throw new Error('Not authorised or server error');
                const users = await res.json();
                
                userListDiv.innerHTML = 'Δεν βρέθηκαν άλλοι χρήστες.';
                
                users.forEach(user => {
                    if (user.id === currentUserId) return; 
                    
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `
                        <strong>${user.display_name}</strong> (${user.role})<br>
                        <select data-user-id="${user.id}" class="role-select" style="width: 100%;">
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                            <option value="moderator" ${user.role === 'moderator' ? 'selected' : ''}>Moderator</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                    `;
                    if (userListDiv.innerHTML === 'Δεν βρέθηκαν άλλοι χρήστες.') userListDiv.innerHTML = '';
                    userListDiv.appendChild(div);
                });

                document.querySelectorAll('.role-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const userId = e.target.dataset.userId;
                        const newRole = e.target.value;
                        if (!confirm(`Είστε σίγουροι ότι θέλετε να αλλάξετε τον ρόλο του χρήστη ${userId} σε ${newRole};`)) return;

                        try {
                            const res = await fetch('/change-role', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userId, newRole })
                            });
                            if (res.ok) {
                                alert(`Ο ρόλος του χρήστη ${userId} άλλαξε σε ${newRole}!`);
                            } else {
                                throw new Error('Failed to change role');
                            }
                        } catch (error) {
                            console.error('Role change error:', error);
                            alert('Αποτυχία αλλαγής ρόλου. Πιθανόν δεν έχετε επαρκή δικαιώματα.');
                        }
                    });
                });

            } catch (error) {
                console.error('Failed to load admin panel:', error);
            }
        }
        
        // --- USER INFO & AVATAR ---
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                // Avatar Source
                let avatarSource = data.avatarUrl || '/uploads/default-avatar.png'; 
                currentAvatar.src = avatarSource;
                currentAvatar.onerror = function() { this.src = '/uploads/default-avatar.png'; };
                
                // Menu visibility based on role
                menuAdminBtn.style.display = (data.role === 'admin') ? 'flex' : 'none'; 
            })
            .catch(error => {
                console.error('Σφάλμα (User Info / Avatar):', error);
                menuAdminBtn.style.display = 'none'; 
                menuProfileBtn.style.display = 'none';
            });
        
        
        // --- EVENT LISTENERS ---
        
        // *** ΝΕΑ ΠΡΟΣΘΗΚΗ: Ενεργοποίηση/Απενεργοποίηση Send Button ***
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = messageInput.value.trim().length === 0;
        });

        // MENU
        menuToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            settingsMenu.style.display = settingsMenu.style.display === 'flex' ? 'none' : 'flex';
            adminPanel.style.display = 'none';
            profileSettings.style.display = 'none';
        });

        menuProfileBtn.addEventListener('click', () => {
            settingsMenu.style.display = 'none'; 
            profileSettings.style.display = 'block'; 
        });

        menuAdminBtn.addEventListener('click', () => {
            settingsMenu.style.display = 'none';
            adminPanel.style.display = 'block';
            loadAdminPanel();
        });
        
        // LOGOUT
        menuLogoutBtn.addEventListener('click', async () => {
             if (confirm('Είστε σίγουροι ότι θέλετε να αποσυνδεθείτε;')) {
                 try {
                     const res = await fetch('/logout', { method: 'POST' });
                     if (res.ok) {
                         window.location.href = '/'; 
                     } else {
                         alert('Αποτυχία αποσύνδεσης.');
                     }
                 } catch (error) {
                     console.error('Logout request error:', error);
                 }
             }
         });

        // --- FORMATTING LOGIC ---
        boldBtn.addEventListener('click', () => toggleFormatting('isBold', boldBtn));
        italicBtn.addEventListener('click', () => toggleFormatting('isItalic', italicBtn));
        
        // Color Picker Logic
        colorBtn.addEventListener('click', () => { colorPicker.click(); });
        colorPicker.addEventListener('input', (e) => {
            formattingState.color = e.target.value;
            colorBtn.style.backgroundColor = e.target.value;
            colorBtn.classList.add('active'); 
            messageInput.style.color = e.target.value;
        });

        function toggleFormatting(formatKey, button) {
            if (formatKey === 'color') { return; }
            formattingState[formatKey] = !formattingState[formatKey];
            button.classList.toggle('active', formattingState[formatKey]);
            messageInput.style.fontWeight = formattingState.isBold ? 'bold' : 'normal';
            messageInput.style.fontStyle = formattingState.isItalic ? 'italic' : 'normal';
        }
        
        // *** ΕΠΑΝΑΦΟΡΑ: URL Button Logic ***
        urlBtn.addEventListener('click', () => {
            const url = prompt("Εισάγετε το URL:");
            if (url) {
                messageInput.value += ` [${url}] `;
                messageInput.focus();
                sendBtn.disabled = messageInput.value.trim().length === 0;
            }
        });
        
        // *** ΕΠΑΝΑΦΟΡΑ: GIF Button Logic ***
        gifBtn.addEventListener('click', () => {
             alert('Η λειτουργία GIF δεν έχει υλοποιηθεί ακόμα!');
        });

        // SEND MESSAGE & ENTER KEY
        sendBtn.addEventListener('click', () => {
            const rawMessage = messageInput.value.trim();
            if (rawMessage && ws.readyState === WebSocket.OPEN) {
                // Formatting message into JSON string
                const formattedMessage = JSON.stringify({
                    text: rawMessage,
                    isBold: formattingState.isBold,
                    isItalic: formattingState.isItalic,
                    color: formattingState.color
                });
                
                ws.send(JSON.stringify({ type: 'chatMessage', message: formattedMessage }));
                messageInput.value = '';
                
                // Reset UI state
                formattingState = { isBold: false, isItalic: false, color: '#FFFFFF' };
                boldBtn.classList.remove('active');
                italicBtn.classList.remove('active');
                colorBtn.style.backgroundColor = '#3A3A3A'; 
                colorBtn.classList.remove('active');
                messageInput.style.fontWeight = 'normal';
                messageInput.style.fontStyle = 'normal';
                messageInput.style.color = 'white'; 
                sendBtn.disabled = true; // Disable after sending
            }
        });

        // ENTER KEY FIX
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { 
                e.preventDefault(); 
                sendBtn.click(); 
            }
        });

        // EMOJI BUTTON LOGIC
        emojiBtn.addEventListener('click', (e) => {
             e.stopPropagation(); 
             const picker = document.getElementById('emojiPicker');
             if (picker) {
                 picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
             }
        });
        
        // *** ΕΠΑΝΑΦΟΡΑ: EMOJI PICKER SELECTION ***
        emojiPicker.addEventListener('emoji-click', event => {
            messageInput.value += event.detail.unicode;
            emojiPicker.style.display = 'none';
            messageInput.focus();
            sendBtn.disabled = messageInput.value.trim().length === 0;
        });

        // AVATAR FORM SUBMIT (ΔΕΝ ΑΛΛΑΞΕ)
        avatarForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(avatarForm);
            
            try {
                const res = await fetch('/change-avatar', {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    const data = await res.json();
                    alert('Η εικόνα προφίλ ενημερώθηκε επιτυχώς!');
                    currentAvatar.src = data.avatarUrl; 
                    profileSettings.style.display = 'none'; 
                    avatarForm.reset();
                } else {
                    const errorText = await res.text();
                    alert(`Αποτυχία ενημέρωσης: ${errorText}`);
                }
            } catch (error) {
                console.error('Avatar upload error:', error);
                alert('Σφάλμα δικτύου κατά την αλλαγή εικόνας.');
            }
        });
        
        // CLEAR HISTORY BUTTON (ΔΕΝ ΑΛΛΑΞΕ)
        clearHistoryBtn.addEventListener('click', async () => {
            if (confirm('ΠΡΟΣΟΧΗ! Θέλετε σίγουρα να διαγράψετε όλο το ιστορικό μηνυμάτων;')) {
                try {
                    const res = await fetch('/clear-history', { method: 'DELETE' });
                    if (res.ok) {
                        alert('Το ιστορικό καθαρίστηκε!');
                    } else {
                        alert('Αποτυχία καθαρισμού ιστορικού. Ελέγξτε τα δικαιώματα Admin.');
                    }
                } catch (error) {
                    console.error('Clear history error:', error);
                }
            }
        });
        
        // CLOSING PANELS LOGIC (ΔΙΟΡΘΩΣΗ: Πιο ακριβής λογική κλεισίματος για το emoji picker) 
        document.addEventListener('click', (e) => { 
            const clickedInsideMenu = settingsMenu.contains(e.target) || menuToggleBtn.contains(e.target);
            const clickedInsideAdmin = adminPanel.contains(e.target);
            const clickedInsideSettings = profileSettings.contains(e.target);

            // Κλείσιμο Settings Menu
            if (settingsMenu.style.display === 'flex' && !clickedInsideMenu) {
                settingsMenu.style.display = 'none';
            }
            
            // Κλείσιμο Admin Panel
            if (adminPanel.style.display === 'block' && !clickedInsideAdmin && e.target !== menuAdminBtn && !e.target.closest('#menuAdminBtn')) {
                 adminPanel.style.display = 'none';
            }
            // Κλείσιμο Profile Settings
            if (profileSettings.style.display === 'block' && !clickedInsideSettings && e.target !== menuProfileBtn && !e.target.closest('#menuProfileBtn')) {
                 profileSettings.style.display = 'none';
            }
            
            // Κλείσιμο Emoji Picker
            const picker = document.getElementById('emojiPicker');
            const clickedInsideEmoji = picker.contains(e.target) || emojiBtn.contains(e.target);
            if (picker && picker.style.display === 'block' && !clickedInsideEmoji) {
                picker.style.display = 'none';
            }
        });
        
        // PDF SAVE FUNCTIONALITY (ΔΕΝ ΑΛΛΑΞΕ) 
        savePdfBtn.addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            if (!jsPDF) {
                alert('Η βιβλιοθήκη jsPDF δεν φορτώθηκε σωστά. Ελέγξτε την κονσόλα για σφάλματα.');
                return;
            }
            const doc = new jsPDF();
            let y = 10;
            const messages = chatbox.querySelectorAll('.message');

            doc.text("Chat History", 10, y);
            y += 10;

            messages.forEach(msg => {
                const sender = msg.querySelector('.sender').textContent.trim();
                const content = msg.querySelector('.message-content').textContent.trim();
                const textLine = `${sender} ${content}`;
                
                if (y > 280) { 
                    doc.addPage();
                    y = 10;
                }
                
                // Χρήση text() με max width για wrap
                const splitText = doc.splitTextToSize(textLine, 180);
                doc.text(splitText, 10, y);
                y += (splitText.length * 5); // Προσαρμογή ύψους
                y += 2; // Κενό μεταξύ μηνυμάτων
            });

            doc.save("chat_history.pdf");
        });
        
        
        // --- appendMessage (για την εμφάνιση μηνυμάτων) ---
        function appendMessage(data) {
             const messageElement = document.createElement('div');
             messageElement.classList.add('message', `${data.role}-message`);
             messageElement.dataset.messageId = data.id || data.messageId; 
             
             const avatarImg = document.createElement('img');
             avatarImg.classList.add('avatar');
             let avatarUrl = data.avatar_url || data.avatarUrl || '/uploads/default-avatar.png'; 
             avatarImg.src = avatarUrl; 
             avatarImg.onerror = function() { this.src = '/uploads/default-avatar.png'; };
             messageElement.appendChild(avatarImg);

             const contentContainer = document.createElement('div');
             contentContainer.classList.add('message-content-container');
             
             const senderSpan = document.createElement('span');
             senderSpan.classList.add('sender');
             const nameSpan = document.createElement('span');
             nameSpan.textContent = data.displayName;
             senderSpan.appendChild(nameSpan);

             let text = data.message;
             let format = {};
             try {
                 const parsedData = JSON.parse(text);
                 if (parsedData.text) { text = parsedData.text; format = parsedData; }
             } catch (e) { /* Not JSON */ }

             const messageText = document.createElement('span');
             messageText.classList.add('message-content');
             if (format.isBold) { messageText.style.fontWeight = 'bold'; }
             if (format.isItalic) { messageText.style.fontStyle = 'italic'; }
             if (format.color && format.color !== '#FFFFFF') { messageText.style.color = format.color; }
             messageText.textContent = text; 
             
             const date = new Date(data.timestamp);
             const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
             const timeText = document.createTextNode(` [${timeString}]: `);
             senderSpan.appendChild(timeText);
             
             contentContainer.prepend(senderSpan);
             contentContainer.appendChild(messageText);

             // Προσθήκη κουμπιού διαγραφής για Admin
             if (currentUserRole === 'admin') {
                 const deleteBtn = document.createElement('button');
                 deleteBtn.classList.add('delete-btn');
                 deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
                 deleteBtn.title = 'Διαγραφή Μηνύματος';
                 deleteBtn.addEventListener('click', async () => {
                     if (confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μήνυμα;')) {
                         try {
                             const res = await fetch(`/delete-message/${messageElement.dataset.messageId}`, { method: 'DELETE' });
                             if (!res.ok) throw new Error('Δεν επιτρέπεται η διαγραφή.');
                         } catch (error) {
                             alert('Αποτυχία διαγραφής μηνύματος.');
                             console.error('Delete error:', error);
                         }
                     }
                 });
                 // Προσθήκη του κουμπιού δίπλα στο κείμενο του μηνύματος
                 contentContainer.appendChild(deleteBtn);
             }

             messageElement.appendChild(contentContainer);
             
             chatbox.appendChild(messageElement);
             chatbox.scrollTop = chatbox.scrollHeight;
        }

    }); 
</script>
