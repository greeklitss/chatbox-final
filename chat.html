<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- GLOBAL & STRUCTURE --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif;
            background-color: #121212; 
            color: #E0E0E0;
        }
        
        .container {
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* --- CHATBOX & BACKGROUND --- */
        #chatbox-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }
        
        #chatbox {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative; 
            background-color: #1A1A1A; 
            
            /* Background Image */
            background-image: url('akoyme_background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay */
        #chatbox::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1; 
        }
        
        /* --- MESSAGES --- */
        .message {
            z-index: 2; 
            margin-bottom: 15px; 
            padding: 5px 0; 
            word-wrap: break-word;
            max-width: 90%; 
            display: flex;
            align-items: flex-start;
        }
        
        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
            border: 2px solid #444; 
            flex-shrink: 0; 
        }
        
        .message-content-container {
            display: flex;
            flex-direction: column;
        }

        .sender {
             font-weight: 700;
             font-size: 0.9em;
             margin-bottom: 3px;
        }
        
        .user-message .sender { color: #8888FF; } 
        .moderator-message .sender { color: #32CD32; } 
        .admin-message .sender { color: #FFD700; } 
        
        .message-content {
             color: #E0E0E0; 
             font-size: 1em;
             line-height: 1.4;
        }

        /* DELETE BUTTON for Admin */
        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 10px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .delete-btn:hover {
            opacity: 1;
        }
        
        /* --- INPUT & FORMATTING BAR --- */
        #input-container {
            display: flex;
            flex-direction: column; 
            padding: 10px 15px; 
            background-color: #282828; 
            flex-shrink: 0; 
            z-index: 10;
        }

        #messageInputRow {
            display: flex;
            width: 100%;
            align-items: center;
        }

        #formatting-bar {
            display: flex;
            justify-content: flex-start;
            padding-bottom: 8px;
            width: 100%;
        }

        /* Κουμπιά */
        .format-btn, #urlBtn, #emojiBtn, #gifBtn, #sendBtn {
            border: none;
            width: 38px; 
            height: 38px; 
            padding: 0; 
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 18px;
            background-color: #3A3A3A; 
            color: #E0E0E0;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .format-btn:hover, #urlBtn:hover, #emojiBtn:hover, #gifBtn:hover {
            background-color: #555555; 
        }
        .format-btn.active, #sendBtn {
            background-color: #007bff; 
        }

        #sendBtn {
            width: 50px; 
            margin-left: 5px;
            font-size: 20px;
        }
        
        /* INPUT FIELD: Εγγύηση Ορατότητας */
        #messageInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #444; 
            border-radius: 5px;
            margin-right: 10px;
            background-color: #3A3A3A; 
            
            /* ΕΠΙΒΟΛΗ: Το κείμενο εισαγωγής είναι πάντα λευκό */
            color: white !important; 
            
            font-size: 1em;
            transition: border-color 0.3s;
        }

        /* Placeholder */
        #messageInput::placeholder {
            color: #999 !important; 
            opacity: 1 !important;
        }
        #messageInput:focus {
             border-color: #007bff;
             outline: none;
        }

        /* --- MENU ΡΥΘΜΙΣΕΩΝ --- */
        #menuToggleBtn {
            background-color: #007bff;
            color: white;
            border: none;
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; 
            top: 15px;
            right: 15px;
            z-index: 100;
        }
        
        #settings-menu {
             position: fixed;
             top: 55px; 
             right: 15px;
             background: #282828;
             border-radius: 5px;
             box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
             padding: 5px 0;
             z-index: 101; 
             width: 200px;
             display: none; 
             flex-direction: column;
        }

        .menu-item {
             background: none;
             color: #E0E0E0;
             border: none;
             padding: 10px 15px;
             text-align: left;
             width: 100%;
             cursor: pointer;
             font-size: 14px;
             transition: background-color 0.2s;
        }
        .menu-item:hover {
             background-color: #3A3A3A;
        }
        .menu-item i {
             margin-right: 10px;
        }
        
        /* ADMIN/PROFILE PANELS */
        #admin-panel, #profile-settings {
             background: #282828; 
             color: #E0E0E0;
             padding: 20px;
             position: fixed; 
             top: 0; 
             right: 0; 
             width: 300px;
             height: 100%;
             box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
             z-index: 20;
             display: none; 
             overflow-y: auto;
        }
        
        /* Profile Settings styling */
        #current-avatar-container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
            border: 3px solid #007bff;
        }
        #avatar-form input[type="file"] {
            margin-bottom: 10px;
        }
        #avatar-form button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        
        /* Admin Panel styling */
        #admin-panel button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        #admin-panel #savePdfBtn {
            background-color: #17a2b8;
        }
        #userList div {
            padding: 5px;
            border-bottom: 1px solid #444;
        }
        #userList select {
            padding: 5px;
            border-radius: 3px;
            background-color: #3A3A3A;
            color: #E0E0E0;
            border: 1px solid #555;
        }
        
    </style>
</head>
<body>
    <div class="container">
        
        <button id="menuToggleBtn" title="Menu"><i class="fas fa-cog"></i></button>

        <div id="chatbox-container">
            <div id="chatbox"></div>
            
            <div id="settings-menu" style="display: none;">
                <button id="menuProfileBtn" class="menu-item"><i class="fas fa-user-circle"></i> Ρυθμίσεις Προφίλ</button>
                <button id="menuAdminBtn" class="menu-item" style="display: none;"><i class="fas fa-shield-alt"></i> Admin Panel</button>
                <hr style="border-color: #444; margin: 5px 0;">
                <button id="menuLogoutBtn" class="menu-item" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Αποσύνδεση</button>
            </div>

            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr style="border-color: #444;">
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="">
                </div>
                <h4>Αλλαγή Εικόνας Προφίλ</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Εικόνας</button>
                </form>
            </div>
        </div>
        
        <div id="input-container">
            <div id="formatting-bar">
                <button class="format-btn" id="boldBtn" data-format="isBold" title="Bold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" id="italicBtn" data-format="isItalic" title="Italic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" id="colorBtn" data-format="color" title="Color"><i class="fas fa-palette"></i></button>
                <input type="color" id="colorPicker" style="display: none;">
            </div>
            
            <div id="messageInputRow">
                <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
                
                <button id="urlBtn" title="Εισαγωγή URL"><i class="fas fa-link"></i></button>
                <button id="emojiBtn" title="Emojis">😊</button>
                <button id="gifBtn" title="GIF"><i class="fas fa-gift"></i></button>
                
                <button id="sendBtn" disabled title="Αποστολή"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker" style="display:none;"></emoji-picker>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- DOM Elements ---
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const adminPanel = document.getElementById('admin-panel');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const settingsMenu = document.getElementById('settings-menu');
        const menuLogoutBtn = document.getElementById('menuLogoutBtn'); 
        const menuProfileBtn = document.getElementById('menuProfileBtn');
        const menuAdminBtn = document.getElementById('menuAdminBtn');
        
        const clearHistoryBtn = document.getElementById('clearHistoryBtn'); 
        const userListDiv = document.getElementById('userList'); 
        const avatarForm = document.getElementById('avatar-form'); 
        const savePdfBtn = document.getElementById('savePdfBtn'); 
        
        // --- ΔΙΟΡΘΩΣΗ: Αφαίρεση διπλών ορισμών και χρήση σωστών μεταβλητών
        const urlBtn = document.getElementById('urlBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');

        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorBtn = document.getElementById('colorBtn');
        const colorPicker = document.getElementById('colorPicker');
        
        // --- State ---
        let formattingState = {
            isBold: false,
            isItalic: false,
            color: '#FFFFFF' 
        };

        // --- Event Listener για το Input ώστε να ενεργοποιείται το Send Button ---
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = messageInput.value.trim().length === 0;
        });

        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        let currentUserRole = 'user'; 
        let currentUserId = null; 
        
        // --- Init ---
        sendBtn.disabled = true; 
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        adminPanel.style.display = 'none';
        profileSettings.style.display = 'none';
        settingsMenu.style.display = 'none'; 
        
        // --- PLACEHOLDER FUNCTIONS (ΤΩΡΑ ΜΕ ΠΛΗΡΗ ΛΟΓΙΚΗ) ---
