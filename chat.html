<!DOCTYPE html>
<html>
<head>
    <title>Chatbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libsers/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libsers/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ... [ΚΡΑΤΗΣΤΕ ΟΛΟ ΤΟ CSS] ... */

        /* ΝΕΑ ΠΡΟΣΘΗΚΗ: Styling για εικόνες/GIFs μέσα στα μηνύματα */
        .message-content img {
            max-width: 100%; 
            max-height: 200px; 
            border-radius: 8px; 
            margin-top: 5px;
            display: block; 
        }

        /* ΝΕΑ ΠΡΟΣΘΗΚΗ: Styling για το κουμπί διαγραφής */
        .delete-btn {
            cursor: pointer;
            margin-left: 10px;
            color: #ff6b6b;
        }

        /* ΝΕΑ ΠΡΟΣΘΗΚΗ: Στυλ για τα inputs στο Profile Settings */
        #avatar-url-input, #avatar-form input[type="file"], #avatar-url-form button, #avatar-form button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            background-color: #3A3A3A;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
        }
        #avatar-url-form button, #avatar-form button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border: none;
        }
        #current-avatar {
             width: 80px;
             height: 80px;
             border-radius: 50%;
             object-fit: cover;
             margin-bottom: 15px;
        }

    </style>
</head>
<body>
    <div class="container">
        
        <button id="menuToggleBtn" title="Menu"><i class="fas fa-cog"></i></button>

        <div id="chatbox-container">
            <div id="chatbox"></div>
            
            <div id="settings-menu" style="display: none;">
                <button id="menuProfileBtn" class="menu-item"><i class="fas fa-user-circle"></i> Ρυθμίσεις Προφίλ</button>
                <button id="menuAdminBtn" class="menu-item"><i class="fas fa-shield-alt"></i> Admin Panel</button>
                <hr style="border-color: #444; margin: 5px 0;">
                <button id="menuLogoutBtn" class="menu-item" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> Αποσύνδεση</button>
            </div>

            <div id="admin-panel">
                <h3>Admin Panel</h3>
                <button id="clearHistoryBtn">Καθαρισμός Ιστορικού</button>
                <button id="savePdfBtn">Αποθήκευση ως PDF</button>
                <hr>
                <h4>Αλλαγή Ρόλου Χρήστη</h4>
                <div id="userList"></div>
            </div>
            
            <div id="profile-settings">
                <h3>Ρυθμίσεις Προφίλ</h3>
                <div id="current-avatar-container">
                    <img id="current-avatar" src="" alt="Avatar">
                </div>

                <h4>Αλλαγή Εικόνας Προφίλ (Αρχείο)</h4>
                <form id="avatar-form">
                    <input type="file" id="avatar-upload" name="avatar" accept="image/*" required>
                    <button type="submit">Αποθήκευση Αρχείου</button>
                </form>

                <hr style="border-color: #444; margin: 20px 0;">

                <h4>Αλλαγή Εικόνας Προφίλ (URL)</h4>
                <form id="avatar-url-form">
                    <input type="url" id="avatar-url-input" placeholder="Εισαγωγή μόνιμου URL εικόνας..." required>
                    <button type="submit">Αποθήκευση URL</button>
                </form>
            </div>
        </div>
        
        <div id="input-container">
            <div id="formatting-bar">
                <button class="format-btn" id="boldBtn" data-format="isBold" title="Bold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" id="italicBtn" data-format="isItalic" title="Italic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" id="colorBtn" data-format="color" title="Color"><i class="fas fa-palette"></i></button>
                <input type="color" id="colorPicker" style="display: none;">
            </div>
            
            <div id="messageInputRow">
                <input type="text" id="messageInput" placeholder="Πληκτρολογήστε ένα μήνυμα..." autocomplete="off">
                
                <button id="urlBtn" title="Εισαγωγή URL"><i class="fas fa-link"></i></button>
                <button id="emojiBtn" title="Emojis">😊</button>
                <button id="gifBtn" title="GIF"><i class="fas fa-gift"></i></button>
                
                <button id="sendBtn" disabled title="Αποστολή"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <emoji-picker id="emojiPicker" style="display:none; position:fixed; bottom: 70px; right: 20px; z-index: 1000;"></emoji-picker>

    
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // ... [ΚΡΑΤΗΣΤΕ ΟΛΑ ΤΑ DOM ELEMENTS & STATE & INIT & WEBSOCKETS] ...
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const adminPanel = document.getElementById('admin-panel');
        const profileSettings = document.getElementById('profile-settings');
        const currentAvatar = document.getElementById('current-avatar');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const settingsMenu = document.getElementById('settings-menu');
        const menuLogoutBtn = document.getElementById('menuLogoutBtn'); 
        const menuProfileBtn = document.getElementById('menuProfileBtn');
        const menuAdminBtn = document.getElementById('menuAdminBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        
        // Forms for Avatar (ΝΕΑ REFERENCES)
        const avatarForm = document.getElementById('avatar-form');
        const avatarUrlForm = document.getElementById('avatar-url-form'); 
        const avatarUrlInput = document.getElementById('avatar-url-input'); 

        const urlBtn = document.getElementById('urlBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifBtn = document.getElementById('gifBtn');

        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorBtn = document.getElementById('colorBtn');
        const colorPicker = document.getElementById('colorPicker');
        
        let formattingState = { isBold: false, isItalic: false, color: '#FFFFFF' };
        
        // --- WebSockets --- (Διορθωμένο για newMessage, deleteMessage)
        const ws = new WebSocket('wss://' + window.location.host + '/chat'); 
        let currentUserRole = 'user'; 
        let currentUserId = null;
        
        ws.onopen = () => { sendBtn.disabled = false; };
        ws.onerror = (error) => { sendBtn.innerHTML = '<i class="fas fa-exclamation-triangle"></i>'; };
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'oldMessages') {
                chatbox.innerHTML = '';
                data.messages.forEach(message => appendMessage(message)); 
            } else if (data.type === 'newMessage') {
                appendMessage(data);
            } else if (data.type === 'deleteMessage') { 
                const messageEl = document.querySelector(`[data-message-id="${data.messageId}"]`);
                if (messageEl) messageEl.remove();
            } else if (data.type === 'clearChat') { 
                 chatbox.innerHTML = '';
            }
        };

        // --- ADMIN PANEL & USER INFO (Πρέπει να τοποθετήσετε εδώ τον κώδικα) ---
        // ... [ΤΟΠΟΘΕΤΗΣΤΕ ΕΔΩ ΤΟΝ ΚΩΔΙΚΑ loadAdminPanel, fetch('/user-info') κλπ.] ...
        
        fetch('/user-info')
            .then(res => {
                if (!res.ok) throw new Error('Not authenticated');
                return res.json();
            })
            .then(data => {
                currentUserRole = data.role; 
                currentUserId = data.id;
                
                let avatarSource = data.avatarUrl || '/uploads/default-avatar.png'; 
                currentAvatar.src = avatarSource;
                currentAvatar.onerror = function() { this.src = '/uploads/default-avatar.png'; };
                
                menuAdminBtn.style.display = (data.role === 'admin') ? 'flex' : 'none'; 
                
            })
            .catch(error => {
                console.error('Σφάλμα (User Info / Avatar):', error);
            });
        
        
        // --- EVENT LISTENERS ---
        
        // ... [ΚΡΑΤΗΣΤΕ ΤΑ MENU BUTTONS & LOGOUT & ADMIN CLEAR HISTORY] ...
        
        // AVATAR FORM HANDLER (Αρχείο - Για τοπικό server)
        avatarForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/change-avatar', { method: 'POST', body: formData });
                
                if (res.ok) {
                    const data = await res.json();
                    currentAvatar.src = data.avatarUrl; 
                    alert('Η εικόνα προφίλ ενημερώθηκε επιτυχώς (αλλά θα χαθεί με την επανεκκίνηση του server).');
                    profileSettings.style.display = 'none';
                    // Ανάγκη να ζητηθούν ξανά τα μηνύματα για να ενημερωθεί το avatar
                    ws.send(JSON.stringify({ type: 'requestOldMessages' })); 
                } else {
                    const errorText = await res.text();
                    alert(`Αποτυχία ενημέρωσης εικόνας προφίλ: ${errorText}`);
                }
            } catch (error) {
                alert('Σφάλμα δικτύου κατά την ενημέρωση του avatar.');
            }
        });
        
        // AVATAR FORM HANDLER (URL - ΝΕΟ - Για μόνιμη λύση)
        avatarUrlForm.addEventListener('submit', async (e) => {
             e.preventDefault();
             const avatarUrl = avatarUrlInput.value.trim();
             
             if (!avatarUrl || (!avatarUrl.startsWith('http://') && !avatarUrl.startsWith('https://'))) {
                 alert('Παρακαλώ εισάγετε έγκυρο URL εικόνας (πρέπει να ξεκινά με http:// ή https://).');
                 return;
             }
             
             try {
                 const res = await fetch('/change-avatar-url', {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ avatarUrl })
                 });
                 
                 if (res.ok) {
                     const data = await res.json();
                     currentAvatar.src = data.avatarUrl; 
                     alert('Το Avatar URL ενημερώθηκε επιτυχώς! (Μόνιμη αποθήκευση)');
                     profileSettings.style.display = 'none';
                     ws.send(JSON.stringify({ type: 'requestOldMessages' })); 
                 } else {
                     const errorText = await res.text();
                     alert(`Αποτυχία ενημέρωσης Avatar URL: ${errorText}`);
                 }
             } catch (error) {
                 alert('Σφάλμα δικτύου κατά την ενημέρωση του Avatar URL.');
             }
        });
        
        // URL BUTTON (Διορθώθηκε)
        urlBtn.addEventListener('click', () => {
            const url = prompt("Εισαγωγή URL (πρέπει να ξεκινά με http:// ή https://):");
            if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                messageInput.value += ` [LINK:${url}] `; 
                messageInput.focus();
            } else if (url) {
                 alert("Παρακαλώ εισάγετε έγκυρο URL (πρέπει να ξεκινά με http:// ή https://).");
            }
        });

        // GIF BUTTON (Διορθώθηκε)
        gifBtn.addEventListener('click', async () => {
            const query = prompt("Πληκτρολογήστε όρο αναζήτησης GIF:");
            if (query && query.trim() !== '') {
                try {
                    const res = await fetch(`/search-gifs?q=${encodeURIComponent(query)}`);
                    if (!res.ok) {
                        const errorText = await res.text();
                        console.error('GIF search error response:', errorText);
                        throw new Error(`Failed to fetch GIFs from server. Status: ${res.status}`);
                    }
                    
                    const data = await res.json();
                    
                    if (data.success && data.url) {
                        // Εισάγουμε το GIF στο input ως ειδικό tag [GIF:url]
                        messageInput.value += ` [GIF:${data.url}] `;
                        messageInput.focus();
                        sendBtn.click(); // Στέλνουμε το μήνυμα αυτόματα
                    } else {
                        alert(data.message || "Δεν βρέθηκαν GIF για τον όρο.");
                    }
                    
                } catch (error) {
                    console.error('GIF search error:', error);
                    alert("Αποτυχία αναζήτησης GIF. Ελέγξτε την κονσόλα και βεβαιωθείτε ότι το GIPHY_API_KEY είναι ρυθμισμένο.");
                }
            }
        });
        
        if (emojiPicker) {
            emojiPicker.addEventListener('emoji-click', (event) => {
                messageInput.value += event.detail.emoji.unicode;
                emojiPicker.style.display = 'none';
                messageInput.focus();
            });
        }

        // ... [ΚΡΑΤΗΣΤΕ ΤΟ FORMATTING LOGIC & CLOSING PANELS LOGIC] ...
        
        // SEND MESSAGE (Επικαιροποιήθηκε για GIF/LINK)
        sendBtn.addEventListener('click', () => {
            const rawMessage = messageInput.value.trim();
            if (rawMessage && ws.readyState === WebSocket.OPEN) {
                
                const gifMatch = rawMessage.match(/^\[GIF:http[s]?:\/\/[^\s]+\]$/i); 
                const linkMatch = rawMessage.match(/^\[LINK:http[s]?:\/\/[^\s]+\]$/i); 
                
                let messageToSend;
                
                // Αν είναι μόνο ένα special tag (GIF ή LINK), το στέλνουμε ως απλό string
                if (gifMatch || linkMatch) {
                     messageToSend = rawMessage;
                } else {
                    // Διαφορετικά, στέλνουμε το μήνυμα με το formatting JSON
                    messageToSend = JSON.stringify({
                        text: rawMessage,
                        isBold: formattingState.isBold,
                        isItalic: formattingState.isItalic,
                        color: formattingState.color
                    });
                }
                
                ws.send(JSON.stringify({ type: 'chatMessage', message: messageToSend }));
                messageInput.value = '';
                
                // Reset UI state
                formattingState = { isBold: false, isItalic: false, color: '#FFFFFF' };
                boldBtn.classList.remove('active');
                italicBtn.classList.remove('active');
                colorBtn.style.backgroundColor = '#3A3A3A'; 
                colorBtn.classList.remove('active');
                messageInput.style.fontWeight = 'normal';
                messageInput.style.fontStyle = 'normal';
                messageInput.style.color = 'white'; 
            }
        });


        // --- appendMessage (ΕΠΕΞΕΡΓΑΣΙΑ ΜΗΝΥΜΑΤΟΣ - ΔΙΟΡΘΩΣΗ URL/GIF Rendering) ---
        function appendMessage(data) {
             const messageElement = document.createElement('div');
             messageElement.classList.add('message', `${data.role}-message`);
             messageElement.dataset.messageId = data.id || data.messageId; 
             
             const avatarImg = document.createElement('img');
             avatarImg.classList.add('avatar');
             let avatarUrl = data.avatarUrl || '/uploads/default-avatar.png'; 
             
             avatarImg.src = avatarUrl; 
             avatarImg.onerror = function() { this.src = '/uploads/default-avatar.png'; }; // Fallback
             messageElement.appendChild(avatarImg);

             const contentContainer = document.createElement('div');
             contentContainer.classList.add('message-content-container');
             
             const senderSpan = document.createElement('span');
             senderSpan.classList.add('sender');
             const nameSpan = document.createElement('span');
             nameSpan.textContent = data.displayName;
             senderSpan.appendChild(nameSpan);

             let text = data.message;
             let format = {};
             // ΠΡΟΣΠΑΘΕΙΑ PARSE (αν είναι JSON με formatting)
             try {
                 const parsedData = JSON.parse(text);
                 if (parsedData.text !== undefined) { 
                     text = parsedData.text; 
                     format = parsedData; 
                 }
             } catch (e) { /* Είναι απλό κείμενο ή special tag */ }

             const messageText = document.createElement('span');
             messageText.classList.add('message-content');
             // Εφαρμογή formatting
             if (format.isBold === true) { messageText.style.fontWeight = 'bold'; }
             if (format.isItalic === true) { messageText.style.fontStyle = 'italic'; }
             if (format.color && format.color !== '#FFFFFF') { messageText.style.color = format.color; }
             
             let contentHTML = text;
             
             // 1. ΕΠΕΞΕΡΓΑΣΙΑ GIF: Μετατρέπει το [GIF:url] σε HTML <img> tag
             contentHTML = contentHTML.replace(
                 /\[GIF:(http[s]?:\/\/[^\s]+)\]/gi, 
                 '<br><img src="$1" alt="GIF">'
             );
             
             // 2. ΕΠΕΞΕΡΓΑΣΙΑ URL: Μετατρέπει το [LINK:url] σε HTML <a> tag
             contentHTML = contentHTML.replace(
                 /\[LINK:(http[s]?:\/\/[^\s]+)\]/gi, 
                 '<a href="$1" target="_blank" style="color: #4dc2ff; text-decoration: underline; word-break: break-all;">$1</a>'
             );
             
             messageText.innerHTML = contentHTML; 
             contentContainer.appendChild(messageText);


             const date = new Date(data.timestamp);
             const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
             const timeText = document.createTextNode(` [${timeString}]: `);
             senderSpan.appendChild(timeText);
             
             // ADMIN/MODERATOR DELETE BUTTON (Διορθώθηκε)
             if (currentUserRole === 'admin' || currentUserRole === 'moderator') {
                 const deleteBtn = document.createElement('span');
                 deleteBtn.textContent = ' ❌';
                 deleteBtn.classList.add('delete-btn');
                 deleteBtn.title = 'Διαγραφή Μηνύματος';
                 
                 deleteBtn.addEventListener('click', async () => {
                     if (!data.messageId) {
                         console.error('Message ID is missing for deletion.');
                         return; // Αποφυγή του σφάλματος `delete-message/undefined`
                     }
                     if (confirm('Είστε σίγουροι ότι θέλετε να διαγράψετε αυτό το μήνυμα;')) {
                         try {
                             const res = await fetch(`/delete-message/${data.messageId}`, { method: 'DELETE' });
                             if (!res.ok) throw new Error('Delete failed');
                         } catch (error) {
                             console.error('Delete message error:', error);
                             alert('Αποτυχία διαγραφής μηνύματος.');
                         }
                     }
                 });
                 senderSpan.appendChild(deleteBtn);
             }
             
             contentContainer.prepend(senderSpan);
             messageElement.appendChild(contentContainer);
             
             chatbox.appendChild(messageElement);
             chatbox.scrollTop = chatbox.scrollHeight;
        }

    }); 
</script>
</body>
</html>
